<!DOCTYPE html>
<html lang="tr">
<head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
  import {
    getAuth,
    onAuthStateChanged,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    signOut
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getDatabase,
    ref,
    set,
    get,
    onValue
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyDDf6nEFNiJb1jubQX5ZF8XxOAol8K6laE",
    authDomain: "dnzhesap-b2d0f.firebaseapp.com",
    databaseURL: "https://dnzhesap-b2d0f-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "dnzhesap-b2d0f",
    storageBucket: "dnzhesap-b2d0f.firebasestorage.app",
    messagingSenderId: "1004452565327",
    appId: "1:1004452565327:web:68d781a9c6936d1c9af53a",
    measurementId: "G-P0YLSXF3J0"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const auth = getAuth(app);
  const db = getDatabase(app);

  // Ana uygulama kodu (klasik script) doğrudan ES modül import'u kullanamadığı için,
  // Realtime Database okuma/yazma işlemlerini bu iki global fonksiyon üzerinden yapıyoruz.
  // Tüm state tek bir JSON metni olarak saklanıyor (uygulamanın kendi localStorage
  // katmanıyla birebir aynı format), böylece Realtime Database'in anahtar (key) isimleri
  // için getirdiği kısıtlamalarla (., #, $, [, ]) uğraşmaya gerek kalmıyor.
  window.dnzDbSaveState = async function(jsonString){
    const user = auth.currentUser;
    if(!user) return false;
    try{
      await set(ref(db, 'users/' + user.uid + '/stateJson'), jsonString);
      return true;
    }catch(e){
      console.error('Realtime Database kayıt hatası', e);
      return false;
    }
  };
  window.dnzDbLoadState = async function(){
    const user = auth.currentUser;
    if(!user) return null;
    try{
      const snap = await get(ref(db, 'users/' + user.uid + '/stateJson'));
      return snap.exists() ? snap.val() : null;
    }catch(e){
      console.error('Realtime Database okuma hatası', e);
      return null;
    }
  };

  // --- Basit e-posta/şifre giriş ekranı mantığı ---
  const gate = document.getElementById('authGate');
  const appEl = document.getElementById('app');
  const emailInput = document.getElementById('authEmail');
  const passInput = document.getElementById('authPass');
  const msgEl = document.getElementById('authMsg');
  const loginBtn = document.getElementById('authLoginBtn');
  const registerBtn = document.getElementById('authRegisterBtn');

  function authErrTr(err){
    const c = err && err.code || '';
    if(c.includes('invalid-email')) return 'Geçersiz e-posta adresi.';
    if(c.includes('user-not-found') || c.includes('invalid-credential') || c.includes('wrong-password')) return 'E-posta veya şifre hatalı.';
    if(c.includes('email-already-in-use')) return 'Bu e-posta zaten kayıtlı.';
    if(c.includes('weak-password')) return 'Şifre en az 6 karakter olmalı.';
    if(c.includes('too-many-requests')) return 'Çok fazla deneme yapıldı, lütfen biraz bekleyin.';
    return 'Bir hata oluştu: ' + (err && err.message ? err.message : '');
  }

  loginBtn.addEventListener('click', ()=>{
    msgEl.textContent = '';
    const email = emailInput.value.trim();
    const pass = passInput.value;
    if(!email || !pass){ msgEl.textContent = 'E-posta ve şifre girin.'; return; }
    loginBtn.disabled = true;
    signInWithEmailAndPassword(auth, email, pass)
      .catch(err=>{ msgEl.textContent = authErrTr(err); })
      .finally(()=>{ loginBtn.disabled = false; });
  });

  registerBtn.addEventListener('click', ()=>{
    msgEl.textContent = '';
    const email = emailInput.value.trim();
    const pass = passInput.value;
    if(!email || !pass){ msgEl.textContent = 'E-posta ve şifre girin.'; return; }
    registerBtn.disabled = true;
    createUserWithEmailAndPassword(auth, email, pass)
      .catch(err=>{ msgEl.textContent = authErrTr(err); })
      .finally(()=>{ registerBtn.disabled = false; });
  });

  // Diğer script (klasik, module olmayan) bu fonksiyonu çağırabilsin diye global yapıyoruz.
  window.dnzLogout = ()=> signOut(auth);

  // --- Gerçek zamanlı senkron ---
  // Bu kullanıcıya ait bulut verisi her değiştiğinde (bu cihazdan ya da BAŞKA bir
  // cihazdan/oturumdan) otomatik olarak tetiklenir ve ekranı günceller.
  let realtimeUnsub = null;
  function startRealtimeSync(uid){
    if(realtimeUnsub){ realtimeUnsub(); realtimeUnsub = null; }
    const stateRef = ref(db, 'users/' + uid + '/stateJson');
    realtimeUnsub = onValue(stateRef, (snapshot)=>{
      if(!snapshot.exists()) return;
      const val = snapshot.val();
      if(typeof window.dnzApplyRemoteState === 'function'){
        window.dnzApplyRemoteState(val);
      }
    }, (err)=>{
      console.error('Gerçek zamanlı senkron hatası', err);
    });
  }
  function stopRealtimeSync(){
    if(realtimeUnsub){ realtimeUnsub(); realtimeUnsub = null; }
  }

  onAuthStateChanged(auth, (user)=>{
    if(user){
      window.__dnzUserAlreadySignedIn = true;
      window.dnzCurrentUid = user.uid;
      gate.style.display = 'none';
      appEl.style.display = '';
      if(typeof window.__dnzInitApp === 'function' && !window.__dnzInitStarted){
        window.__dnzInitStarted = true;
        window.__dnzInitApp();
      }
      startRealtimeSync(user.uid);
    }else{
      window.__dnzUserAlreadySignedIn = false;
      window.dnzCurrentUid = null;
      gate.style.display = 'flex';
      appEl.style.display = 'none';
      stopRealtimeSync();
    }
  });
</script>
<style>
:root{
  --abyss:#08202E;
  --lagoon:#0F3B4C;
  --tide:#1C6E8C;
  --foam:#EAF6F5;
  --aqua:#2FD3C7;
  --aqua-dim:#22A99F;
  --ink:#0B2436;
  --ink-soft:#345264;
  --coral:#E8776B;
  --glass-bg:rgba(234,246,245,0.62);
  --glass-bg-strong:rgba(234,246,245,0.82);
  --glass-border:rgba(255,255,255,0.55);
  --shadow-color:rgba(4,20,28,0.35);
  --radius:18px;
  --font-display:'Outfit',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;}
html,body{
  margin:0;padding:0;width:100%;min-height:100%;
  overflow-x:hidden;
  font-family:var(--font-body);
  color:var(--ink);
  -webkit-tap-highlight-color:transparent;
}
body{
  min-height:100vh;
  min-height:100dvh;
  background:
    radial-gradient(ellipse 80% 60% at 20% -10%, rgba(47,211,199,0.28), transparent 60%),
    radial-gradient(ellipse 70% 50% at 90% 10%, rgba(28,110,140,0.16), transparent 60%),
    linear-gradient(160deg, #F5FBFA 0%, #E6F4F2 45%, #D7EDEC 100%);
  background-attachment:fixed;
  background-size:200% 200%, 200% 200%, 100% 100%;
  animation: driftBg 26s ease-in-out infinite alternate;
  display:flex;flex-direction:column;
}
@keyframes driftBg{
  0%{background-position:0% 0%, 100% 0%, 0 0;}
  100%{background-position:20% 30%, 70% 40%, 0 0;}
}
@media (prefers-reduced-motion:reduce){
  body{animation:none;}
  *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
}

/* wave divider */
.wave-divider{width:100%;height:22px;display:block;line-height:0;margin-top:-1px;}
.wave-divider svg{width:100%;height:100%;display:block;}

/* glass primitives */
.glass{
  background:var(--glass-bg);
  backdrop-filter:blur(18px) saturate(140%);
  -webkit-backdrop-filter:blur(18px) saturate(140%);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  box-shadow:0 8px 32px var(--shadow-color), inset 0 1px 0 rgba(255,255,255,0.5);
  position:relative;
  overflow:hidden;
}
.glass-strong{background:var(--glass-bg-strong);}

/* ripple (dnz) effect */
.ripple-wrap{position:relative;overflow:hidden;}
.ripple-el{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle, rgba(47,211,199,0.55) 0%, rgba(47,211,199,0.25) 40%, rgba(255,255,255,0) 70%);
  transform:scale(0);
  animation:rippleAnim 700ms ease-out forwards;
  pointer-events:none;
  z-index:5;
}
@keyframes rippleAnim{
  to{transform:scale(1);opacity:0;}
}

/* header */
#app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;width:100%;}
header.topbar{
  position:sticky;top:0;z-index:40;
  margin:10px 10px 0 10px;
  padding:12px 16px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:10px;min-width:0;flex-shrink:0;}
.brand-mark{
  width:104px;height:38px;border-radius:10px;flex-shrink:0;
  background:#FFFFFF;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(8,32,46,0.22);
  padding:3px 8px;overflow:hidden;
}
.brand-mark svg{width:22px;height:22px;}
.brand-mark img{width:100%;height:100%;object-fit:contain;display:block;}
.brand-text{display:flex;flex-direction:column;line-height:1.05;min-width:0;}
.brand-text b{font-family:var(--font-display);font-weight:800;font-size:1.15rem;letter-spacing:0.5px;color:var(--ink);}
.brand-text span{font-size:0.68rem;color:var(--ink-soft);font-weight:500;letter-spacing:0.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.project-picker{
  margin-left:auto;display:flex;align-items:center;gap:8px;min-width:0;
  flex:1 1 260px;max-width:420px;
}
select.proj-select{
  flex:1;min-width:0;
  appearance:none;-webkit-appearance:none;
  background:rgba(255,255,255,0.55);
  border:1px solid var(--glass-border);
  border-radius:12px;padding:9px 30px 9px 12px;
  font-family:var(--font-body);font-weight:600;font-size:0.85rem;color:var(--ink);
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230B2436' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");
  background-repeat:no-repeat;background-position:right 8px center;background-size:16px;
  text-overflow:ellipsis;white-space:nowrap;overflow:hidden;
}

/* soldan açılan modül paneli (drawer) */
.nav-backdrop{
  position:fixed;inset:0;background:rgba(8,32,46,0.45);z-index:90;
  opacity:0;pointer-events:none;transition:opacity 220ms ease;
}
.nav-backdrop.open{opacity:1;pointer-events:auto;}
nav.tabs{
  position:fixed;top:0;left:0;z-index:100;
  height:100vh;height:100dvh;width:300px;max-width:85vw;
  display:flex;flex-direction:column;gap:5px;
  padding:16px 12px 20px 12px;margin:0;
  overflow-y:auto;overflow-x:hidden;
  border-radius:0 22px 22px 0;
  transform:translateX(-104%);
  transition:transform 240ms cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 50px rgba(4,20,28,0.35);
}
nav.tabs.open{transform:translateX(0);}
nav.tabs::-webkit-scrollbar{width:5px;}
nav.tabs::-webkit-scrollbar-thumb{background:rgba(11,36,54,0.2);border-radius:10px;}
.nav-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:2px 6px 12px 6px;margin-bottom:6px;
  border-bottom:1px solid rgba(11,36,54,0.12);
}
.nav-header b{font-family:var(--font-display);font-weight:800;font-size:1rem;color:var(--ink);}
.tab-btn{
  flex:0 0 auto;width:100%;
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;border-radius:12px;border:none;cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:0.85rem;
  background:transparent;color:var(--ink-soft);
  transition:background 160ms ease, color 160ms ease, transform 160ms ease;
  white-space:nowrap;text-align:left;
}
.tab-btn svg{width:16px;height:16px;flex-shrink:0;}
.tab-btn.active{
  background:linear-gradient(135deg,var(--aqua),var(--aqua-dim));
  color:#04201C;box-shadow:0 4px 14px rgba(47,211,199,0.4);
}
.tab-btn:not(.active):hover{background:rgba(255,255,255,0.5);color:var(--ink);}

main{flex:1;min-width:0;width:100%;padding:0 10px 40px 10px;display:flex;flex-direction:column;gap:14px;max-width:1180px;margin:0 auto;width:100%;}

.card{padding:18px;display:flex;flex-direction:column;gap:14px;min-width:0;}
.card h2{margin:0;font-family:var(--font-display);font-size:1.05rem;font-weight:700;display:flex;align-items:center;gap:8px;}
.card h2 svg{width:18px;height:18px;color:var(--aqua-dim);}
.card p.hint{margin:0;font-size:0.8rem;color:var(--ink-soft);line-height:1.4;}

.field-grid{
  display:grid;gap:10px;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
}
.field{display:flex;flex-direction:column;gap:4px;min-width:0;}
.sg-list{position:absolute;top:100%;left:0;right:0;z-index:60;background:var(--card,#fff);border:1px solid rgba(11,36,54,0.15);border-radius:10px;margin-top:4px;max-height:190px;overflow-y:auto;box-shadow:0 10px 24px rgba(8,32,46,0.22);}
.sg-item{padding:10px 12px;font-size:0.88rem;color:var(--ink,#0B2436);cursor:pointer;border-bottom:1px solid rgba(11,36,54,0.07);}
.sg-item:last-child{border-bottom:none;}
.sg-item:hover,.sg-item:active{background:rgba(47,211,199,0.16);}
.field label{font-size:0.7rem;font-weight:600;color:var(--ink-soft);letter-spacing:0.2px;}
.field input,.field select{
  width:100%;padding:9px 10px;border-radius:10px;
  border:1px solid rgba(11,36,54,0.15);
  background:rgba(255,255,255,0.6);
  font-family:var(--font-body);font-size:0.85rem;color:var(--ink);
  min-width:0;
}
.field input:focus,.field select:focus{outline:2px solid var(--aqua-dim);outline-offset:1px;}
.field input.mono,.field.mono input{font-family:var(--font-mono);}

.btn{
  border:none;border-radius:12px;padding:10px 18px;cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:0.85rem;
  display:inline-flex;align-items:center;gap:6px;justify-content:center;
  transition:transform 120ms ease, box-shadow 120ms ease;
  white-space:nowrap;
}
.btn svg{width:15px;height:15px;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:linear-gradient(135deg,var(--aqua),var(--aqua-dim));color:#04201C;box-shadow:0 4px 14px rgba(47,211,199,0.4);}
.btn-ghost{background:rgba(255,255,255,0.45);color:var(--ink);border:1px solid rgba(11,36,54,0.12);}
.btn-danger{background:rgba(232,119,107,0.18);color:#7A2B22;border:1px solid rgba(232,119,107,0.4);}
.btn-danger:hover{background:rgba(232,119,107,0.3);}
.btn-block{width:100%;}
.btn-sm{padding:6px 10px;font-size:0.75rem;border-radius:8px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}

.icon-btn{
  width:32px;height:32px;border-radius:9px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  background:rgba(255,255,255,0.5);color:var(--ink-soft);
  transition:background 120ms ease, color 120ms ease;
}
.icon-btn svg{width:15px;height:15px;}
.icon-btn:hover{background:rgba(255,255,255,0.8);color:var(--ink);}
.icon-btn.danger:hover{background:rgba(232,119,107,0.25);color:#7A2B22;}

.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px;max-width:100%;}
.report-subnav{display:flex;flex-wrap:wrap;gap:8px;}
.report-subtab-btn{
  display:flex;align-items:center;gap:7px;
  padding:9px 14px;border-radius:12px;border:1px solid var(--glass-border);cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:0.8rem;
  background:rgba(255,255,255,0.5);color:var(--ink-soft);
  transition:background 160ms ease, color 160ms ease;
  white-space:nowrap;
}
.report-subtab-btn svg{width:15px;height:15px;flex-shrink:0;}
.report-subtab-btn.active{
  background:linear-gradient(135deg,var(--aqua),var(--aqua-dim));
  color:#04201C;box-shadow:0 4px 14px rgba(47,211,199,0.4);border-color:transparent;
}
.report-subtab-btn:not(.active):hover{background:rgba(255,255,255,0.8);color:var(--ink);}
table{border-collapse:collapse;width:100%;min-width:760px;font-size:0.78rem;}
thead th{
  text-align:left;padding:9px 10px;background:rgba(11,36,54,0.08);
  font-family:var(--font-display);font-weight:700;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.4px;
  color:var(--ink-soft);position:sticky;top:0;white-space:nowrap;
}
tbody td{padding:8px 10px;border-top:1px solid rgba(11,36,54,0.08);white-space:nowrap;}
tbody tr:hover{background:rgba(255,255,255,0.35);}
td.num,th.num{font-family:var(--font-mono);text-align:right;}
.row-actions{display:flex;gap:4px;}

.filter-bar{display:grid;gap:8px;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));}
.filter-bar select{width:100%;padding:8px 9px;border-radius:9px;border:1px solid rgba(11,36,54,0.15);background:rgba(255,255,255,0.55);font-size:0.78rem;font-family:var(--font-body);color:var(--ink);}

.totals-strip{display:flex;flex-wrap:wrap;gap:10px;}
.total-chip{
  padding:8px 14px;border-radius:12px;background:rgba(255,255,255,0.55);
  border:1px solid rgba(255,255,255,0.6);
  display:flex;flex-direction:column;gap:2px;min-width:88px;
}
.total-chip span.lbl{font-size:0.62rem;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.4px;}
.total-chip span.val{font-family:var(--font-mono);font-weight:700;font-size:1rem;color:var(--ink);}

.empty-state{padding:30px 14px;text-align:center;color:var(--ink-soft);font-size:0.85rem;}
.empty-state svg{width:36px;height:36px;margin-bottom:8px;opacity:0.5;}

/* project list */
.project-list{display:flex;flex-direction:column;gap:8px;}
.project-item{
  display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:14px;
  background:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.5);cursor:pointer;
}
.project-item.active{background:rgba(47,211,199,0.25);border-color:var(--aqua-dim);}
.project-item .pinfo{flex:1;min-width:0;}
.project-item .pinfo b{display:block;font-family:var(--font-display);font-size:0.92rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.project-item .pinfo span{font-size:0.72rem;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;}

/* modal */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(4,16,22,0.55);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;
}
.modal{max-width:420px;width:100%;padding:20px;max-height:86vh;overflow-y:auto;}
.modal h3{margin:0 0 4px 0;font-family:var(--font-display);font-size:1rem;}
.modal .field-grid{margin-top:6px;}

.badge{
  display:inline-flex;padding:3px 9px;border-radius:20px;font-size:0.68rem;font-weight:700;
  background:rgba(47,211,199,0.22);color:#0A5850;
}

footer.appfoot{text-align:center;padding:14px;color:rgba(11,36,54,0.45);font-size:0.68rem;}

.logo-preview{width:56px;height:56px;border-radius:10px;object-fit:contain;background:rgba(255,255,255,0.7);border:1px solid rgba(11,36,54,0.1);padding:4px;}

.toast{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  padding:12px 20px;border-radius:12px;z-index:200;
  font-family:var(--font-body);font-weight:600;font-size:0.85rem;
  background:var(--glass-bg-strong);backdrop-filter:blur(14px);
  border:1px solid var(--glass-border);box-shadow:0 8px 24px var(--shadow-color);
  color:var(--ink);opacity:0;pointer-events:none;transition:opacity 200ms ease, transform 200ms ease;
  max-width:90vw;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

/* pick list for metrajdan ekle */
.pick-list{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto;}
.pick-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;background:rgba(255,255,255,0.4);font-size:0.78rem;}
.pick-item label{flex:1;min-width:0;overflow-wrap:anywhere;}

.checkline{display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--ink-soft);}

/* PDF hidden render area */
#pdf-render-root{position:fixed;left:-99999px;top:0;width:794px;background:#ffffff;}
/* PDF çıktılarındaki tablolar: genel tablo stilinden gelen white-space:nowrap ve
   min-width:760px kuralları, table-layout:fixed ile birleşince başlık ve hücre
   metinlerinin (örn. İmalat Cinsi, Birim) komşu hücrelerin üzerine taşmasına yol
   açıyordu. Bu blok yalnızca PDF render alanındaki tabloları hedefleyip metnin
   hücre içinde satır kaydırarak kalmasını sağlar. */
#pdf-render-root table{min-width:0;table-layout:fixed;}
#pdf-render-root table th,
#pdf-render-root table td{
  white-space:normal;
  overflow-wrap:break-word;
  word-break:break-word;
  vertical-align:top;
  overflow:hidden;
}

.backup-banner{
  display:flex;align-items:center;gap:10px;
  margin:8px 12px 0;padding:10px 14px;border-radius:12px;
  background:rgba(255,183,77,0.18);border:1px solid rgba(255,152,0,0.55);
  color:#7a4a00;font-size:0.8rem;font-weight:600;flex-wrap:wrap;
}
.backup-banner svg{flex-shrink:0;width:20px;height:20px;color:#c77700;}
.backup-banner span{flex:1;min-width:200px;}
.backup-banner .btn{white-space:nowrap;}

/* personel durum rozeti */
.status-badge{display:inline-flex;padding:3px 9px;border-radius:20px;font-size:0.66rem;font-weight:700;white-space:nowrap;}
.status-badge.aktif{background:rgba(47,211,199,0.22);color:#0A5850;}
.status-badge.ayrilmis{background:rgba(232,119,107,0.2);color:#7A2B22;}

/* puantaj / mesai tablosu */
.att-table{border-collapse:collapse;font-size:0.72rem;min-width:max-content;}
.att-table th,.att-table td{border:1px solid rgba(11,36,54,0.1);padding:0;text-align:center;}
.att-table thead th{background:rgba(11,36,54,0.08);font-family:var(--font-display);font-weight:700;font-size:0.62rem;color:var(--ink-soft);padding:6px 4px;white-space:nowrap;position:sticky;top:0;}
.att-table th.wknd,.att-table td.wknd{background:rgba(232,119,107,0.12);}
.att-table thead th.wknd{background:rgba(232,119,107,0.22);}
.att-table td.name-cell,.att-table th.name-cell{
  text-align:left;padding:7px 10px;white-space:nowrap;position:sticky;left:0;z-index:2;
  background:rgba(234,246,245,0.95);font-weight:600;min-width:130px;
}
.att-table thead th.name-cell{z-index:3;background:rgba(11,36,54,0.1);}
.att-cell{
  width:30px;height:30px;border:none;background:transparent;cursor:pointer;
  font-family:var(--font-mono);font-weight:700;font-size:0.75rem;color:var(--ink-soft);
  display:block;margin:0 auto;
}
.att-cell:hover:not(:disabled){background:rgba(255,255,255,0.5);}
.att-cell[data-val="X"]{color:#0A5850;background:rgba(47,211,199,0.28);}
.att-cell[data-val="Y"]{color:#8a5a00;background:rgba(255,183,77,0.32);}
.att-cell[data-val="O"]{color:#7A2B22;background:rgba(232,119,107,0.22);}
.att-cell:disabled{opacity:0.25;cursor:not-allowed;}
.att-table td.total-cell{font-family:var(--font-mono);font-weight:700;background:rgba(28,110,140,0.08);}
.att-table tfoot td,.att-table tfoot th{font-family:var(--font-mono);font-weight:700;background:rgba(11,36,54,0.08);padding:6px 4px;}
.mesai-input{
  width:44px;padding:5px 2px;border:none;background:transparent;text-align:center;
  font-family:var(--font-mono);font-size:0.75rem;color:var(--ink);
}
.mesai-input:disabled{opacity:0.25;}
.mesai-input:focus{outline:2px solid var(--aqua-dim);outline-offset:-2px;}
.att-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:0.72rem;color:var(--ink-soft);align-items:center;}
.att-legend b{font-family:var(--font-mono);padding:1px 7px;border-radius:5px;margin-right:3px;}
.month-picker{padding:9px 10px;border-radius:10px;border:1px solid rgba(11,36,54,0.15);background:rgba(255,255,255,0.6);font-family:var(--font-body);font-size:0.85rem;color:var(--ink);}

@media (max-width:640px){
  header.topbar{gap:8px;padding:10px 12px;}
  .brand-text span{display:none;}
  .project-picker{flex:1 1 100%;max-width:none;order:3;}
  table{font-size:0.72rem;}
  .card{padding:14px;}
}
</style>
</head>

<script>
/* ======================= STATE ======================= */
const STORAGE_KEY = 'dnzMetrajData_v1';
const LS_STORAGE_KEY = 'dnzMetrajData_localCache_v1';
// Yerel önbellek (localStorage) artık Firebase hesabına göre AYRI tutulur. Böylece aynı
// cihazda/tarayıcıda farklı bir hesapla giriş yapıldığında, önceki hesabın verisi
// yanlışlıkla yeni hesaba "sızmaz". Giriş yapılmamışsa (auth henüz hazır değilse) eski
// genel anahtar kullanılır (geriye dönük uyumluluk).
function currentLsCacheKey(){
  return window.dnzCurrentUid ? (LS_STORAGE_KEY + ':' + window.dnzCurrentUid) : LS_STORAGE_KEY;
}
const UNITS = ['m2','mt','kg','adet','m3','ton'];
const UNIT_LABEL = {m2:'m²', mt:'mt', kg:'kg', adet:'adet', m3:'m³', ton:'ton', paket:'paket', kutu:'kutu', rulo:'rulo', litre:'litre', 'takım':'takım', torba:'torba'};
const IMALAT_UNITS = ['adet','mt','m2','kg','m3','ton','paket','kutu','rulo','litre','takım','torba'];
const MEAL_PRICES = { sabah:100, ogle:200, aksam:200 };

function defaultState(){
  return {
    company:{ name:'', logo:'' },
    activeProjectId:null,
    projects:{},
    imalatSistemleri:[],
    lastBackupAt:null,
    dirtySinceBackup:false,
    metrajPdfFont:{ baslik:6, metin:6.5, rakam:7.5 }
  };
}
function newProject(name, employer){
  const id = uid();
  return {
    id, name: name||'Yeni Proje', employer: employer||'',
    createdAt: Date.now(),
    metrajRows:[],
    teklifRows:[],
    teklifNote:'',
    personel:[],
    avanslar:[],
    zimmetler:[],
    tahsilatlar:[],
    masraflar:[],
    yemekler:[],
    yemekFiyat:{ sabah:MEAL_PRICES.sabah, ogle:MEAL_PRICES.ogle, aksam:MEAL_PRICES.aksam },
    memory:{ blok:[], kat:[], daire:[], mekan:[], eleman:[], imalat:[] }
  };
}
function currentYm(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }

let state = defaultState();
// Bu cihazdan buluta en son gönderdiğimiz JSON metni: gerçek zamanlı dinleyici (onValue)
// kendi yazdığımız veriyi "başka bir cihazdan gelen değişiklik" sanıp gereksiz yere
// ekranı yeniden çizmesin diye kullanılır.
let lastCloudJsonSent = null;
let ui = {
  tab:'projeler',
  metrajEditId:null,
  teklifEditId:null,
  filters:{blok:'',kat:'',daire:'',mekan:'',eleman:'',imalat:'',minha:''},
  icmalFilters:{blok:'',kat:'',daire:'',mekan:''},
  puantajAy: currentYm(),
  avansFilterId:'',
  zimmetFilterId:'',
  topluIcmalId:'',
  topluIcmalStart: isoMonthStart(),
  topluIcmalEnd: isoToday(),
  topluHesapStart: isoMonthStart(),
  topluHesapEnd: isoToday(),
  tahsilatEditId:null,
  masrafFilterKalemi:'',
  yemekFilterStart: isoMonthStart(),
  yemekFilterEnd: isoToday(),
  yemekEditId:null,
  raporTab:'icmal',
  imalatSubTab:'tanim',
  imalatSelectedId:null,
  imalatCalcSistemId:null,
  imalatCalcInput:'',
  imalatCalcUnit:'m2',
  imalatCalcMode:'tek', // 'tek' | 'kenar' | 'poligon'
  imalatCalcMultiKenar:false,
  imalatCalcKenarlar:['','','','','',''],
  imalatCalcPoligon:[
    {uzunluk:'', aci:0},
    {uzunluk:'', aci:270},
    {uzunluk:'', aci:180},
    {uzunluk:'', aci:90}
  ],
  imalatCalcNot:'',
  imalatCalcPaketTamamla:{}
};

/* ======================= PERSISTENCE ======================= */
// Otomatik yedekleme dosyası: kullanıcının kendi seçtiği bir konumda (Drive/Dropbox
// klasörü, harici disk, telefonda bir klasör vs.) duran tek bir JSON dosyası. Bir kez
// seçildikten sonra HER veri değişikliğinde bu dosyaya otomatik yazılır ve uygulama HER
// açılışında öncelikle bu dosyadan okunur. Böylece "kendim yükledim" derdi ortadan kalkar.
let autoBackupHandleCache = null;
let autoBackupInfo = { name:null, active:false };
async function getAutoBackupHandle(){
  if(autoBackupHandleCache !== null) return autoBackupHandleCache;
  autoBackupHandleCache = await fsIdbGet(FS_AUTO_BACKUP_HANDLE_KEY);
  return autoBackupHandleCache;
}
async function refreshAutoBackupInfo(){
  try{
    const handle = await getAutoBackupHandle();
    if(handle){
      const perm = await handle.queryPermission({mode:'readwrite'});
      autoBackupInfo = { name: handle.name, active: perm==='granted' };
    } else {
      autoBackupInfo = { name:null, active:false };
    }
  }catch(e){
    autoBackupInfo = { name:null, active:false };
  }
}
async function writeAutoBackup(text){
  try{
    const handle = await getAutoBackupHandle();
    if(!handle) return false;
    const perm = await handle.queryPermission({mode:'readwrite'});
    if(perm!=='granted') return false;
    const writable = await handle.createWritable();
    await writable.write(text);
    await writable.close();
    return true;
  }catch(e){
    console.error('Otomatik yedekleme yazma hatası', e);
    return false;
  }
}
// Ham kayıt: state'i olduğu gibi depolar, "yedeklendi" bayrağına dokunmaz.
async function persistStateRaw(){
  const json = JSON.stringify(state);
  // 1) Tarayıcı önbelleği (localStorage): her cihaz/tarayıcıda çalışan, en güvenilir katman.
  //    Mobil dahil hemen hemen her tarayıcıda desteklenir; bu yüzden ana güvence budur.
  try{
    localStorage.setItem(currentLsCacheKey(), json);
  }catch(e){
    console.error('Tarayıcı önbelleğine kaydetme hatası', e);
  }
  // 2) Claude ortamı içindeyse (window.storage mevcutsa) onu da güncelle.
  if(typeof window.storage !== 'undefined'){
    try{
      await window.storage.set(STORAGE_KEY, json, false);
    }catch(e){
      console.error('Kaydetme hatası', e);
    }
  }
  // 3) Otomatik yedekleme konumu ayarlanmışsa (ve izin hâlâ geçerliyse) her kayıtta
  //    o dosyayı da güncelle. Bu isteğe bağlı bir ek güvencedir (özellikle masaüstünde);
  //    desteklenmiyorsa veya izin yoksa sessizce atlanır, hata göstermez.
  await writeAutoBackup(json);
  // 4) Firebase Realtime Database: hesabınıza bağlı, cihazlar arasında senkron olan
  //    bulut kopyası. Böylece bir cihazda girdiğiniz veri, aynı hesapla giriş yaptığınız
  //    diğer cihazlarda da görünür.
  if(typeof window.dnzDbSaveState === 'function'){
    try{
      lastCloudJsonSent = json;
      await window.dnzDbSaveState(json);
    }catch(e){
      console.error('Bulut kaydetme hatası', e);
    }
  }
}
// Gerçek zamanlı senkron: Realtime Database'de veri değiştiğinde (bu cihazdan ya da
// BAŞKA bir cihazdan) Firebase auth module script'i bu fonksiyonu çağırır. Kendi
// yazdığımız veri "yankı" olarak geri geldiyse ya da ekrandaki veriyle zaten aynıysa
// gereksiz yeniden çizimden kaçınırız; gerçekten farklı (uzak) bir değişiklikse state'i
// güncelleyip arayüzü yeniden çizeriz.
window.dnzApplyRemoteState = function(jsonString){
  if(jsonString === lastCloudJsonSent) return;
  if(jsonString === JSON.stringify(state)) return;
  try{
    const parsed = JSON.parse(jsonString);
    state = Object.assign(defaultState(), parsed);
    if(!state.projects) state.projects = {};
    try{ localStorage.setItem(currentLsCacheKey(), jsonString); }catch(e){ /* yoksay */ }
    lastCloudJsonSent = jsonString;
    renderAll();
    updateBackupBanner();
    showToast('Veriler başka bir cihazdan güncellendi.');
  }catch(e){
    console.error('Uzak veri uygulama hatası', e);
  }
};
// Normal veri değişikliklerinde çağrılır: veri değiştiği için "yedeklenmemiş değişiklik var" işaretlenir.
async function saveState(){
  state.dirtySinceBackup = true;
  await persistStateRaw();
  updateBackupBanner();
}
async function loadState(){
  // 0) Öncelik: Firebase hesabınıza bağlı bulut verisi (Realtime Database). Böylece
  //    farklı bir cihazda/tarayıcıda giriş yaptığınızda da aynı veriler karşınıza çıkar.
  try{
    if(typeof window.dnzDbLoadState === 'function'){
      const cloudRaw = await window.dnzDbLoadState();
      if(cloudRaw){
        const parsed = JSON.parse(cloudRaw);
        state = Object.assign(defaultState(), parsed);
        if(!state.projects) state.projects = {};
        state.dirtySinceBackup = false;
        return;
      }
    }
  }catch(e){ /* buluttan okunamazsa aşağıdaki yerel akışlara düş */ }

  // 1) Önce, kullanıcının seçtiği otomatik yedekleme dosyası var mı ve izin hâlâ
  //    geçerli mi diye bak. Varsa bu dosya ARTIK ana kaynaktır; doğrudan oradan yükle.
  try{
    const handle = await getAutoBackupHandle();
    if(handle){
      const perm = await handle.queryPermission({mode:'readwrite'});
      if(perm==='granted'){
        const text = await readBackupFromHandle(handle);
        if(text && text.trim()){
          const parsed = JSON.parse(text);
          state = Object.assign(defaultState(), parsed);
          if(!state.projects) state.projects = {};
          state.dirtySinceBackup = false;
          await syncStateToCloud();
          return;
        }
      }
    }
  }catch(e){ /* otomatik yedek dosyasından okunamazsa aşağıdaki normal akışa düş */ }

  // 2) Otomatik yedekleme konumu ayarlanmamışsa (veya okunamadıysa) tarayıcı önbelleğini
  //    (localStorage) dene — bu, hemen hemen her cihaz/tarayıcıda (mobil dahil) çalışır.
  let loadedFromCache = false;
  try{
    const raw = localStorage.getItem(currentLsCacheKey());
    if(raw){
      const parsed = JSON.parse(raw);
      state = Object.assign(defaultState(), parsed);
      if(!state.projects) state.projects = {};
      loadedFromCache = true;
    }
  }catch(e){ /* localStorage yoksa/okunamazsa aşağıdaki akışa düş */ }

  // 3) Tarayıcı önbelleğinde veri yoksa, Claude ortamındaysak window.storage'ı dene.
  if(!loadedFromCache){
    try{
      if(typeof window.storage !== 'undefined'){
        const r = await window.storage.get(STORAGE_KEY, false);
        if(r && r.value){
          const parsed = JSON.parse(r.value);
          state = Object.assign(defaultState(), parsed);
          if(!state.projects) state.projects = {};
        } else {
          state = defaultState();
        }
      } else {
        state = defaultState();
      }
    }catch(e){
      state = defaultState();
    }
  }
  // 4) Eski davranış: "Yedekten Geri Yükle" ile daha önce açılmış salt-okunur bir
  //    dosya hafızası varsa ve normal depo boşsa, izin istemeden otomatik dene.
  if(!state.activeProjectId && Object.keys(state.projects).length===0){
    try{
      const handle = await fsIdbGet(FS_BACKUP_HANDLE_KEY);
      if(handle){
        const perm = await handle.queryPermission({mode:'read'});
        if(perm==='granted'){
          const text = await readBackupFromHandle(handle);
          const parsed = JSON.parse(text);
          if(parsed && parsed.projects && Object.keys(parsed.projects).length>0){
            state = Object.assign(defaultState(), parsed);
            if(!state.projects) state.projects = {};
            state.dirtySinceBackup = false;
          }
        }
      }
    }catch(e){ /* otomatik geri yükleme başarısız olursa sessizce geç, normal state kalır */ }
  }
  // Bulutta (Realtime Database) henüz veri yoktu (yeni cihaz/ilk giriş) ama bu cihazda
  // yerelde veri bulunduysa: bu cihazdaki veriyi buluta gönderelim ki bundan sonra
  // hangi cihazdan girilirse girilsin aynı veriler görünsün.
  await syncStateToCloud();
}
// state'i (mevcut değişikliğe dokunmadan, sadece "gönder") Realtime Database'e yazar.
async function syncStateToCloud(){
  if(typeof window.dnzDbSaveState !== 'function') return;
  try{
    await window.dnzDbSaveState(JSON.stringify(state));
  }catch(e){
    console.error('Bulut ilk senkron hatası', e);
  }
}
function hasAnyData(){
  return Object.values(state.projects||{}).some(p=> (p.metrajRows&&p.metrajRows.length) || (p.teklifRows&&p.teklifRows.length));
}
function needsBackupWarning(){
  return hasAnyData() && state.dirtySinceBackup===true;
}
function fmtBackupDate(ts){
  if(!ts) return 'Henüz yedekleme yapılmadı';
  const d = new Date(ts);
  const pad = n=>String(n).padStart(2,'0');
  return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function updateBackupBanner(){
  const el = document.getElementById('backupBanner');
  if(!el) return;
  if(needsBackupWarning()){
    el.style.display = 'flex';
  } else {
    el.style.display = 'none';
  }
}

/* ======================= HELPERS ======================= */
function activeProject(){
  if(!state.activeProjectId) return null;
  return state.projects[state.activeProjectId] || null;
}
function fmtNum(n){
  if(n===null||n===undefined||isNaN(n)) n=0;
  return Number(n).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtMoney(n){
  if(n===null||n===undefined||isNaN(n)) n=0;
  return Number(n).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+' TL';
}
function todayStr(){
  const d = new Date();
  return d.toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric'});
}
// ISO (YYYY-MM-DD) formatında bugünün tarihi — <input type="date"> alanlarında varsayılan
// değer olarak ve tarih aralığı karşılaştırmalarında kullanılır (todayStr() DD.MM.YYYY
// döndürdüğü için karşılaştırmaya uygun değildir).
function isoToday(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function isoMonthStart(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
}
// Eskiden bazı formlarda varsayılan tarih yanlışlıkla "GG.AA.YYYY" (görüntü) formatında
// kaydedilmişti; bu değerleri tarih aralığı filtrelerinin doğru çalışması için ISO
// "YYYY-MM-DD" formatına çevirir. Zaten ISO formatındaki değerlere dokunmaz.
function fixLegacyDateStr(v){
  if(!v) return v;
  const m = /^(\d{2})\.(\d{2})\.(\d{4})$/.exec(v);
  if(m) return `${m[3]}-${m[2]}-${m[1]}`;
  return v;
}
function esc(s){
  return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function showToast(msg, ms=2400){
  const t = document.getElementById('toastRoot');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove('show'), ms);
}
function addMemory(project, field, value){
  if(!value) return;
  value = value.trim();
  if(!value) return;
  if(!project.memory[field]) project.memory[field]=[];
  if(!project.memory[field].some(v=>v.toLowerCase()===value.toLowerCase())){
    project.memory[field].push(value);
  }
}
// Baştaki/sondaki boşluk ve büyük/küçük harf farkını yok sayarak karşılaştırma anahtarı üretir.
// (Örn. "Duvar", " Duvar" ve "duvar" aynı kabul edilir.) Filtreleme ve İcmal gruplamasında
// aynı kaydın yanlışlıkla farklı gruplara/ filtre seçeneklerine düşmesini engeller.
function normKey(v){ return (v==null?'':String(v)).trim().toLocaleLowerCase('tr'); }
function distinctFromRows(rows, field){
  const map = new Map(); // normalize edilmiş anahtar -> gösterilecek (trimlenmiş) değer
  rows.forEach(r=>{
    const raw = r[field];
    if(raw==null) return;
    const trimmed = String(raw).trim();
    if(!trimmed) return;
    const key = normKey(trimmed);
    if(!map.has(key)) map.set(key, trimmed);
  });
  return Array.from(map.values()).sort((a,b)=>a.localeCompare(b,'tr'));
}
function resizeImageDataUrl(dataUrl, maxDim=320, quality=0.82){
  return new Promise((resolve)=>{
    try{
      const img = new Image();
      img.onload = ()=>{
        let width = img.width, height = img.height;
        if(width>maxDim || height>maxDim){
          if(width>=height){ height = Math.round(height*maxDim/width); width = maxDim; }
          else { width = Math.round(width*maxDim/height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0,0,width,height);
        ctx.drawImage(img,0,0,width,height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = ()=>resolve(dataUrl);
      img.src = dataUrl;
    }catch(e){ resolve(dataUrl); }
  });
}

/* ======================= RIPPLE ======================= */
document.addEventListener('pointerdown', (e)=>{
  const target = e.target.closest('.glass, .btn, .icon-btn, .tab-btn, .project-item, select, .card');
  if(!target) return;
  const rect = target.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height) * 1.6;
  const span = document.createElement('span');
  span.className = 'ripple-el';
  span.style.width = size+'px';
  span.style.height = size+'px';
  span.style.left = (e.clientX - rect.left - size/2)+'px';
  span.style.top = (e.clientY - rect.top - size/2)+'px';
  const prevPos = getComputedStyle(target).position;
  if(prevPos==='static') target.style.position='relative';
  if(getComputedStyle(target).overflow==='visible') target.style.overflow='hidden';
  target.appendChild(span);
  setTimeout(()=>span.remove(), 720);
}, {passive:true});

/* ======================= CALC ======================= */
function computeRow(row){
  const adet = parseFloat(row.adet)||1;
  const uzunluk = parseFloat(row.uzunluk)||1;
  const yukseklik = row.yukseklik!==''&&row.yukseklik!==null&&row.yukseklik!==undefined ? (parseFloat(row.yukseklik)||1) : 1;
  const kisaKenar = row.kisaKenar!==''&&row.kisaKenar!==null&&row.kisaKenar!==undefined ? (parseFloat(row.kisaKenar)||1) : 1;
  const minha = parseFloat(row.minha)||0;
  const toplam = adet*uzunluk*yukseklik*kisaKenar;
  const altToplam = toplam - minha;
  return { toplam: Math.round(toplam*100)/100, altToplam: Math.round(altToplam*100)/100 };
}

function saveMetrajRow(proj){
  // Blok/Kat/Daire/Mekân/Uygulama Yeri/İmalat Cinsi serbest metin alanlarındaki baştaki/
  // sondaki boşlukları temizliyoruz. Aksi halde "Duvar" ve "Duvar " (sonda boşluk) İcmal'de
  // farklı kayıtlar gibi ayrı ayrı toplanıyordu.
  ['blok','kat','daire','mekan','eleman','imalat'].forEach(f=>{
    if(typeof metrajForm[f]==='string') metrajForm[f] = metrajForm[f].trim();
  });
  const c = computeRow(metrajForm);
  const row = Object.assign({}, metrajForm, {toplam:c.toplam, altToplam:c.altToplam});
  if(!row.mekan && !row.imalat && !row.blok){
    showToast('Lütfen en azından Blok, Mekân veya İmalat Cinsi girin.');
    return;
  }
  if(row.id){
    const idx = proj.metrajRows.findIndex(r=>r.id===row.id);
    if(idx>-1) proj.metrajRows[idx] = row;
  } else {
    row.id = uid();
    row.createdAt = Date.now();
    proj.metrajRows.push(row);
  }
  ['blok','kat','daire','mekan','eleman','imalat'].forEach(f=>addMemory(proj, f, row[f]));
  saveState();
  metrajForm = emptyMetrajForm();
  renderMain();
  showToast('Metraj satırı kaydedildi.');
}

function icmalFilteredRows(proj){
  return proj.metrajRows.filter(r=>{
    return ['blok','kat','daire','mekan'].every(f=> !ui.icmalFilters[f] || normKey(r[f])===normKey(ui.icmalFilters[f]));
  });
}
function groupIcmalRows(rows){
  const map = new Map();
  rows.forEach(r=>{
    // Uygulama Yeri / İmalat Cinsi serbest metin olduğu için baştaki/sondaki boşluk ve
    // büyük/küçük harf farkları (ör. "Duvar" / "duvar ") normalize edilerek aynı grupta toplanır.
    const eleman = (r.eleman||'').toString().trim() || '(Belirtilmemiş)';
    const imalat = (r.imalat||'').toString().trim() || '(Belirtilmemiş)';
    const birim = r.birim || 'm2';
    const key = [normKey(eleman), normKey(imalat), birim].join('|');
    if(!map.has(key)) map.set(key, {eleman, imalat, birim, toplam:0, altToplam:0, adet:0});
    const g = map.get(key);
    g.toplam += (parseFloat(r.toplam)||0);
    g.altToplam += (parseFloat(r.altToplam)||0);
    g.adet += 1;
  });
  return Array.from(map.values()).sort((a,b)=>{
    return a.eleman.localeCompare(b.eleman,'tr') || a.imalat.localeCompare(b.imalat,'tr');
  });
}

    <div style="margin-top:18px;">
      <div style="font-size:11px;font-weight:700;margin-bottom:4px;">Genel Toplamlar</div>

    </div>
    <div style="margin-top:36px;font-size:9px;color:#8096A3;">DNZ Metraj &amp; Teklif Yönetimi ile oluşturulmuştur.</div>
  `;
  try{

    console.error(e);
    showToast('PDF oluşturulurken bir sorun oluştu.');

function saveTeklifRow(proj){
  const miktar = parseFloat(teklifForm.miktar)||0;
  const birimFiyat = parseFloat(teklifForm.birimFiyat)||0;
  if(!teklifForm.aciklama.trim()){ showToast('Lütfen açıklama girin.'); return; }
  const row = {
    id: teklifForm.id || uid(),
    aciklama: teklifForm.aciklama.trim(),
    miktar, birim: teklifForm.birim, birimFiyat,
    tutar: Math.round(miktar*birimFiyat*100)/100
  };
  if(teklifForm.id){
    const idx = proj.teklifRows.findIndex(r=>r.id===row.id);
    if(idx>-1) proj.teklifRows[idx]=row;
  } else {
    proj.teklifRows.push(row);
  }
  saveState();
  teklifForm = emptyTeklifForm();
  renderMain();
  showToast('Teklif kalemi kaydedildi.');
}

function renderTeklifTable(proj){
  const wrap = document.getElementById('teklifTableWrap');
  if(proj.teklifRows.length===0){
    wrap.innerHTML = `<div class="empty-state">Henüz teklif kalemi eklenmedi.</div>`;
    return;
  }
  wrap.innerHTML = `
    <table>
      <thead><tr><th>Açıklama</th><th class="num">Miktar</th><th>Birim</th><th class="num">Birim Fiyat</th><th class="num">Tutar</th><th></th></tr></thead>
      <tbody>
        ${proj.teklifRows.map(r=>`
          <tr data-id="${r.id}">
            <td>${esc(r.aciklama)}</td>
            <td class="num">${fmtNum(r.miktar)}</td>
            <td>${UNIT_LABEL[r.birim]||r.birim}</td>
            <td class="num">${fmtNum(r.birimFiyat)}</td>
            <td class="num" style="font-weight:700;">${fmtMoney(r.tutar)}</td>
            <td>
              <div class="row-actions">
                <button class="icon-btn" data-act="edit" title="Düzenle">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                </button>
                <button class="icon-btn danger" data-act="delete" title="Sil">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0l-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6h16z"/></svg>
                </button>
              </div>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
  wrap.querySelectorAll('tr[data-id]').forEach(tr=>{
    tr.addEventListener('click',(e)=>{
      const act = e.target.closest('[data-act]')?.dataset.act;
      if(!act) return;
      const id = tr.dataset.id;
      if(act==='edit'){
        teklifForm = Object.assign({}, proj.teklifRows.find(r=>r.id===id));
        renderMain(); window.scrollTo({top:0, behavior:'smooth'});
      } else if(act==='delete'){
        confirmModal('Bu teklif kalemini silmek istediğinize emin misiniz?', ()=>{
          proj.teklifRows = proj.teklifRows.filter(r=>r.id!==id);
          saveState(); renderMain();
          showToast('Kalem silindi.');
        });
      }
    });
  });
}

function renderTeklifTotals(proj){
  const el = document.getElementById('teklifTotals');
  const total = proj.teklifRows.reduce((s,r)=>s+(parseFloat(r.tutar)||0),0);
  el.innerHTML = `<div class="total-chip"><span class="lbl">Genel Toplam</span><span class="val">${fmtMoney(total)}</span></div>`;
}

/* ======================= İMALAT SİSTEMLERİ TAB ======================= */
// Bu modül projeden bağımsız, genel (tüm projelerde ortak) bir malzeme/reçete

function renderImalatTanimSection(sub){
  const sistemler = state.imalatSistemleri.slice().sort((a,b)=>a.ad.localeCompare(b.ad,'tr'));
  const selected = sistemler.find(s=>s.id===ui.imalatSelectedId) || null;
  sub.innerHTML = `

          <div class="project-item ${s.id===ui.imalatSelectedId?'active':''}" data-id="${s.id}">
            <div class="pinfo">
              <b>${esc(s.ad)}</b>
              <span>${s.malzemeler.length} malzeme kalemi</span>
            </div>
            <button class="icon-btn" data-act="select" title="Malzeme Listesini Aç/Kapat">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
            <button class="icon-btn" data-act="edit" title="Adını Güncelle">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            </button>
            <button class="icon-btn danger" data-act="delete" title="Sil">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0l-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6h16z"/></svg>
            </button>
          </div>
        `).join('')}

  document.getElementById('btnSaveSistem').onclick = ()=>saveImalatSistem();

  if(clearBtn) clearBtn.onclick = ()=>{ imalatSistemForm = emptyImalatSistemForm(); renderImalatTab(document.getElementById('mainContent')); };
  document.getElementById('imalatSistemList').addEventListener('click',(e)=>{
    const item = e.target.closest('.project-item');
    if(!item) return;
    const id = item.dataset.id;
    const act = e.target.closest('[data-act]')?.dataset.act || 'select';
    if(act==='select'){
      ui.imalatSelectedId = (ui.imalatSelectedId===id ? null : id);
      imalatMalzemeForm = emptyImalatMalzemeForm();
      renderImalatTab(document.getElementById('mainContent'));
    } else if(act==='edit'){
      const s = state.imalatSistemleri.find(x=>x.id===id);
      imalatSistemForm = {id:s.id, ad:s.ad};
      renderImalatTab(document.getElementById('mainContent'));
      window.scrollTo({top:0, behavior:'smooth'});

function bindImalatMalzemeSectionEvents(sistem){
  ['ad','birim','sarfiyat','ebat','paketAdet','alisFiyat','satisFiyat'].forEach(k=>{

  if(wrap) wrap.querySelectorAll('tr[data-id]').forEach(tr=>{
    tr.addEventListener('click',(e)=>{
      const act = e.target.closest('[data-act]')?.dataset.act;
      if(!act) return;
      const id = tr.dataset.id;
      if(act==='edit'){
        const m = sistem.malzemeler.find(x=>x.id===id);
        imalatMalzemeForm = Object.assign({}, m);
        renderImalatTab(document.getElementById('mainContent'));
        window.scrollTo({top:0, behavior:'smooth'});
      } else if(act==='delete'){
        confirmModal('Bu malzemeyi silmek istediğinize emin misiniz?', ()=>{
          sistem.malzemeler = sistem.malzemeler.filter(x=>x.id!==id);
          saveState(); renderImalatTab(document.getElementById('mainContent'));
          showToast('Malzeme silindi.');
        });
      }
    });
  });
}

function saveImalatSistem(){

  imalatSistemForm = emptyImalatSistemForm();

  showToast('İmalat sistemi kaydedildi.');
}

function saveImalatMalzeme(sistem){
  const ad = (imalatMalzemeForm.ad||'').trim();
  const birim = (imalatMalzemeForm.birim||'').trim() || 'adet';
  const sarfiyat = parseFloat(String(imalatMalzemeForm.sarfiyat).replace(',','.'));
  if(!ad){ showToast('Lütfen malzeme adı girin.'); return; }
  if(isNaN(sarfiyat)){ showToast('Lütfen sarfiyat değeri girin.'); return; }
  const ebatRaw = imalatMalzemeForm.ebat;
  const ebatVal = (ebatRaw!==''&&ebatRaw!==null&&ebatRaw!==undefined) ? parseFloat(String(ebatRaw).replace(',','.')) : NaN;
  const paketRaw = imalatMalzemeForm.paketAdet;
  const paketVal = (paketRaw!==''&&paketRaw!==null&&paketRaw!==undefined) ? parseFloat(String(paketRaw).replace(',','.')) : NaN;
  const row = {
    id: imalatMalzemeForm.id || uid(),
    ad, birim, sarfiyat,
    ebat: (!isNaN(ebatVal) && ebatVal>0) ? ebatVal : null,
    paketAdet: (!isNaN(paketVal) && paketVal>0) ? paketVal : null,
    alisFiyat: parseFloat(String(imalatMalzemeForm.alisFiyat).replace(',','.'))||0,
    satisFiyat: parseFloat(String(imalatMalzemeForm.satisFiyat).replace(',','.'))||0
  };
  if(imalatMalzemeForm.id){
    const idx = sistem.malzemeler.findIndex(x=>x.id===row.id);
    if(idx>-1) sistem.malzemeler[idx] = row;

  saveState();
  imalatMalzemeForm = emptyImalatMalzemeForm();
  renderImalatTab(document.getElementById('mainContent'));
  showToast('Malzeme kaydedildi.');
}

/* ---- Bölüm 2: Hesaplama paneli ---- */
// "3x5" / "3*5" / "3×5" gibi bir girişi genişlik x uzunluk kabul edip m² olarak
// hesaplar; aksi halde girilen sayıyı, seçilen birime (m² ya da mt) göre doğrudan kullanır.
function parseAlanInput(str, unit){
  const s = (str==null?'':String(str)).trim().toLowerCase().replace(/,/g,'.');
  if(!s) return {value:null, unit, isArea:false};
  const m = s.match(/^(\d+(?:\.\d+)?)\s*[x×*]\s*(\d+(?:\.\d+)?)$/);
  if(m){
    const w = parseFloat(m[1]), l = parseFloat(m[2]);
    return {value: Math.round(w*l*100)/100, unit:'m2', isArea:true};
  }
  const num = parseFloat(s);
  if(isNaN(num)) return {value:null, unit, isArea:false};
  return {value: Math.round(num*100)/100, unit, isArea:false};
}

// Bir oda/mekanın birden fazla kenarı (duvarı) olabilir. Kullanıcı her kenarı ayrı ayrı
// girer (en fazla 6 kenar), sistem doldurulmuş olan kenarları toplayıp tek bir
// alan/uzunluk değeri olarak hesaplama motoruna verir. Örn: 3, 4, 3, 4 girilirse toplam 14
// (girilen birime göre m² ya da mt) olarak hesaplanır; her kenar hücresine "3x5" gibi
// genişlik x uzunluk de girilebilir.
function computeKenarToplam(kenarlar, unit){
  const detay = [];
  let toplam = 0;
  (kenarlar||[]).forEach((k,i)=>{
    const p = parseAlanInput(k, unit);
    if(p.value!=null){ toplam += p.value; detay.push({index:i, girdi:k, value:p.value}); }
  });
  return { toplam: detay.length? Math.round(toplam*100)/100 : null, detay };
}

// Bir malzeme kalemi için, girilen ölçü (deger) üzerinden gereken miktarı hesaplar.
// Ebat (parça boyu) tanımlıysa sonucu yukarı yuvarlayıp tam parça sayısını da döndürür.
// Örnek: sarfiyat 2.55, deger 50 -> ham 127.5; ebat 3 -> 43 parça -> 129 (mt).
function computeMalzemeSonuc(malzeme, deger, opts){
  opts = opts || {};
  const sarfiyat = parseFloat(malzeme.sarfiyat)||0;
  const raw = (deger!=null) ? sarfiyat*deger : 0;
  let miktar = raw, adetNote = null, paketNote = null;
  const paketAdet = parseFloat(malzeme.paketAdet)||0;
  if(malzeme.ebat && malzeme.ebat>0){
    let parca = Math.ceil((raw - 1e-9)/malzeme.ebat);
    if(opts.paketTamamla && paketAdet>0){
      parca = Math.ceil((parca - 1e-9)/paketAdet)*paketAdet;
      paketNote = parca/paketAdet;
    }
    miktar = Math.round(parca*malzeme.ebat*100)/100;
    adetNote = parca;
  } else if(String(malzeme.birim).toLowerCase()==='adet'){
    let parca = Math.ceil(raw - 1e-9);
    if(opts.paketTamamla && paketAdet>0){
      parca = Math.ceil((parca - 1e-9)/paketAdet)*paketAdet;
      paketNote = parca/paketAdet;
    }
    miktar = parca;
  } else {
    miktar = Math.round(raw*100)/100;
  }
  const tutar = miktar*(parseFloat(malzeme.satisFiyat)||0);
  const maliyet = miktar*(parseFloat(malzeme.alisFiyat)||0);
  return { raw: Math.round(raw*100)/100, miktar, adetNote, paketNote, tutar: Math.round(tutar*100)/100, maliyet: Math.round(maliyet*100)/100 };
}

// ---- Poligon (köşeli / L-T-U-Z şeklinde oda) alan hesaplama — AutoCAD'deki "AREA"
// komutuna benzer şekilde çalışır. Kullanıcı fotoğraftaki gibi her kenarın uzunluğunu ve
// yönünü (sağa/sola/yukarı/aşağı) sırayla girer; sistem (0,0) noktasından başlayarak
// köşe noktalarını çıkarır ve kapalı şeklin alanını "ayakkabı bağcığı" (shoelace)
// formülüyle hesaplar. Bu yöntem, iç içe geçmiş/basamaklı (L, T, U, Z) odalarda
// dikdörtgenleri tek tek toplamanın aksine ortak alanları bir kez sayar.
// Eski kayıtlarda kenarlar "yon" (sağ/sol/yukarı/aşağı) ile tutuluyordu; yeni sistemde
// her kenarın serbest bir açısı (derece, 0-359) var. Bu fonksiyon geriye dönük uyumluluk
// için eski "yon" değerini açıya çevirir, yeni kayıtlarda doğrudan "aci" kullanılır.
function getEdgeAci(e){
  if(e && e.aci!=null && e.aci!==''){ const v=parseFloat(e.aci); if(!isNaN(v)) return ((v%360)+360)%360; }
  const map = {sag:0, asagi:270, sol:180, yukari:90};
  if(e && e.yon && map[e.yon]!=null) return map[e.yon];
  return 0;
}
function tracePoligonVertices(edges){
  let x=0, y=0;
  const points = [{x,y,srcEdgeIndex:-1}];
  (edges||[]).forEach((e,idx)=>{
    const len = parseFloat(String(e.uzunluk).replace(',','.'));
    if(!len || len<=0 || isNaN(len)) return;
    const rad = getEdgeAci(e)*Math.PI/180;
    x += len*Math.cos(rad);
    y += len*Math.sin(rad);
    points.push({x,y,srcEdgeIndex:idx});
  });
  return points;
}
// Sürükleme sırasında, verilen kenar indeksinden hemen önceki (o kenarın başlangıç
// noktası olan) kümülatif konumu hesaplar — sadece geçerli (uzunluğu girilmiş) kenarları sayar.
function computePointBeforeEdge(edges, edgeIdx){
  let x=0, y=0;
  for(let i=0;i<edgeIdx;i++){
    const e = edges[i];
    const len = parseFloat(String(e.uzunluk).replace(',','.'));
    if(!len || len<=0 || isNaN(len)) continue;
    const rad = getEdgeAci(e)*Math.PI/180;
    x += len*Math.cos(rad); y += len*Math.sin(rad);
  }
  return {x,y};
}
function computePoligonAlan(edges){
  const points = tracePoligonVertices(edges);
  const kenarSayisi = points.length-1;
  if(kenarSayisi < 3) return { alan:null, points, kapali:false, kenarSayisi };
  let sum = 0;
  for(let i=0;i<points.length;i++){
    const p1 = points[i];
    const p2 = points[(i+1)%points.length];
    sum += (p1.x*p2.y - p2.x*p1.y);
  }
  const alan = Math.round(Math.abs(sum/2)*100)/100;
  const last = points[points.length-1];
  const kapali = Math.abs(last.x)<0.02 && Math.abs(last.y)<0.02;
  return { alan, points, kapali, kenarSayisi };
}
// Model (metre) koordinatını SVG viewBox koordinatına çevirir. SVG'de y ekseni aşağı
// doğru arttığından, doğal (yukarı=yukarı) görünmesi için ters çeviriyoruz.
function poligonToSvgPoint(p, meta){
  return { x:(p.x-meta.minX+meta.pad), y:(meta.vbH-(p.y-meta.minY+meta.pad)) };
}
// Girilen kenarlardan oluşan şeklin SVG önizlemesini üretir. Köşe noktaları
// (ilki yeşil=sabit referans, sonuncusu kırmızı, aradakiler lacivert) fare/parmakla
// sürüklenebilir; her kenarın üzerinde canlı ölçü (metre) etiketi gösterilir.
function renderPoligonSvgPreview(points){
  const valid = (points||[]).filter(p=>!(p.x===0&&p.y===0)) ;
  if(!points || points.length<2 || valid.length===0){
    return `<div class="empty-state">Kenar uzunluğu ve açılarını girdikçe şekil burada canlı olarak çizilecek. Ayrıca köşe noktalarını fare/parmakla sürükleyerek de ölçü ve açıyı ayarlayabilirsiniz.</div>`;
  }
  const xs = points.map(p=>p.x), ys = points.map(p=>p.y);
  const minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
  const w = Math.max(maxX-minX, 0.5), h = Math.max(maxY-minY, 0.5);
  const pad = Math.max(w,h)*0.24 || 1;
  const vbW = w+pad*2, vbH = h+pad*2;
  const sw = Math.max(vbW,vbH)*0.012;
  const meta = {minX,minY,pad,vbH};
  return buildPoligonSvgMarkup(points, meta, sw, vbW, vbH) + `
    <p class="hint" style="text-align:center;margin-top:6px;">Köşe noktalarını (yeşil / lacivert / kırmızı) sürükleyerek ölçü ve açıyı serbestçe ayarlayabilirsiniz — açı otomatik olarak en yakın 15°'ye yuvarlanır.</p>
  `;
}
function buildPoligonSvgMarkup(points, meta, sw, vbW, vbH){
  const pts = points.map(p=>poligonToSvgPoint(p, meta));
  const polyStr = pts.map(p=>`${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(' ');
  const r = sw*1.9;
  const fontSize = sw*2.6;
  const labels = [];
  for(let i=1;i<points.length;i++){
    const p1 = pts[i-1], p2 = pts[i];
    const midX=(p1.x+p2.x)/2, midY=(p1.y+p2.y)/2;
    let angleDeg = Math.atan2(p2.y-p1.y, p2.x-p1.x)*180/Math.PI;
    if(angleDeg>90 || angleDeg<-90) angleDeg += 180;
    const len = Math.hypot(points[i].x-points[i-1].x, points[i].y-points[i-1].y);
    const offset = fontSize*0.85;
    labels.push(`<text id="polLabel${i}" x="${midX.toFixed(2)}" y="${(midY-offset).toFixed(2)}" transform="rotate(${angleDeg.toFixed(2)} ${midX.toFixed(2)} ${midY.toFixed(2)})" text-anchor="middle" font-size="${fontSize.toFixed(2)}" font-weight="700" fill="#0B2436" style="paint-order:stroke;stroke:#fff;stroke-width:${(fontSize*0.22).toFixed(2)};stroke-linejoin:round;">${fmtNum(len)} m</text>`);
  }
  const circles = pts.map((p,i)=>{
    const isFirst = i===0, isLast = i===pts.length-1;
    const fill = isFirst? '#22A99F' : (isLast? '#E8776B' : '#1C6E8C');
    const draggable = i>0 && points[i].srcEdgeIndex>=0;
    return `<circle id="polV${i}" cx="${p.x.toFixed(2)}" cy="${p.y.toFixed(2)}" r="${r.toFixed(3)}" fill="${fill}" stroke="#fff" stroke-width="${(sw*0.35).toFixed(3)}" ${draggable?`data-pol-vertex="${points[i].srcEdgeIndex}" style="cursor:grab;touch-action:none;"`:''}/>`;
  }).join('');
  return `
    <svg id="poligonSvg" viewBox="0 0 ${vbW.toFixed(2)} ${vbH.toFixed(2)}" data-pol-meta='${esc(JSON.stringify(meta))}' style="width:100%;max-width:420px;height:auto;background:rgba(255,255,255,0.55);border-radius:12px;display:block;margin:0 auto;touch-action:none;">
      <polygon id="polShape" points="${polyStr}" fill="rgba(47,211,199,0.30)" stroke="#1C6E8C" stroke-width="${sw.toFixed(3)}"/>
      ${labels.join('')}
      ${circles}
    </svg>
  `;
}
// Sürükleme sırasında SVG'yi (ve içindeki tüm HTML'i) baştan çizmeden, sadece ilgili
// DOM elemanlarının konum/metnini güncelleyerek yeniden çizer. Böylece sürüklenen
// nokta DOM'dan kopmaz ve fare/parmak takibi kesilmez.
function updatePoligonSvgLive(edges){
  const svg = document.getElementById('poligonSvg');
  if(!svg) return;
  let meta;
  try{ meta = JSON.parse(svg.dataset.polMeta); }catch(e){ return; }
  const points = tracePoligonVertices(edges);
  const pts = points.map(p=>poligonToSvgPoint(p, meta));
  const poly = document.getElementById('polShape');
  if(poly) poly.setAttribute('points', pts.map(p=>`${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(' '));
  pts.forEach((p,i)=>{
    const c = document.getElementById('polV'+i);
    if(c){ c.setAttribute('cx', p.x.toFixed(2)); c.setAttribute('cy', p.y.toFixed(2)); }
  });
  for(let i=1;i<points.length;i++){
    const p1=pts[i-1], p2=pts[i];
    const midX=(p1.x+p2.x)/2, midY=(p1.y+p2.y)/2;
    let angleDeg = Math.atan2(p2.y-p1.y,p2.x-p1.x)*180/Math.PI;
    if(angleDeg>90||angleDeg<-90) angleDeg+=180;
    const len = Math.hypot(points[i].x-points[i-1].x, points[i].y-points[i-1].y);
    const t = document.getElementById('polLabel'+i);
    if(t){
      const fontSize = parseFloat(t.getAttribute('font-size'))||10;
      const offset = fontSize*0.85;
      t.setAttribute('x', midX.toFixed(2));
      t.setAttribute('y', (midY-offset).toFixed(2));
      t.setAttribute('transform', `rotate(${angleDeg.toFixed(2)} ${midX.toFixed(2)} ${midY.toFixed(2)})`);
      t.textContent = fmtNum(len)+' m';
    }
  }
}
// Sürükleme sırasında ilgili kenarın "Uzunluk" ve "Açı" giriş alanlarını (liste
// görünümünde) tam yeniden çizim yapmadan canlı günceller.
function updatePoligonEdgeInputsLive(edgeIdx){
  const lenInp = document.querySelector(`[data-pol-len="${edgeIdx}"]`);
  if(lenInp) lenInp.value = ui.imalatCalcPoligon[edgeIdx].uzunluk;
  const aciSel = document.querySelector(`[data-pol-aci="${edgeIdx}"]`);
  if(aciSel) aciSel.value = String(ui.imalatCalcPoligon[edgeIdx].aci);
}
let poligonDragRaf = null;
function schedulePoligonDragUpdate(edgeIdx){
  if(poligonDragRaf) return;
  poligonDragRaf = requestAnimationFrame(()=>{
    poligonDragRaf = null;
    updatePoligonSvgLive(ui.imalatCalcPoligon);
    updatePoligonEdgeInputsLive(edgeIdx);
    updateHesapPanel({skipPoligonSvg:true});
  });
}
// SVG üzerindeki sürüklenebilir köşe noktalarına fare/dokunma olaylarını bağlar.
// updateHesapPanel her tetiklendiğinde (skipPoligonSvg olmadan) SVG'yi baştan çizdiği
// için bu fonksiyon her tam yeniden çizimden sonra tekrar çağrılmalıdır.
function bindPoligonSvgEvents(){
  const svg = document.getElementById('poligonSvg');
  if(!svg) return;
  svg.querySelectorAll('[data-pol-vertex]').forEach(circle=>{
    circle.addEventListener('pointerdown', onPoligonVertexPointerDown);
  });
}
function onPoligonVertexPointerDown(e){
  e.preventDefault();
  const svg = document.getElementById('poligonSvg');
  if(!svg) return;
  const target = e.currentTarget;
  const edgeIdx = parseInt(target.dataset.polVertex,10);
  target.style.cursor = 'grabbing';
  const onMove = (ev)=>{
    const meta = JSON.parse(svg.dataset.polMeta);
    const pt = svg.createSVGPoint();
    pt.x = ev.clientX; pt.y = ev.clientY;
    const ctm = svg.getScreenCTM();
    if(!ctm) return;
    const svgP = pt.matrixTransform(ctm.inverse());
    const modelX = svgP.x - meta.pad + meta.minX;
    const modelY = (meta.vbH - svgP.y) - meta.pad + meta.minY;
    const prevPoint = computePointBeforeEdge(ui.imalatCalcPoligon, edgeIdx);
    const dx = modelX - prevPoint.x, dy = modelY - prevPoint.y;
    const length = Math.hypot(dx,dy);
    if(length < 0.03) return; // çok küçük hareketleri yoksay (titreşim/rastgele açı önlenir)
    let rawAngle = Math.atan2(dy,dx)*180/Math.PI;
    if(rawAngle<0) rawAngle += 360;
    let snapped = Math.round(rawAngle/15)*15;
    if(snapped>=360) snapped -= 360;
    ui.imalatCalcPoligon[edgeIdx].aci = snapped;
    ui.imalatCalcPoligon[edgeIdx].uzunluk = String(Math.round(length*100)/100);
    schedulePoligonDragUpdate(edgeIdx);
  };
  const onUp = ()=>{
    target.style.cursor = 'grab';
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    document.removeEventListener('pointercancel', onUp);
    updateHesapPanel();
  };
  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
  document.addEventListener('pointercancel', onUp);
}

// Aktif ui durumuna göre (tekli ölçü / çoklu kenar toplamı / poligon alan) hesaplamada
// kullanılacak değeri ve birimini döndürür. exportHesapAnalizPdf da aynı fonksiyonu
// kullanır, böylece ekrandaki sonuç ile PDF çıktısı her zaman birebir aynı olur.
function getHesapDeger(){
  if(ui.imalatCalcMode==='poligon'){
    const {alan, points, kapali, kenarSayisi} = computePoligonAlan(ui.imalatCalcPoligon);
    return { value: alan, unit:'m2', isArea:false, isKenar:false, isPoligon:true, poligonKapali:kapali, poligonPoints:points, poligonKenarSayisi:kenarSayisi };
  }
  if(ui.imalatCalcMode==='kenar'){
    const {toplam, detay} = computeKenarToplam(ui.imalatCalcKenarlar, ui.imalatCalcUnit);
    return { value: toplam, unit: ui.imalatCalcUnit, isArea:false, isKenar:true, kenarDetay:detay };
  }
  const parsed = parseAlanInput(ui.imalatCalcInput, ui.imalatCalcUnit);
  return { value: parsed.value, unit: parsed.unit, isArea: parsed.isArea, isKenar:false };
}

function updateHesapPanel(opts){
  opts = opts || {};
  const sistem = state.imalatSistemleri.find(s=>s.id===ui.imalatCalcSistemId) || null;
  const parsed = getHesapDeger();
  const dispEl = document.getElementById('hesapDegerDisplay');
  if(dispEl) dispEl.textContent = parsed.value!=null ? fmtNum(parsed.value)+' '+(parsed.unit==='m2'?'m²':'mt') : '—';
  const noteEl = document.getElementById('hesapAlanNote');
  if(noteEl){
    if(parsed.isPoligon){
      if(parsed.poligonKenarSayisi<3){
        noteEl.textContent = 'Alan hesaplanabilmesi için en az 3 kenar uzunluğu girin.';
      } else if(parsed.value!=null){
        noteEl.textContent = `${parsed.poligonKenarSayisi} kenarlı şeklin alanı: ${fmtNum(parsed.value)} m² olarak hesaplandı.` + (parsed.poligonKapali ? '' : ' Uyarı: girilen kenarlarla şekil tam kapanmıyor, ölçüleri kontrol edin (yine de en yakın kapalı şekle göre hesaplandı).');
      } else {
        noteEl.textContent = '';
      }
    } else if(parsed.isKenar && parsed.value!=null){
      const ifade = parsed.kenarDetay.map(d=>fmtNum(d.value)).join(' + ');
      noteEl.textContent = `${parsed.kenarDetay.length} kenar toplamı: ${ifade} = ${fmtNum(parsed.value)} ${parsed.unit==='m2'?'m²':'mt'} olarak hesaplandı.`;
    } else if(parsed.isArea && parsed.value!=null){
      noteEl.textContent = `Girilen ölçü "${ui.imalatCalcInput}" → ${fmtNum(parsed.value)} m² olarak hesaplandı.`;
    } else {
      noteEl.textContent = '';
    }
  }
  const polWrap = document.getElementById('hesapPoligonPreview');
  if(polWrap && !opts.skipPoligonSvg){
    polWrap.innerHTML = renderPoligonSvgPreview(parsed.poligonPoints);
    bindPoligonSvgEvents();
  }
  const titleEl = document.getElementById('hesapSistemAdi');
  if(titleEl) titleEl.textContent = sistem ? '— '+sistem.ad : '';
  const wrap = document.getElementById('hesapSonucWrap');
  if(wrap) wrap.innerHTML = renderHesapSonucHtml(sistem, parsed.value, parsed.unit);
  const tot = document.getElementById('hesapTotals');
  if(tot) tot.innerHTML = renderHesapTotalsHtml(sistem, parsed.value);
  const bmEl = document.getElementById('hesapBirimMaliyetDisplay');
  if(bmEl){
    const {toplamTutar} = computeHesapToplamlar(sistem, parsed.value);
    const bm = computeBirimMaliyet(toplamTutar, parsed.value);
    bmEl.textContent = bm!=null ? `${fmtMoney(bm)} / ${parsed.unit==='m2'?'m²':'mt'}` : '—';
  }
  if(sistem) bindHesapSonucEvents(sistem, parsed.value, parsed.unit);
}

// Malzeme Sonuç Paneli'ndeki "Birim Fiyat" alanlarını (kendi fiyatınızı girebilmeniz için)
// ve "Paket Tamamla" onay kutularını dinler. Fiyat değiştikçe ilgili satırın Tutar'ı ve
// alttaki toplamlar anında güncellenir; tabloyu baştan çizmediğimiz için yazarken odak
// (focus) kaybolmaz. Değişiklik saveState() ile kalıcı olarak kaydedilir.
function bindHesapSonucEvents(sistem, deger, unit){
  const wrap = document.getElementById('hesapSonucWrap');
  if(!wrap) return;
  const refreshTotals = ()=>{
    const tot = document.getElementById('hesapTotals');
    if(tot) tot.innerHTML = renderHesapTotalsHtml(sistem, deger);
    const bmEl = document.getElementById('hesapBirimMaliyetDisplay');
    if(bmEl){
      const {toplamTutar} = computeHesapToplamlar(sistem, deger);
      const bm = computeBirimMaliyet(toplamTutar, deger);
      bmEl.textContent = bm!=null ? `${fmtMoney(bm)} / ${unit==='m2'?'m²':'mt'}` : '—';
    }
  };
  wrap.querySelectorAll('[data-fiyat-id]').forEach(inp=>{
    inp.addEventListener('input', e=>{
      const id = e.target.dataset.fiyatId;
      const m = sistem.malzemeler.find(x=>x.id===id);
      if(!m) return;
      m.satisFiyat = parseFloat(String(e.target.value).replace(',','.'))||0;
      const r = computeMalzemeSonuc(m, deger, getPaketOpts(id));
      const tutarCell = wrap.querySelector(`[data-tutar-id="${id}"]`);
      if(tutarCell) tutarCell.textContent = fmtMoney(r.tutar);
      refreshTotals();
    });
    inp.addEventListener('change', ()=>{ saveState(); });
  });
  wrap.querySelectorAll('[data-paket-id]').forEach(chk=>{
    chk.addEventListener('change', e=>{
      const id = e.target.dataset.paketId;
      if(!ui.imalatCalcPaketTamamla) ui.imalatCalcPaketTamamla = {};
      ui.imalatCalcPaketTamamla[id] = e.target.checked;
      updateHesapPanel();
    });
  });
}

// Toplam satış tutarını, hesaplanan metraja (m² ya da mt) bölerek birim maliyeti verir.
// Örnek: Toplam Satış Tutarı 10000 TL, Hesaplanan Değer 1000 m² -> birim maliyet 10 TL/m².
function computeBirimMaliyet(toplamTutar, metraj){
  const t = parseFloat(toplamTutar);
  if(isNaN(t) || !metraj || metraj<=0) return null;
  return Math.round((t/metraj)*100)/100;
}

// Bir malzeme için "Paket Tamamla" kutusu işaretlenmiş mi kontrol eder ve
// computeMalzemeSonuc'a geçilecek opts nesnesini döndürür.
function getPaketOpts(malzemeId){
  return { paketTamamla: !!(ui.imalatCalcPaketTamamla && ui.imalatCalcPaketTamamla[malzemeId]) };
}

// Hesaplanan tam parça/adet sayısını, malzemenin paket içi adedine göre
// "7 paket 1 adet" gibi paket + kalan adet ifadesine çevirir. Paket içi adet
// tanımlı değilse düz "85 adet" olarak döner.
function formatPaketAdetNote(pieceCount, paketAdet){
  if(pieceCount==null) return null;
  const pa = parseFloat(paketAdet)||0;
  if(pa>0){
    const paket = Math.floor(pieceCount + 1e-9)/pa;
    const paketTam = Math.floor(paket + 1e-9);
    const kalan = Math.round((pieceCount - paketTam*pa)*100)/100;
    if(paketTam>0 && kalan>0) return `${paketTam} paket ${kalan} adet`;
    if(paketTam>0 && kalan<=0) return `${paketTam} paket`;
    return `${kalan} adet`;
  }
  return `${pieceCount} adet`;
}

function renderHesapSonucHtml(sistem, deger, basisUnit){
  if(!sistem) return `<div class="empty-state">Lütfen bir imalat sistemi seçin.</div>`;
  if(!sistem.malzemeler.length) return `<div class="empty-state">Bu sistemde henüz malzeme tanımlı değil. Önce "Sistem &amp; Malzeme Tanımı" bölümünden malzeme ekleyin.</div>`;
  if(deger==null) return `<div class="empty-state">Hesaplama için yukarıya bir ölçü/alan girin.</div>`;
  const basisLabel = basisUnit==='mt' ? 'mt' : 'm²';
  return `
    <table>
      <thead><tr><th>Malzeme</th><th>Sarfiyat</th><th class="num">Ebat</th><th>Ürün Satış Birimi</th><th class="num">Birim Fiyat</th><th class="num">Hesaplanan Miktar</th><th class="num">Tutar</th><th class="num">Paket Tamamla</th></tr></thead>
      <tbody>
        ${sistem.malzemeler.map(m=>{
          const opts = getPaketOpts(m.id);
          const r = computeMalzemeSonuc(m, deger, opts);
          const birimLabel = UNIT_LABEL[m.birim]||m.birim;
          const isAdetBirim = String(birimLabel).toLowerCase()==='adet';
          const pieceCount = r.adetNote!=null ? r.adetNote : (isAdetBirim ? r.miktar : null);
          let adetNoteHtml = '';
          if(pieceCount!=null && !(isAdetBirim && !m.paketAdet)){
            adetNoteHtml = `<div style="font-size:0.72rem;font-weight:500;color:var(--ink-soft);">(${formatPaketAdetNote(pieceCount, m.paketAdet)})</div>`;
          }
          return `<tr>
            <td>${esc(m.ad)}</td>
            <td>${fmtNum(m.sarfiyat)} ${esc(birimLabel)}/${basisLabel}</td>
            <td class="num">${m.ebat? fmtNum(m.ebat)+' '+esc(birimLabel) : '—'}</td>
            <td>${esc(birimLabel)}</td>
            <td class="num">
              <input class="mono" type="number" step="any" data-fiyat-id="${m.id}" value="${esc(m.satisFiyat)}" style="width:92px;text-align:right;padding:6px 8px;border-radius:8px;border:1px solid rgba(11,36,54,0.15);background:rgba(255,255,255,0.7);">
            </td>
            <td class="num" style="font-weight:700;">
              <span data-miktar-id="${m.id}">${fmtNum(r.miktar)} ${esc(birimLabel)}</span>
              <div data-adetnote-id="${m.id}">${adetNoteHtml}</div>
            </td>
            <td class="num" data-tutar-id="${m.id}">${fmtMoney(r.tutar)}</td>
            <td class="num">${m.paketAdet? `<label style="display:inline-flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap;"><input type="checkbox" data-paket-id="${m.id}" ${opts.paketTamamla?'checked':''}> <span style="font-size:0.72rem;color:var(--ink-soft);">${fmtNum(m.paketAdet)}/paket</span></label>` : '—'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

// Sistem malzemelerinden toplam maliyet/satış tutarı/kâr hesaplar. Birim Maliyet de
// buradaki Toplam Satış Tutarı'na göre türetildiği için hem ekran hem PDF çıktısı
// (Malzeme Sonuç Paneli ile Teklif Analizi) her zaman aynı rakamı gösterir.
function computeHesapToplamlar(sistem, deger){
  if(!sistem || deger==null || !sistem.malzemeler.length) return { toplamTutar:0, toplamMaliyet:0, kar:0 };
  let toplamTutar=0, toplamMaliyet=0;
  sistem.malzemeler.forEach(m=>{
    const r = computeMalzemeSonuc(m, deger, getPaketOpts(m.id));
    toplamTutar += r.tutar; toplamMaliyet += r.maliyet;
  });
  return { toplamTutar, toplamMaliyet, kar: toplamTutar-toplamMaliyet };
}

function renderHesapTotalsHtml(sistem, deger){
  if(!sistem || deger==null || !sistem.malzemeler.length) return '';
  const {toplamTutar, toplamMaliyet, kar} = computeHesapToplamlar(sistem, deger);
  return `
    <div class="total-chip"><span class="lbl">Toplam Maliyet</span><span class="val">${fmtMoney(toplamMaliyet)}</span></div>
    <div class="total-chip"><span class="lbl">Toplam Satış Tutarı</span><span class="val">${fmtMoney(toplamTutar)}</span></div>
    <div class="total-chip"><span class="lbl">Tahmini Kâr</span><span class="val">${fmtMoney(kar)}</span></div>
  `;
}

  if(personelForm.cikisTarihi && personelForm.cikisTarihi < personelForm.girisTarihi){
    showToast('Çıkış tarihi, giriş tarihinden önce olamaz.'); return;
  }
  const row = {
    id: personelForm.id || uid(),
    adSoyad: personelForm.adSoyad.trim(),
    babaAdi: personelForm.babaAdi.trim(),
    kimlikNo: personelForm.kimlikNo.trim(),
    banka: personelForm.banka.trim(),
    pozisyon: personelForm.pozisyon.trim(),
    girisTarihi: personelForm.girisTarihi,
    cikisTarihi: personelForm.cikisTarihi,
    yevmiye: parseFloat(personelForm.yevmiye)||0,
    puantaj: (proj.personel.find(p=>p.id===personelForm.id)||{}).puantaj || {},
    mesai: (proj.personel.find(p=>p.id===personelForm.id)||{}).mesai || {}
  };
  if(personelForm.id){
    const idx = proj.personel.findIndex(p=>p.id===row.id);
    if(idx>-1) proj.personel[idx]=row;
  } else {
    proj.personel.push(row);
  }
  saveState();
  personelForm = emptyPersonelForm();
  renderMain();
  showToast('Personel kartı kaydedildi.');
}

function personelStatus(p){
  if(!p.cikisTarihi) return {text:'Aktif', cls:'aktif'};
  const today = new Date(); today.setHours(0,0,0,0);
  const cikis = new Date(p.cikisTarihi);
  return cikis < today ? {text:'Ayrılmış', cls:'ayrilmis'} : {text:'Aktif', cls:'aktif'};
}
function fmtDateStr(iso){
  if(!iso) return '—';
  const [y,m,d] = iso.split('-');
  return `${d}.${m}.${y}`;
}
