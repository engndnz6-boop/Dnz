/* ======================= PUANTAJ / MESAİ TAB ======================= */
const ATT_SEQ = ['','X','Y','O'];
const ATT_VALUE = {X:1, Y:0.5, O:0};
const GUN_KISA = ['Pz','Pt','Sa','Ça','Pe','Cu','Ct'];

function ymParts(ym){ const [y,m] = ym.split('-').map(Number); return {y,m}; }
function daysInMonth(ym){ const {y,m} = ymParts(ym); return new Date(y, m, 0).getDate(); }
function dateKeyFor(ym, day){ const {m,y} = ymParts(ym); return `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`; }
function isWeekendDay(ym, day){ const {y,m} = ymParts(ym); return [0,6].includes(new Date(y, m-1, day).getDay()); }
function dowLabel(ym, day){ const {y,m} = ymParts(ym); return GUN_KISA[new Date(y, m-1, day).getDay()]; }

// Seçilen ay içinde "işte olan" personel: giriş tarihi ay sonuna kadar gelmiş,
// çıkış tarihi (varsa) ay başından önce olmayan kişiler.
function activePersonelForMonth(proj, ym){
  const {y,m} = ymParts(ym);
  const firstDay = new Date(y, m-1, 1);
  const lastDay = new Date(y, m, 0);
  return (proj.personel||[]).filter(p=>{
    if(!p.girisTarihi) return false;
    const giris = new Date(p.girisTarihi);
    if(giris > lastDay) return false;
    if(p.cikisTarihi){
      const cikis = new Date(p.cikisTarihi);
      if(cikis < firstDay) return false;
    }
    return true;
  }).sort((a,b)=>a.adSoyad.localeCompare(b.adSoyad,'tr'));
}
// Bir güne ait hücrenin düzenlenebilir olup olmadığı: giriş tarihinden önce
// ve çıkış tarihinden sonraki günlerde işlem yapılamaz (çıkış verilmiş personel için).
function dayEditable(p, ym, day){
  const key = dateKeyFor(ym, day);
  if(p.girisTarihi && key < p.girisTarihi) return false;
  if(p.cikisTarihi && key > p.cikisTarihi) return false;
  return true;
}
function personelPuantajToplam(p, ym){
  const n = daysInMonth(ym);
  let total = 0;
  for(let d=1; d<=n; d++){
    const key = dateKeyFor(ym, d);
    const val = p.puantaj && p.puantaj[key];
    if(val) total += ATT_VALUE[val] || 0;
  }
  return total;
}
function personelMesaiToplam(p, ym){
  const n = daysInMonth(ym);
  let total = 0;
  for(let d=1; d<=n; d++){
    const key = dateKeyFor(ym, d);
    const val = parseFloat(p.mesai && p.mesai[key]);
    if(val) total += val;
  }
  return total;
}

/* ---- İki tarih arası (serbest aralık) hesaplamalar: Personeller ve Toplu Hesap
   sekmelerinde, tek bir aya bağlı kalmadan istenen herhangi bir dönem için kullanılır.
   Puantaj/mesai kayıtları zaten "YYYY-MM-DD" biçiminde saklandığından, ay sınırı gözetmeden
   doğrudan tarih aralığı üzerinden okunabilir. ---- */
function datesInRange(start, end){
  if(!start || !end || start>end) return [];
  const out = [];
  let d = new Date(start+'T00:00:00');
  const endD = new Date(end+'T00:00:00');
  while(d <= endD){
    out.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
    d.setDate(d.getDate()+1);
  }
  return out;
}
// Bir personelin, verilen tarih aralığındaki X/Y/O (Tam Gün/Yarım Gün/İzinli-Yok) dağılımı
// ve toplam çalışılan gün sayısını (X=1, Y=0.5, O=0) döndürür.
function personelPuantajDetailInRange(p, start, end){
  const dates = datesInRange(start, end);
  let tam=0, yarim=0, izin=0;
  dates.forEach(key=>{
    const val = p.puantaj && p.puantaj[key];
    if(val==='X') tam++;
    else if(val==='Y') yarim++;
    else if(val==='O') izin++;
  });
  return { tam, yarim, izin, toplamGun: tam + yarim*0.5, dates };
}
function personelMesaiInRange(p, start, end){
  const dates = datesInRange(start, end);
  let total = 0;
  dates.forEach(key=>{
    const val = parseFloat(p.mesai && p.mesai[key]);
    if(val) total += val;
  });
  return total;
}
function personelAvansListInRange(proj, personelId, start, end){
  return (proj.avanslar||[]).filter(a=> a.personelId===personelId && a.odemeTarihi>=start && a.odemeTarihi<=end)
    .slice().sort((a,b)=> (a.odemeTarihi||'').localeCompare(b.odemeTarihi||''));
}
function personelAvansToplamInRange(proj, personelId, start, end){
  return personelAvansListInRange(proj, personelId, start, end).reduce((s,a)=> s+(parseFloat(a.tutar)||0), 0);
}
// Projedeki tüm personel için, verilen tarih aralığında çalışılan gün, mesai saati, hakediş,
// alınan avans ve kalan bakiyeyi hesaplar; "Toplu Çalışan Hesabı" (topluhesap) sekmesinde kullanılır.
function topluHesapRows(proj, start, end){
  const list = (proj.personel||[]).slice().sort((a,b)=>a.adSoyad.localeCompare(b.adSoyad,'tr'));
  const rows = list.map(p=>{
    const det = personelPuantajDetailInRange(p, start, end);
    const mesaiSaat = personelMesaiInRange(p, start, end);
    const yevmiye = parseFloat(p.yevmiye)||0;
    const saatlik = yevmiye/8;
    const hakedis = det.toplamGun*yevmiye + mesaiSaat*saatlik;
    const avans = personelAvansToplamInRange(proj, p.id, start, end);
    return { p, gun: det.toplamGun, tam: det.tam, yarim: det.yarim, izin: det.izin, mesaiSaat, hakedis, avans, kalan: hakedis-avans };
  });
  const totals = rows.reduce((acc,r)=>{
    acc.gun += r.gun; acc.mesaiSaat += r.mesaiSaat; acc.hakedis += r.hakedis; acc.avans += r.avans; acc.kalan += r.kalan;
    return acc;
  }, {gun:0, mesaiSaat:0, hakedis:0, avans:0, kalan:0});
  return { rows, totals };
}

function renderPuantajTable(proj, opts){
  opts = opts || {};
  const wrapId = opts.wrapId || 'puantajTableWrap';
  const ym = opts.ym || ui.puantajAy;
  const wrap = document.getElementById(wrapId);
  const list = opts.list || activePersonelForMonth(proj, ym);
  if(list.length===0){
    wrap.innerHTML = `<div class="empty-state">Bu ay için işte olan (giriş yapılmış ve çıkışı verilmemiş) personel bulunamadı.</div>`;
    return;
  }
  const n = daysInMonth(ym);
  const days = Array.from({length:n}, (_,i)=>i+1);

  const dayTotals = days.map(d=>{
    const key = dateKeyFor(ym, d);
    return list.reduce((s,p)=>{
      const val = p.puantaj && p.puantaj[key];
      return s + (val ? (ATT_VALUE[val]||0) : 0);
    }, 0);
  });
  const grandTotal = dayTotals.reduce((s,v)=>s+v,0);
  const grandTutar = list.reduce((s,p)=> s + personelPuantajToplam(p, ym) * (parseFloat(p.yevmiye)||0), 0);

  wrap.innerHTML = `
    <table class="att-table">
      <thead>
        <tr>
          <th class="name-cell">Adı Soyadı</th>
          ${days.map(d=>`<th class="${isWeekendDay(ym,d)?'wknd':''}">${d}<br>${dowLabel(ym,d)}</th>`).join('')}
          <th>Toplam</th>
          <th>Tutar</th>
        </tr>
      </thead>
      <tbody>
        ${list.map(p=>{
          const gunToplam = personelPuantajToplam(p, ym);
          const tutar = gunToplam * (parseFloat(p.yevmiye)||0);
          return `
          <tr data-emp="${p.id}">
            <td class="name-cell">${esc(p.adSoyad)}</td>
            ${days.map(d=>{
              const editable = dayEditable(p, ym, d);
              const key = dateKeyFor(ym, d);
              const val = (p.puantaj && p.puantaj[key]) || '';
              return `<td class="${isWeekendDay(ym,d)?'wknd':''}"><button class="att-cell" data-day="${d}" data-val="${val}" ${editable?'':'disabled'}>${val}</button></td>`;
            }).join('')}
            <td class="total-cell" data-puantaj-total="${p.id}">${fmtNum(gunToplam)}</td>
            <td class="total-cell" data-puantaj-tutar="${p.id}">${fmtMoney(tutar)}</td>
          </tr>`;
        }).join('')}
      </tbody>
      <tfoot>
        <tr>
          <td class="name-cell">Toplam</td>
          ${dayTotals.map((t,i)=>`<td class="${isWeekendDay(ym,i+1)?'wknd':''}">${t?fmtNum(t):''}</td>`).join('')}
          <td data-puantaj-grand>${fmtNum(grandTotal)}</td>
          <td>${fmtMoney(grandTutar)}</td>
        </tr>
      </tfoot>
    </table>
  `;
  wrap.querySelectorAll('button.att-cell').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const tr = btn.closest('tr[data-emp]');
      const p = proj.personel.find(x=>x.id===tr.dataset.emp);
      if(!p) return;
      const day = parseInt(btn.dataset.day, 10);
      const key = dateKeyFor(ym, day);
      const cur = p.puantaj[key] || '';
      const next = ATT_SEQ[(ATT_SEQ.indexOf(cur)+1) % ATT_SEQ.length];
      if(next===''){ delete p.puantaj[key]; } else { p.puantaj[key] = next; }
      saveState();
      renderPuantajTable(proj, opts);
    });
  });
  const chipWrap = document.createElement('div');
  chipWrap.className = 'totals-strip';
  chipWrap.style.marginTop = '10px';
  chipWrap.innerHTML = `
    <div class="total-chip"><span class="lbl">Alt Toplam (Adam/Gün)</span><span class="val">${fmtNum(grandTotal)}</span></div>
    <div class="total-chip"><span class="lbl">Alt Toplam Tutar</span><span class="val">${fmtMoney(grandTutar)}</span></div>
  `;
  wrap.appendChild(chipWrap);
}

            <td>${fmtMoney(grandTutar)}</td>
          </tr>
        </tfoot>
      </table>
    `;
    wrap.querySelectorAll('input.mesai-input').forEach(inp=>{
      inp.addEventListener('change', ()=>{
        const tr = inp.closest('tr[data-emp]');
        const p = proj.personel.find(x=>x.id===tr.dataset.emp);
        if(!p) return;
        const day = parseInt(inp.dataset.day, 10);
        const key = dateKeyFor(ym, day);
        const hrs = parseFloat(inp.value);
        if(!hrs || hrs<=0){ delete p.mesai[key]; } else { p.mesai[key] = hrs; }
        saveState();
        renderRows();
      });
    });
    const chipWrap = document.createElement('div');
    chipWrap.className = 'totals-strip';
    chipWrap.style.marginTop = '10px';
    chipWrap.innerHTML = `
      <div class="total-chip"><span class="lbl">Alt Toplam Saat</span><span class="val">${fmtNum(grandHrs)}</span></div>
      <div class="total-chip"><span class="lbl">Alt Toplam Tutar</span><span class="val">${fmtMoney(grandTutar)}</span></div>
    `;
    wrap.appendChild(chipWrap);
  };
  renderRows();
}

async function exportPuantajMesaiPdf(proj){
  showToast('PDF hazırlanıyor…');
  const ym = ui.puantajAy;
  const list = activePersonelForMonth(proj, ym);
  const n = daysInMonth(ym);
  const days = Array.from({length:n}, (_,i)=>i+1);
  const {y,m} = ymParts(ym);
  const ayAdi = new Date(y, m-1, 1).toLocaleDateString('tr-TR',{month:'long', year:'numeric'});

  if(list.length===0){
    showToast('Bu ay için gösterilecek personel yok.');
    return;
  }

  const cellStyle = 'border:1px solid #E4EFEF;padding:3px 1px;text-align:center;font-size:10px;font-weight:700;line-height:1.1;';
  const wkndStyle = 'background:#FBEDEA;';
  const nameStyle = 'border:1px solid #E4EFEF;padding:5px 6px;text-align:left;font-weight:700;word-break:break-word;width:120px;font-size:11px;';
  const bigStyle = 'border:1px solid #E4EFEF;padding:5px 3px;text-align:center;font-size:11px;width:62px;white-space:nowrap;';

  const puantajHead = `
    <tr style="background:#EAF6F5;">
      <th style="${nameStyle}">Adı Soyadı</th>
      ${days.map(d=>`<th style="${cellStyle}${isWeekendDay(ym,d)?wkndStyle:''}">${d}</th>`).join('')}
      <th style="${bigStyle}">Toplam</th>
      <th style="${bigStyle}">Tutar</th>
    </tr>`;
  const puantajRows = list.map(p=>`
    <tr>
      <td style="${nameStyle}">${esc(p.adSoyad)}</td>
      ${days.map(d=>{
        const key = dateKeyFor(ym,d);
        const val = (p.puantaj && p.puantaj[key]) || '';
        return `<td style="${cellStyle}${isWeekendDay(ym,d)?wkndStyle:''}">${val}</td>`;
      }).join('')}
      <td style="${bigStyle}font-weight:700;">${fmtNum(personelPuantajToplam(p, ym))}</td>
      <td style="${bigStyle}font-weight:700;">${fmtMoney(personelPuantajToplam(p, ym)*(parseFloat(p.yevmiye)||0))}</td>
    </tr>`).join('');
  const puantajDayTotals = days.map(d=>{
    const key = dateKeyFor(ym,d);
    return list.reduce((s,p)=> s + ((p.puantaj && p.puantaj[key]) ? (ATT_VALUE[p.puantaj[key]]||0) : 0), 0);
  });
  const puantajGrand = puantajDayTotals.reduce((s,v)=>s+v,0);
  const puantajGrandTutar = list.reduce((s,p)=> s + personelPuantajToplam(p, ym) * (parseFloat(p.yevmiye)||0), 0);
  const puantajFoot = `
    <tr style="background:#EAF6F5;font-weight:700;">
      <td style="${nameStyle}">Toplam</td>
      ${puantajDayTotals.map((t,i)=>`<td style="${cellStyle}${isWeekendDay(ym,i+1)?wkndStyle:''}">${t?fmtNum(t):''}</td>`).join('')}
      <td style="${bigStyle}">${fmtNum(puantajGrand)}</td>
      <td style="${bigStyle}">${fmtMoney(puantajGrandTutar)}</td>
    </tr>`;

  const mesaiHead = `
    <tr style="background:#EAF6F5;">
      <th style="${nameStyle}">Adı Soyadı</th>
      ${days.map(d=>`<th style="${cellStyle}${isWeekendDay(ym,d)?wkndStyle:''}">${d}</th>`).join('')}
      <th style="${bigStyle}">Saat</th><th style="${bigStyle}">Tutar</th>
    </tr>`;
  const mesaiRows = list.map(p=>{
    const saatlik = (parseFloat(p.yevmiye)||0)/8;
    const toplamSaat = personelMesaiToplam(p, ym);
    return `
    <tr>
      <td style="${nameStyle}">${esc(p.adSoyad)}</td>
      ${days.map(d=>{
        const key = dateKeyFor(ym,d);
        const val = (p.mesai && p.mesai[key]) || '';
        return `<td style="${cellStyle}${isWeekendDay(ym,d)?wkndStyle:''}">${val||''}</td>`;
      }).join('')}
      <td style="${bigStyle}font-weight:700;">${fmtNum(toplamSaat)}</td>
      <td style="${bigStyle}font-weight:700;">${fmtMoney(toplamSaat*saatlik)}</td>
    </tr>`;
  }).join('');
  const mesaiDayTotals = days.map(d=>{
    const key = dateKeyFor(ym,d);
    return list.reduce((s,p)=> s + (parseFloat(p.mesai && p.mesai[key]) || 0), 0);
  });
  const mesaiGrandHrs = mesaiDayTotals.reduce((s,v)=>s+v,0);
  const mesaiGrandTutar = list.reduce((s,p)=> s + personelMesaiToplam(p, ym) * ((parseFloat(p.yevmiye)||0)/8), 0);
  const mesaiFoot = `
    <tr style="background:#EAF6F5;font-weight:700;">
      <td style="${nameStyle}">Toplam</td>
      ${mesaiDayTotals.map((t,i)=>`<td style="${cellStyle}${isWeekendDay(ym,i+1)?wkndStyle:''}">${t?fmtNum(t):''}</td>`).join('')}
      <td style="${bigStyle}">${fmtNum(mesaiGrandHrs)}</td>
      <td style="${bigStyle}">${fmtMoney(mesaiGrandTutar)}</td>
    </tr>`;

  const html = `
    ${pdfHeaderHtml(proj, 'Puantaj ve Mesai Cetveli — ' + ayAdi)}
    <div style="font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;margin-bottom:6px;color:#1C6E8C;">Puantaj Cetveli</div>
    <table style="width:100%;border-collapse:collapse;font-size:6.5px;table-layout:fixed;margin-bottom:8px;">
      <thead>${puantajHead}</thead>
      <tbody>${puantajRows}</tbody>
      <tfoot>${puantajFoot}</tfoot>
    </table>
    <div style="font-size:9px;color:#345264;margin-bottom:18px;">Alt Toplam (Adam/Gün): <b>${fmtNum(puantajGrand)}</b> &nbsp;|&nbsp; Alt Toplam Tutar: <b>${fmtMoney(puantajGrandTutar)}</b> &nbsp;|&nbsp; X=Tam Gün(1), Y=Yarım Gün(0,5), O=Yok/İzinli(0)</div>

    <div style="font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;margin-bottom:6px;color:#1C6E8C;">Mesai Cetveli</div>
    <table style="width:100%;border-collapse:collapse;font-size:6.5px;table-layout:fixed;">
      <thead>${mesaiHead}</thead>
      <tbody>${mesaiRows}</tbody>
      <tfoot>${mesaiFoot}</tfoot>
    </table>
    <div style="font-size:9px;color:#345264;margin-top:8px;">Alt Toplam Saat: <b>${fmtNum(mesaiGrandHrs)}</b> &nbsp;|&nbsp; Alt Toplam Tutar: <b>${fmtMoney(mesaiGrandTutar)}</b> &nbsp;|&nbsp; Saatlik ücret = Yevmiye / 8</div>

    <div style="margin-top:36px;font-size:9px;color:#8096A3;">DNZ Metraj &amp; Teklif Yönetimi ile oluşturulmuştur.</div>
  `;
  try{
    await renderNodeToPdf(html, `puantaj-mesai-${ym}-${proj.name.replace(/[^a-z0-9ığüşöç]+/gi,'_')}.pdf`, 'l');
    showToast('Puantaj & Mesai PDF indirildi.');
  }catch(e){
    console.error(e);
    showToast('PDF oluşturulurken bir sorun oluştu.');
  }
}

function saveAvansRow(proj){
  if(!avansForm.personelId){ showToast('Lütfen personel seçin.'); return; }
  if(!avansForm.odemeTarihi){ showToast('Lütfen ödeme tarihini girin.'); return; }
  const tutar = parseFloat(avansForm.tutar)||0;
  if(tutar<=0){ showToast('Lütfen geçerli bir tutar girin.'); return; }
  const p = proj.personel.find(x=>x.id===avansForm.personelId);
  const row = {
    id: avansForm.id || uid(),
    personelId: avansForm.personelId,
    adSoyad: p ? p.adSoyad : '(silinmiş personel)',
    odemeTarihi: avansForm.odemeTarihi,
    odemeSekli: avansForm.odemeSekli,
    aciklama: avansForm.aciklama.trim(),
    tutar
  };
  if(avansForm.id){
    const idx = proj.avanslar.findIndex(r=>r.id===row.id);
    if(idx>-1) proj.avanslar[idx]=row;
  } else {
    proj.avanslar.push(row);
  }
  saveState();
  avansForm = emptyAvansForm();
  renderMain();
  showToast('Avans kaydedildi.');
}

function filteredAvans(proj){
  return (proj.avanslar||[]).filter(a=> !ui.avansFilterId || a.personelId===ui.avansFilterId)
    .slice().sort((a,b)=> (b.odemeTarihi||'').localeCompare(a.odemeTarihi||''));
}

function renderAvansTable(proj){
  const wrap = document.getElementById('avansTableWrap');
  const rows = filteredAvans(proj);
  const totalsEl = document.getElementById('avansTotals');
  if(rows.length===0){
    wrap.innerHTML = `<div class="empty-state">Kayıtlı avans bulunamadı.</div>`;
    totalsEl.innerHTML = '';
    return;
  }
  wrap.innerHTML = `
    <table>
      <thead><tr><th>Adı Soyadı</th><th>Tarih</th><th>Ödeme Şekli</th><th>Açıklama</th><th class="num">Tutar</th><th></th></tr></thead>
      <tbody>
        ${rows.map(r=>`
          <tr data-id="${r.id}">
            <td>${esc(r.adSoyad)}</td>
            <td>${fmtDateStr(r.odemeTarihi)}</td>
            <td>${esc(r.odemeSekli)}</td>
            <td>${esc(r.aciklama)||'—'}</td>
            <td class="num">${fmtMoney(r.tutar)}</td>
            <td>
              <div class="row-actions">
                <button class="icon-btn" data-act="edit" title="Düzenle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button>
                <button class="icon-btn danger" data-act="delete" title="Sil"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0l-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6h16z"/></svg></button>
              </div>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>
  `;
  const total = rows.reduce((s,r)=>s+(parseFloat(r.tutar)||0),0);
  totalsEl.innerHTML = `<div class="total-chip"><span class="lbl">Alt Toplam</span><span class="val">${fmtMoney(total)}</span></div>`;
  wrap.querySelectorAll('tr[data-id]').forEach(tr=>{
    tr.addEventListener('click',(e)=>{
      const act = e.target.closest('[data-act]')?.dataset.act;
      if(!act) return;
      const r = proj.avanslar.find(x=>x.id===tr.dataset.id);
      if(!r) return;
      if(act==='edit'){
        avansForm = {id:r.id, personelId:r.personelId, odemeTarihi:r.odemeTarihi, odemeSekli:r.odemeSekli, aciklama:r.aciklama, tutar:String(r.tutar)};
        renderMain(); window.scrollTo({top:0, behavior:'smooth'});
      } else if(act==='delete'){
        confirmModal('Bu avans kaydını silmek istediğinize emin misiniz?', ()=>{
          proj.avanslar = proj.avanslar.filter(x=>x.id!==r.id);
          saveState(); renderMain();
          showToast('Avans kaydı silindi.');
        });
      }
    });
  });
}

function saveZimmetRow(proj){
  if(!zimmetForm.personelId){ showToast('Lütfen personel seçin.'); return; }
  if(!zimmetForm.zimmetTarihi){ showToast('Lütfen zimmet tarihini girin.'); return; }
  if(!zimmetForm.markaModel.trim()){ showToast('Lütfen marka/model girin.'); return; }
  if(zimmetForm.teslimTarihi && zimmetForm.teslimTarihi < zimmetForm.zimmetTarihi){
    showToast('Teslim tarihi, zimmet tarihinden önce olamaz.'); return;
  }
  const p = proj.personel.find(x=>x.id===zimmetForm.personelId);
  const row = {
    id: zimmetForm.id || uid(),
    personelId: zimmetForm.personelId,
    adSoyad: p ? p.adSoyad : '(silinmiş personel)',
    zimmetTarihi: zimmetForm.zimmetTarihi,
    markaModel: zimmetForm.markaModel.trim(),
    aciklama: zimmetForm.aciklama.trim(),
    teslimTarihi: zimmetForm.teslimTarihi
  };
  if(zimmetForm.id){
    const idx = proj.zimmetler.findIndex(r=>r.id===row.id);
    if(idx>-1) proj.zimmetler[idx]=row;
  } else {
    proj.zimmetler.push(row);
  }
  saveState();
  zimmetForm = emptyZimmetForm();
  renderMain();
  showToast('Zimmet kaydedildi.');
}

function filteredZimmet(proj){
  return (proj.zimmetler||[]).filter(z=> !ui.zimmetFilterId || z.personelId===ui.zimmetFilterId)
    .slice().sort((a,b)=> (b.zimmetTarihi||'').localeCompare(a.zimmetTarihi||''));

              <div class="row-actions">
                <button class="icon-btn" data-act="edit" title="Düzenle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button>
                <button class="icon-btn danger" data-act="delete" title="Sil"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0l-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6h16z"/></svg></button>
              </div>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>
  `;
  wrap.querySelectorAll('tr[data-id]').forEach(tr=>{
    tr.addEventListener('click',(e)=>{
      const act = e.target.closest('[data-act]')?.dataset.act;
      if(!act) return;
      const r = proj.zimmetler.find(x=>x.id===tr.dataset.id);
      if(!r) return;
      if(act==='edit'){
        zimmetForm = {id:r.id, personelId:r.personelId, zimmetTarihi:r.zimmetTarihi, markaModel:r.markaModel, aciklama:r.aciklama, teslimTarihi:r.teslimTarihi};
        renderMain(); window.scrollTo({top:0, behavior:'smooth'});
      } else if(act==='delete'){
        confirmModal('Bu zimmet kaydını silmek istediğinize emin misiniz?', ()=>{
          proj.zimmetler = proj.zimmetler.filter(x=>x.id!==r.id);
          saveState(); renderMain();
          showToast('Zimmet kaydı silindi.');
        });
      }
    });
  });
}

/* ======================= TOPLU İCMAL TAB ======================= */
function personelToplamGunTumZaman(p){
  if(!p.puantaj) return 0;
  return Object.values(p.puantaj).reduce((s,v)=> s + (ATT_VALUE[v]||0), 0);
}
function personelToplamMesaiTumZaman(p){
  if(!p.mesai) return 0;
  return Object.values(p.mesai).reduce((s,v)=> s + (parseFloat(v)||0), 0);
}
function personelToplamAvans(proj, personelId){
  return (proj.avanslar||[]).filter(a=>a.personelId===personelId).reduce((s,a)=>s+(parseFloat(a.tutar)||0),0);
}
function projeCalisanaOdenecekToplam(proj){
  return (proj.personel||[]).reduce((s,p)=>{
    const yevmiye = parseFloat(p.yevmiye)||0;
    const gun = personelToplamGunTumZaman(p);
    const saat = personelToplamMesaiTumZaman(p);
    return s + gun*yevmiye + saat*(yevmiye/8);
  }, 0);
}
function projeCalisanaOdenenToplam(proj){
  return (proj.avanslar||[]).reduce((s,a)=>s+(parseFloat(a.tutar)||0),0);
}

async function exportTopluIcmalPdf(proj, p){
  showToast('PDF hazırlanıyor…');
  const start = ui.topluIcmalStart, end = ui.topluIcmalEnd;
  const det = personelPuantajDetailInRange(p, start, end);
  const mesaiSaat = personelMesaiInRange(p, start, end);
  const yevmiye = parseFloat(p.yevmiye)||0;
  const saatlik = yevmiye/8;
  const hakGun = det.toplamGun*yevmiye;
  const hakMesai = mesaiSaat*saatlik;
  const hakedis = hakGun+hakMesai;
  const odemeler = personelAvansListInRange(proj, p.id, start, end);
  const toplamAvans = odemeler.reduce((s,a)=>s+(parseFloat(a.tutar)||0),0);
  const kalanOdeme = hakedis - toplamAvans;
  const dates = det.dates;
  const zimmetRows = (proj.zimmetler||[]).filter(z=>z.personelId===p.id)
    .slice().sort((a,b)=>(a.zimmetTarihi||'').localeCompare(b.zimmetTarihi||''));

  const attCellStyle = 'border:1px solid #E4EFEF; padding:5px 1px; text-align:center; font-size:9px; white-space:nowrap;';
  const attHeadStyle = 'background:#0B2436; color:#ffffff; padding:5px 1px; text-align:center; font-size:8px; font-weight:700; white-space:nowrap;';
  const ATT_COLOR = {X:'#0A5850', Y:'#8a5a00', O:'#7A2B22'};
  const MONTH_NAMES = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

  // Seçilen tarih aralığı bir aydan uzun olabildiği (Personeller raporu serbest aralık kullanır) için
  // günleri sabit sayıda (ör. 20'şerli) değil, HER AYI KENDİ TEK SATIRINA alacak şekilde
  // takvim ayına göre grupluyoruz. Bir ay en fazla 31 gün olduğundan (mevcut aylık Puantaj/Mesai
  // raporunda olduğu gibi) bu satır her zaman sayfa genişliğine sığar.
  const monthMap = new Map();
  dates.forEach(key=>{
    const ym = key.slice(0,7);
    if(!monthMap.has(ym)) monthMap.set(ym, []);
    monthMap.get(ym).push(key);
  });
  const monthGroups = Array.from(monthMap.entries()).map(([ym, keys])=>{
    const [y,m] = ym.split('-');
    return { caption: `${MONTH_NAMES[parseInt(m,10)-1]} ${y}`, keys };
  });

  const monthGridHtml = (groups, valueFn)=> groups.map(({caption, keys})=>{
    const head = keys.map(key=>`<th style="${attHeadStyle}">${key.slice(8,10)}</th>`).join('');
    const row = keys.map(valueFn).join('');
    return `
      <div style="font-size:9px;font-weight:700;color:#345264;margin:6px 0 3px;">${esc(caption)}</div>
      <table style="width:100%;table-layout:fixed;border-collapse:collapse;">
        <thead><tr>${head}</tr></thead>
        <tbody><tr>${row}</tr></tbody>
      </table>`;
  }).join('');

  const puantajTablesHtml = monthGridHtml(monthGroups, key=>{
    const val = (p.puantaj && p.puantaj[key]) || '';
    const color = ATT_COLOR[val] || '#B7C4CC';
    return `<td style="${attCellStyle}font-weight:700;color:${color};">${val || '-'}</td>`;
  }) || `<div style="font-size:10px;color:#8096A3;">Seçilen dönemde tarih bulunamadı.</div>`;

  const mesaiTablesHtml = monthGridHtml(monthGroups, key=>{
    const val = parseFloat(p.mesai && p.mesai[key]) || 0;
    return `<td style="${attCellStyle}${val?'font-weight:700;color:#1C6E8C;':''}">${val ? fmtNum(val) : '-'}</td>`;
  });

  const infoBoxStyle = 'flex:1; border:1px solid #1C6E8C; border-radius:10px; padding:14px; background:#f0f7f9;';
  const labelStyle = 'font-size:9px;font-weight:700;color:#345264;letter-spacing:0.3px;';
  const valueStyle = 'font-size:11px;font-weight:700;color:#0B2436;';

  const tableCellStyle = 'border:1px solid #E4EFEF; padding:6px; font-size:10px; vertical-align:middle;';
  
  const paymentsRows = odemeler.map(a=>`
    <tr>
      <td style="${tableCellStyle}">${fmtDateStr(a.odemeTarihi)}</td>
      <td style="${tableCellStyle}">${esc(a.odemeSekli)}</td>
      <td style="${tableCellStyle}">${esc(a.aciklama)||'—'}</td>
      <td style="${tableCellStyle} text-align:right; font-weight:600;">${fmtMoney(a.tutar)}</td>
    </tr>`).join('') || `<tr><td colspan="4" style="${tableCellStyle} text-align:center; color:#8096A3;">Bu dönemde ödeme kaydı yok.</td></tr>`;

  const zimmetRowsHtml = zimmetRows.map(z=>`
    <tr>
      <td style="${tableCellStyle}">${fmtDateStr(z.zimmetTarihi)}</td>
      <td style="${tableCellStyle}">${esc(z.markaModel)}</td>
      <td style="${tableCellStyle}">${esc(z.aciklama)||'—'}</td>
      <td style="${tableCellStyle} ${z.teslimTarihi?'':'color:#0A8F5B; font-weight:700;'}">${z.teslimTarihi ? fmtDateStr(z.teslimTarihi) : 'Zimmette'}</td>
    </tr>`).join('') || `<tr><td colspan="4" style="${tableCellStyle} text-align:center; color:#8096A3;">Bu personel adına kayıtlı zimmet yok.</td></tr>`;

  const summaryRow = (label, val, color)=>`
    <tr>
      <td style="padding:8px 4px; border-bottom:1px solid #dcebea; font-size:11px; color:#345264; font-weight:500; word-break:break-word;">${esc(label)}</td>
      <td style="padding:8px 4px; border-bottom:1px solid #dcebea; font-size:11px; text-align:right; font-weight:700; word-break:break-word; ${color?`color:${color};`:''}">${val}</td>
    </tr>`;

  const html = `
    ${pdfHeaderHtml(proj, 'PERSONEL HAK EDİŞ, AVANS VE DÖNEM PUANTAJ EKSTRESİ')}
    <div style="display:flex;gap:14px;margin-bottom:16px;">
      <div style="${infoBoxStyle}">
        <div style="${labelStyle}margin-bottom:3px;">PERSONEL ADI SOYADI</div>
        <div style="${valueStyle}margin-bottom:8px;">${esc(p.adSoyad)}</div>
        <div style="${labelStyle}margin-bottom:3px;">T.C. KİMLİK &amp; BABA ADI</div>
        <div style="${valueStyle}margin-bottom:8px;">${esc(p.kimlikNo)||'—'} | ${esc(p.babaAdi)||'—'}</div>
        <div style="${labelStyle}margin-bottom:3px;">BANKA IBAN</div>
        <div style="${valueStyle}">${esc(p.banka)||'—'}</div>
      </div>
      <div style="${infoBoxStyle}">
        <div style="${labelStyle}margin-bottom:3px;">HESAP / HAK DÖNEMİ</div>
        <div style="${valueStyle}margin-bottom:8px;">${fmtDateStr(start)} — ${fmtDateStr(end)}</div>
        <div style="${labelStyle}margin-bottom:3px;">GÜNLÜK YEVMİYE</div>
        <div style="${valueStyle}margin-bottom:8px;">${fmtMoney(yevmiye)}</div>
        <div style="${labelStyle}margin-bottom:3px;">GİRİŞ / ÇIKIŞ TARİHİ</div>
        <div style="${valueStyle}">${fmtDateStr(p.girisTarihi)} / ${p.cikisTarihi ? fmtDateStr(p.cikisTarihi) : 'Devam Ediyor'}</div>
      </div>
    </div>

    <div style="font-family:'Outfit',sans-serif; font-weight:700; font-size:11px; margin-bottom:6px; color:#1C6E8C; letter-spacing:0.3px; text-transform:uppercase;">DÖNEM PUANTAJ GÜNLÜK DEVAM ÇİZELGESİ</div>
    <div style="margin-bottom:20px;">${puantajTablesHtml}</div>

    <div style="font-size:11px;color:#345264;margin-bottom:12px;"><b>Dönem:</b> ${fmtDateStr(start)} — ${fmtDateStr(end)}</div>
    <table style="width:100%;border-collapse:collapse;margin-bottom:8px;table-layout:fixed;">
      <thead><tr>
        <th style="${th}">ADI SOYADI</th><th style="${th}">POZİSYON</th>
        <th style="${thNum}">ÇALIŞILAN GÜN</th><th style="${thNum}">MESAİ (s)</th>
        <th style="${thNum}">HAKEDİŞ</th><th style="${thNum}">ALINAN AVANS</th><th style="${thNum}">KALAN BAKİYE</th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
      <tfoot>
        <tr style="background:#EAF6F5;font-weight:700;">
          <td style="${td}" colspan="2">GENEL TOPLAM</td>
          <td style="${tdNum}">${fmtNum(totals.gun)}</td>
          <td style="${tdNum}">${fmtNum(totals.mesaiSaat)}</td>
          <td style="${tdNum}">${fmtMoney(totals.hakedis)}</td>
          <td style="${tdNum}">${fmtMoney(totals.avans)}</td>
          <td style="${tdNum}">${fmtMoney(totals.kalan)}</td>
        </tr>
      </tfoot>
    </table>
    <div style="margin-top:24px;font-size:9px;color:#8096A3;">DNZ Metraj &amp; Teklif Yönetimi ile oluşturulmuştur.</div>
  `;
  try{
    await renderNodeToPdf(html, `toplu-calisan-hesabi-${proj.name.replace(/[^a-z0-9ığüşöç]+/gi,'_')}-${start}_${end}.pdf`, 'p');
    showToast('Toplu çalışan hesabı PDF indirildi.');
  }catch(e){ console.error(e); showToast('PDF oluşturulurken bir sorun oluştu.'); }
}

  ['odemeTarihi','odemeYapan','odemeAlan','odemeSekli','aciklama','tutar'].forEach(k=>{

function saveTahsilatRow(proj){
  if(!tahsilatForm.odemeTarihi){ showToast('Lütfen ödeme tarihini girin.'); return; }
  const tutar = parseFloat(tahsilatForm.tutar)||0;
  if(tutar<=0){ showToast('Lütfen geçerli bir tutar girin.'); return; }
  const row = {
    id: tahsilatForm.id || uid(),
    odemeTarihi: tahsilatForm.odemeTarihi,
    odemeYapan: tahsilatForm.odemeYapan.trim(),
    odemeAlan: tahsilatForm.odemeAlan.trim(),
    odemeSekli: tahsilatForm.odemeSekli,
    aciklama: tahsilatForm.aciklama.trim(),
    tutar
  };
  if(tahsilatForm.id){
    const idx = proj.tahsilatlar.findIndex(r=>r.id===row.id);
    if(idx>-1) proj.tahsilatlar[idx]=row;
  } else {
    proj.tahsilatlar.push(row);
  }
  saveState();
  tahsilatForm = emptyTahsilatForm();
  renderMain();
  showToast('Ödeme kaydı kaydedildi.');
}

function renderTahsilatTable(proj){
  const wrap = document.getElementById('tahsilatTableWrap');
  const rows = (proj.tahsilatlar||[]).slice().sort((a,b)=>(b.odemeTarihi||'').localeCompare(a.odemeTarihi||''));
  if(rows.length===0){
    wrap.innerHTML = `<div class="empty-state">Henüz ödeme kaydı eklenmedi.</div>`;
    return;
  }
  wrap.innerHTML = `
    <table>
      <thead><tr><th>Tarih</th><th>Ödeme Yapan</th><th>Ödeme Alan</th><th>Ödeme Şekli</th><th>Açıklama</th><th class="num">Tutar</th><th></th></tr></thead>
      <tbody>
        ${rows.map(r=>`
          <tr data-id="${r.id}">
            <td>${fmtDateStr(r.odemeTarihi)}</td>
            <td>${esc(r.odemeYapan)||'—'}</td>
            <td>${esc(r.odemeAlan)||'—'}</td>
            <td>${esc(r.odemeSekli)}</td>
            <td>${esc(r.aciklama)||'—'}</td>
            <td class="num">${fmtMoney(r.tutar)}</td>
            <td>
              <div class="row-actions">
                <button class="icon-btn" data-act="edit" title="Düzenle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button>
                <button class="icon-btn danger" data-act="delete" title="Sil"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0l-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6h16z"/></svg></button>
              </div>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>
  `;
  wrap.querySelectorAll('tr[data-id]').forEach(tr=>{
    tr.addEventListener('click',(e)=>{
      const act = e.target.closest('[data-act]')?.dataset.act;
      if(!act) return;
      const r = proj.tahsilatlar.find(x=>x.id===tr.dataset.id);
      if(!r) return;
      if(act==='edit'){
        tahsilatForm = {id:r.id, odemeTarihi:r.odemeTarihi, odemeYapan:r.odemeYapan, odemeAlan:r.odemeAlan, odemeSekli:r.odemeSekli, aciklama:r.aciklama, tutar:String(r.tutar)};
        renderMain(); window.scrollTo({top:0, behavior:'smooth'});
      } else if(act==='delete'){
        confirmModal('Bu ödeme kaydını silmek istediğinize emin misiniz?', ()=>{
          proj.tahsilatlar = proj.tahsilatlar.filter(x=>x.id!==r.id);
          saveState(); renderMain();
          showToast('Ödeme kaydı silindi.');
        });
      }
    });
  });
}

function saveMasrafRow(proj){
  if(!masrafForm.masrafKalemi.trim()){ showToast('Lütfen masraf kalemini girin.'); return; }
  if(!masrafForm.odemeTarihi){ showToast('Lütfen ödeme tarihini girin.'); return; }
  const tutar = parseFloat(masrafForm.tutar)||0;
  if(tutar<=0){ showToast('Lütfen geçerli bir tutar girin.'); return; }
  const row = {
    id: masrafForm.id || uid(),
    masrafKalemi: masrafForm.masrafKalemi.trim(),
    odemeTarihi: masrafForm.odemeTarihi,
    odemeSekli: masrafForm.odemeSekli,
    aciklama: masrafForm.aciklama.trim(),
    tutar
  };
  if(masrafForm.id){
    const idx = proj.masraflar.findIndex(r=>r.id===row.id);
    if(idx>-1) proj.masraflar[idx]=row;
  } else {
    proj.masraflar.push(row);
  }
  saveState();
  masrafForm = emptyMasrafForm();
  renderMain();
  showToast('Masraf kaydedildi.');
}

function filteredMasraf(proj){
  return (proj.masraflar||[]).filter(m=> !ui.masrafFilterKalemi || normKey(m.masrafKalemi)===normKey(ui.masrafFilterKalemi))
    .slice().sort((a,b)=> (b.odemeTarihi||'').localeCompare(a.odemeTarihi||''));
}
function projeMasrafToplam(proj){
  return (proj.masraflar||[]).reduce((s,r)=>s+(parseFloat(r.tutar)||0),0);
}

function projeYemekFiyat(proj){
  return (proj && proj.yemekFiyat) ? proj.yemekFiyat : MEAL_PRICES;
}

function yemekRowTutar(r, proj){
  const fallback = projeYemekFiyat(proj);
  const sabahFiyat = (r.sabahFiyat!=null && r.sabahFiyat!=='') ? parseFloat(r.sabahFiyat) : (parseFloat(fallback.sabah)||0);
  const ogleFiyat = (r.ogleFiyat!=null && r.ogleFiyat!=='') ? parseFloat(r.ogleFiyat) : (parseFloat(fallback.ogle)||0);
  const aksamFiyat = (r.aksamFiyat!=null && r.aksamFiyat!=='') ? parseFloat(r.aksamFiyat) : (parseFloat(fallback.aksam)||0);
  const sabah = parseInt(r.sabah)||0, ogle = parseInt(r.ogle)||0, aksam = parseInt(r.aksam)||0;
  return {
    sabahAdet:sabah, ogleAdet:ogle, aksamAdet:aksam,
    sabahFiyat, ogleFiyat, aksamFiyat,
    sabahTutar: sabah*sabahFiyat,
    ogleTutar: ogle*ogleFiyat,
    aksamTutar: aksam*aksamFiyat,
    toplam: sabah*sabahFiyat + ogle*ogleFiyat + aksam*aksamFiyat
  };
}

function renderYemekLivePreview(proj){
  const el = document.getElementById('ymLivePreview');
  if(!el) return;
  const fiyat = projeYemekFiyat(proj);
  const t = yemekRowTutar(yemekForm, proj);
  el.innerHTML = `
    <div class="totals-strip">
      <div class="total-chip"><span class="lbl">Sabah (${t.sabahAdet} x ${fmtMoney(fiyat.sabah)})</span><span class="val">${fmtMoney(t.sabahTutar)}</span></div>
      <div class="total-chip"><span class="lbl">Öğlen (${t.ogleAdet} x ${fmtMoney(fiyat.ogle)})</span><span class="val">${fmtMoney(t.ogleTutar)}</span></div>
      <div class="total-chip"><span class="lbl">Akşam (${t.aksamAdet} x ${fmtMoney(fiyat.aksam)})</span><span class="val">${fmtMoney(t.aksamTutar)}</span></div>
      <div class="total-chip"><span class="lbl">Günlük Toplam</span><span class="val">${fmtMoney(t.toplam)}</span></div>
    </div>`;
}

function saveYemekRow(proj){
  if(!yemekForm.tarih){ showToast('Lütfen tarih girin.'); return; }
  const sabah = parseInt(yemekForm.sabah)||0, ogle = parseInt(yemekForm.ogle)||0, aksam = parseInt(yemekForm.aksam)||0;
  if(sabah<=0 && ogle<=0 && aksam<=0){ showToast('Lütfen en az bir öğün için adet girin.'); return; }
  if(!proj.yemekler) proj.yemekler = [];
  // Mevcut bir kayıt düzenleniyorsa, o kaydın oluşturulduğu andaki fiyatı korunur;
  // yeni bir kayıt ekleniyorsa projenin GÜNCEL birim fiyatları kullanılır.
  let fiyat;
  const existing = yemekForm.id ? proj.yemekler.find(r=>r.id===yemekForm.id) : null;
  if(existing){
    fiyat = { sabah:existing.sabahFiyat, ogle:existing.ogleFiyat, aksam:existing.aksamFiyat };
  } else {
    fiyat = projeYemekFiyat(proj);
  }
  const row = {
    id: yemekForm.id || uid(),
    tarih: yemekForm.tarih,
    sabah, ogle, aksam,
    sabahFiyat: parseFloat(fiyat.sabah)||0,
    ogleFiyat: parseFloat(fiyat.ogle)||0,
    aksamFiyat: parseFloat(fiyat.aksam)||0,
    aciklama: (yemekForm.aciklama||'').trim()
  };
  if(yemekForm.id){
    const idx = proj.yemekler.findIndex(r=>r.id===row.id);
    if(idx>-1) proj.yemekler[idx]=row;
  } else {
    proj.yemekler.push(row);
  }
  saveState();
  yemekForm = emptyYemekForm();
  renderMain();
  showToast('Yemek kaydı kaydedildi.');
}

function filteredYemek(proj){
  const start = ui.yemekFilterStart, end = ui.yemekFilterEnd;
  return (proj.yemekler||[]).filter(r=> (!start || r.tarih>=start) && (!end || r.tarih<=end))
    .slice().sort((a,b)=> (b.tarih||'').localeCompare(a.tarih||''));
}
function projeYemekToplam(proj){
  return (proj.yemekler||[]).reduce((s,r)=> s + yemekRowTutar(r, proj).toplam, 0);
}

function renderYemekTable(proj){
  const wrap = document.getElementById('yemekTableWrap');
  const rows = filteredYemek(proj);

function groupMetrajForPicker(proj){
  const map = new Map();
  proj.metrajRows.forEach(r=>{
    // Boşluk/büyük-küçük harf farkları normalize edilerek aynı konum + imalat cinsi
    // birleştirilir (İcmal'deki gruplama ile tutarlı davranış için).
    const key = ['blok','kat','daire','mekan','eleman','imalat'].map(f=>normKey(r[f])).concat(r.birim).join('|');
    if(!map.has(key)) map.set(key, {blok:r.blok,kat:r.kat,daire:r.daire,mekan:r.mekan,eleman:r.eleman,imalat:r.imalat,birim:r.birim,miktar:0});
    map.get(key).miktar += (parseFloat(r.altToplam)||0);
  });
  return Array.from(map.values());
}

function openMetrajPickModal(proj){
  const groups = groupMetrajForPicker(proj);

  if(groups.length===0){
    showToast('Bu projede henüz metraj kaydı yok.');
    return;
  }
  modalRoot.innerHTML = `
    <div class="modal-backdrop" id="modalBackdrop">
      <div class="modal glass-strong glass">
        <h3>Metrajdan Teklife Ekle</h3>
        <p class="hint">Aynı konum ve imalat cinsine ait satırlar birleştirilerek gösterilir. Eklemek istediklerinizi seçin.</p>
        <div class="pick-list" id="pickList">
          ${groups.map((g,i)=>{
            const desc = [g.blok,g.kat,g.daire,g.mekan,g.eleman,g.imalat].filter(Boolean).join(', ');
            return `<div class="pick-item">
              <input type="checkbox" id="pk-${i}" data-idx="${i}">
              <label for="pk-${i}">${esc(desc)} — <b>${fmtNum(g.miktar)} ${UNIT_LABEL[g.birim]}</b></label>
            </div>`;
          }).join('')}
        </div>
        <div class="btn-row" style="margin-top:10px;justify-content:flex-end;">
          <button class="btn btn-ghost" id="pkCancel">Vazgeç</button>
          <button class="btn btn-primary" id="pkAdd">Seçilenleri Ekle</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('pkCancel').onclick = closeModal;
  document.getElementById('modalBackdrop').addEventListener('click',(e)=>{ if(e.target.id==='modalBackdrop') closeModal(); });
  document.getElementById('pkAdd').onclick = ()=>{
    const checked = Array.from(document.querySelectorAll('#pickList input:checked'));
    if(checked.length===0){ showToast('Lütfen en az bir kalem seçin.'); return; }
    checked.forEach(chk=>{
      const g = groups[parseInt(chk.dataset.idx)];
      const desc = [g.blok,g.kat,g.daire,g.mekan,g.eleman,g.imalat].filter(Boolean).join(', ');
      proj.teklifRows.push({
        id:uid(), aciklama:desc, miktar:Math.round(g.miktar*100)/100, birim:g.birim, birimFiyat:0, tutar:0
      });
    });
    saveState(); closeModal(); renderMain();
    showToast(`${checked.length} kalem teklife eklendi.`);
  };
}

const FS_AUTO_BACKUP_HANDLE_KEY = 'autoBackupFileHandle';
function fsIdbOpen(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(FS_IDB_NAME, 1);
    req.onupgradeneeded = ()=>{ req.result.createObjectStore(FS_IDB_STORE); };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
}
async function fsIdbSet(key, val){
  try{
    const db = await fsIdbOpen();
    return new Promise((resolve,reject)=>{
      const tx = db.transaction(FS_IDB_STORE,'readwrite');
      tx.objectStore(FS_IDB_STORE).put(val, key);
      tx.oncomplete = ()=>resolve();
      tx.onerror = ()=>reject(tx.error);
    });
  }catch(e){ /* IndexedDB yoksa sessizce geç */ }
}
async function fsIdbGet(key){
  try{
    const db = await fsIdbOpen();
    return new Promise((resolve,reject)=>{
      const tx = db.transaction(FS_IDB_STORE,'readonly');
      const req = tx.objectStore(FS_IDB_STORE).get(key);
      req.onsuccess = ()=>resolve(req.result || null);
      req.onerror = ()=>reject(req.error);
    });
  }catch(e){ return null; }
}

function backupFileName(){
  const d = new Date();
  return `dnz-metraj-yedek-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
}

async function markBackupDone(){
  state.lastBackupAt = Date.now();
  state.dirtySinceBackup = false;
  await persistStateRaw();
  updateBackupBanner();
  renderMain();
}

// NOT: Daha önce burada, tarayıcı destekliyorsa önce "showSaveFilePicker" (ör. Google Drive
// gibi bulut konumlarına doğrudan yazma) deneniyor, bu başarısız olursa klasik indirmeye
// düşülüyordu. Bulut sağlayıcılarına (özellikle Google Drive) doğrudan yazma bazı
// cihazlarda dosyayı BOŞ oluşturup sonra yazma hatası verebiliyor; kod da hatayı yakalayıp
// sessizce ikinci bir indirme (telefona) daha başlatıyordu. Sonuç: Drive'da boş bir dosya +
// telefonda ayrı bir indirme, yani "2 defa indiriyor, biri boş" şikayeti.
// Çözüm: Export işlemi için TEK ve güvenilir yöntem olan klasik indirmeyi kullanıyoruz.
// Dosya cihazın "İndirilenler" klasörüne iner; isterseniz oradan Drive'a elle
// kopyalayabilir/yükleyebilirsiniz. Bu şekilde çift indirme ve boş dosya riski ortadan kalkar.
async function exportBackupFile(){
  const dataStr = JSON.stringify(state,null,2);
  const fname = backupFileName();
  try{
    const blob = new Blob([dataStr], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    await markBackupDone();
    showToast('Yedek dosyası indirildi. (Telefonunuzun "İndirilenler" klasörüne kaydedildi.)');
  }catch(e){
    console.error(e);
    showToast('Yedek dosyası indirilirken bir sorun oluştu.');
  }
}

function processBackupText(text){
  try{
    const parsed = JSON.parse(text);
    confirmModal('Yedek dosyasından geri yükleme mevcut tüm verilerin üzerine yazacaktır. Devam edilsin mi?', async ()=>{
      state = Object.assign(defaultState(), parsed);
      if(!state.projects) state.projects={};
      // Az önce bir yedek dosyasından yüklendiği için veriler o dosyayla aynı; "yedeklenmemiş
      // değişiklik" uyarısının hemen tekrar çıkmaması için dirty bayrağını temizliyoruz.
      state.dirtySinceBackup = false;
      await persistStateRaw();
      renderAll();
      showToast('Yedekten geri yükleme tamamlandı.');
    });
  }catch(e){
    showToast('Dosya okunamadı. Lütfen geçerli bir yedek dosyası seçin.');
  }
}

function importBackupFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=> processBackupText(reader.result);
  reader.readAsText(file);
}

async function readBackupFromHandle(handle){
  const file = await handle.getFile();
  return await file.text();
}

async function handleImportBackupClick(){
  if(!window.showOpenFilePicker){
    document.getElementById('s-importFile').click();
    return;
  }
  try{
    let handle = await fsIdbGet(FS_BACKUP_HANDLE_KEY);
    if(handle){
      let perm = await handle.queryPermission({mode:'read'});
      if(perm!=='granted') perm = await handle.requestPermission({mode:'read'});
      if(perm!=='granted') handle = null;
    }
    if(!handle){
      [handle] = await window.showOpenFilePicker({
        types: [{ description:'JSON Yedek Dosyası', accept:{'application/json':['.json']} }]
      });
      await fsIdbSet(FS_BACKUP_HANDLE_KEY, handle);
    }
    const text = await readBackupFromHandle(handle);
    processBackupText(text);
  }catch(e){
    if(e && e.name==='AbortError') return;
    console.error(e);
    showToast('Dosya okunamadı. Lütfen geçerli bir yedek dosyası seçin.');
  }
}

// Kullanıcının istediği bir konumda (Drive/Dropbox klasörü, harici disk, telefonda bir
// klasör vs.) yeni bir dosya oluşturur ya da var olan bir dosyayı seçer ve bunu, uygulama
// her açıldığında otomatik olarak okunacak / her değişiklikte otomatik yazılacak "ana"
// yedekleme dosyası olarak işaretler.
async function chooseAutoBackupLocation(){
  if(!window.showSaveFilePicker){
    showToast('Bu özellik bu cihazda/tarayıcıda desteklenmiyor. Merak etmeyin, verileriniz otomatik olarak tarayıcı önbelleğine kaydediliyor.');
    return;
  }
  let handle;
  try{
    handle = await window.showSaveFilePicker({
      suggestedName: backupFileName(),
      types: [{ description:'JSON Yedek Dosyası', accept:{'application/json':['.json']} }]
    });
  }catch(e){
    if(e && e.name==='AbortError') return;
    console.error(e);
    showToast('Dosya seçilirken bir sorun oluştu.');
    return;
  }
  // İzni kontrol et; zaten verilmişse (çoğu zaman dosya yeni seçildiğinde otomatik verilir)
  // tekrar istemeye gerek yok. Bazı mobil tarayıcılar/işletim sistemleri kalıcı yazma izni
  // modelini desteklemez ve bu adım "denied"/"prompt" döner — bu durumda hata göstermek yerine
  // sessizce bu özelliği atlayıp kullanıcıyı tarayıcı önbelleğinin zaten devrede olduğu
  // konusunda bilgilendiriyoruz (veri kaybı riski yok, sadece bu ek dosya senkronu çalışmıyor).
  let perm = 'denied';
  try{
    perm = await handle.queryPermission({mode:'readwrite'});
    if(perm !== 'granted'){
      perm = await handle.requestPermission({mode:'readwrite'});
    }
  }catch(e){
    console.error('İzin isteme hatası', e);
    perm = 'denied';
  }
  if(perm !== 'granted'){
    showToast('Bu cihaz dosyaya otomatik yazma iznini desteklemiyor. Sorun değil: verileriniz zaten tarayıcı önbelleğine otomatik kaydediliyor. Ek güvence için "Yedeği İndir" ile elle de yedek alabilirsiniz.');
    return;
  }
  try{
    await fsIdbSet(FS_AUTO_BACKUP_HANDLE_KEY, handle);
    autoBackupHandleCache = handle;
    // Dosya boş kalmasın diye mevcut veriyi hemen o dosyaya yazıyoruz.
    const writable = await handle.createWritable();
    await writable.write(JSON.stringify(state, null, 2));
    await writable.close();
    state.lastBackupAt = Date.now();
    state.dirtySinceBackup = false;
    await refreshAutoBackupInfo();
    renderMain();
    updateBackupBanner();
    showToast(`Otomatik yedekleme konumu ayarlandı: ${handle.name}`);
  }catch(e){
    console.error(e);
    showToast('Yedekleme konumu kaydedilirken bir sorun oluştu.');
  }
}
async function clearAutoBackupLocation(){
  await fsIdbSet(FS_AUTO_BACKUP_HANDLE_KEY, null);
  autoBackupHandleCache = null;
  await refreshAutoBackupInfo();
  renderMain();
  showToast('Otomatik yedekleme konumu kaldırıldı.');
}

function pdfBaseStyles(width){
  return `font-family:'Inter',Arial,sans-serif;color:#0B2436;padding:24px;width:${width}px;background:#ffffff;`;
}
async function renderNodeToPdf(html, filename, orientation){
  // Varsayılan: dikey (portre). Sadece 'l' (yatay/landscape) açıkça belirtilirse
  // render genişliği ve PDF sayfası A4 yatay ölçülerine göre ayarlanır.
  orientation = orientation === 'l' ? 'l' : 'p';
  const width = orientation === 'l' ? 1123 : 794;
  const root = document.getElementById('pdf-render-root');
  root.style.width = width+'px';
  root.innerHTML = `<div id="pdf-inner" style="${pdfBaseStyles(width)}overflow:hidden;">${html}</div>`;
  await new Promise(r=>setTimeout(r,60));
  const node = document.getElementById('pdf-inner');
  const canvas = await html2canvas(node, {scale:2, useCORS:true, backgroundColor:'#ffffff', windowWidth:width});
  const imgData = canvas.toDataURL('image/png');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF(orientation,'mm','a4');
  const pageWidth = orientation==='l' ? 297 : 210;
  const pageHeight = orientation==='l' ? 210 : 297;
  const imgWidth = pageWidth;
  const imgHeight = canvas.height * imgWidth / canvas.width;
  let heightLeft = imgHeight;
  let position = 0;
  pdf.addImage(imgData,'PNG',0,position,imgWidth,imgHeight);
  heightLeft -= pageHeight;
  while(heightLeft > 0){
    position = heightLeft - imgHeight;
    pdf.addPage();
    pdf.addImage(imgData,'PNG',0,position,imgWidth,imgHeight);
    heightLeft -= pageHeight;
  }
  pdf.save(filename);
  root.innerHTML = '';
  root.style.width = '';
}

// "Teklif Analizi" çıktısı üretir. Ekrandaki panelden farklı olarak burada sarfiyat,
// ebat, toplam maliyet ve tahmini kâr gibi iç maliyet/analiz bilgileri GÖSTERİLMEZ;
// sadece malzeme, miktar, birim, birim fiyat, tutar ve serbest bir açıklama alanı yer alır.
async function exportHesapAnalizPdf(){
  const sistem = state.imalatSistemleri.find(s=>s.id===ui.imalatCalcSistemId) || null;
  if(!sistem){ showToast('Lütfen önce bir imalat sistemi seçin.'); return; }
  if(!sistem.malzemeler.length){ showToast('Bu sistemde henüz malzeme tanımlı değil.'); return; }
  const parsed = getHesapDeger();
  if(parsed.value==null){ showToast('Lütfen hesaplama için bir ölçü/alan girin.'); return; }

  showToast('PDF hazırlanıyor…');
  const deger = parsed.value;
  const basisLabel = parsed.unit==='mt' ? 'mt' : 'm²';
  const tableRows = sistem.malzemeler.map(m=>{
    const opts = getPaketOpts(m.id);
    const r = computeMalzemeSonuc(m, deger, opts);
    const birimLabel = UNIT_LABEL[m.birim]||m.birim;
    const isAdetBirim = String(birimLabel).toLowerCase()==='adet';
    const pieceCount = r.adetNote!=null ? r.adetNote : (isAdetBirim ? r.miktar : null);
    let miktarText = fmtNum(r.miktar);
    if(pieceCount!=null && !(isAdetBirim && !m.paketAdet)){
      miktarText += ` (${formatPaketAdetNote(pieceCount, m.paketAdet)})`;
    }
    return `
      <tr>
        <td style="word-break:break-word;">${esc(m.ad)}</td>
        <td style="text-align:right;">${miktarText}</td>
        <td>${esc(birimLabel)}</td>
        <td style="text-align:right;">${fmtMoney(m.satisFiyat)}</td>
        <td style="text-align:right;font-weight:700;">${fmtMoney(r.tutar)}</td>
      </tr>
    `;
  }).join('');
  const genelToplam = sistem.malzemeler.reduce((s,m)=>s+computeMalzemeSonuc(m,deger,getPaketOpts(m.id)).tutar,0);
  const olcuAciklama = parsed.isPoligon
    ? `${parsed.poligonKenarSayisi} kenarlı köşeli alan hesaplaması`
    : parsed.isKenar
    ? `${parsed.kenarDetay.length} kenar toplamı (${parsed.kenarDetay.map(d=>fmtNum(d.value)).join(' + ')})`
    : (parsed.isArea ? `Girilen ölçü: ${esc(ui.imalatCalcInput)}` : '');
  const birimMaliyet = computeBirimMaliyet(genelToplam, deger);

  const html = `
    ${pdfHeaderHtmlSimple('Teklif Analizi')}
    <div style="font-family:'Outfit',sans-serif;font-weight:700;font-size:15px;letter-spacing:1px;margin-bottom:6px;color:#1C6E8C;text-align:center;">TEKLİF ANALİZİ</div>
    <div style="text-align:center;font-size:10px;color:#345264;margin-bottom:14px;">
      ${esc(sistem.ad)} &nbsp;•&nbsp; Hesaplanan Ölçü: ${fmtNum(deger)} ${basisLabel}${olcuAciklama? ' &nbsp;('+olcuAciklama+')' : ''}
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:10px;table-layout:fixed;">
      <colgroup>
        <col style="width:32%"><col style="width:18%"><col style="width:14%">
        <col style="width:18%"><col style="width:18%">
      </colgroup>
      <thead>
        <tr style="background:#EAF6F5;">
          <th style="text-align:left;padding:7px 6px;border-bottom:1.5px solid #1C6E8C;">Malzeme</th>
          <th style="text-align:right;padding:7px 6px;border-bottom:1.5px solid #1C6E8C;">Miktar</th>
          <th style="text-align:left;padding:7px 6px;border-bottom:1.5px solid #1C6E8C;">Birim</th>
          <th style="text-align:right;padding:7px 6px;border-bottom:1.5px solid #1C6E8C;">Birim Fiyat</th>
          <th style="text-align:right;padding:7px 6px;border-bottom:1.5px solid #1C6E8C;">Tutar</th>
        </tr>
      </thead>
      <tbody>${tableRows || '<tr><td colspan="5" style="padding:10px;text-align:center;color:#345264;">Kayıt yok</td></tr>'}</tbody>
    </table>
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:14px;flex-wrap:wrap;">
      ${birimMaliyet!=null ? `
      <div style="min-width:180px;border:1.5px solid #1C6E8C55;border-radius:8px;padding:12px 16px;text-align:right;">
        <div style="font-size:10px;color:#345264;font-weight:700;text-transform:uppercase;">Birim Maliyet</div>
        <div style="font-size:15px;font-weight:800;color:#0B2436;">${fmtMoney(birimMaliyet)} / ${basisLabel}</div>
      </div>` : ''}
      <div style="min-width:220px;border:1.5px solid #1C6E8C;border-radius:8px;padding:12px 16px;text-align:right;">
        <div style="font-size:10px;color:#345264;font-weight:700;text-transform:uppercase;">Genel Toplam</div>
        <div style="font-size:18px;font-weight:800;color:#0B2436;">${fmtMoney(genelToplam)}</div>
      </div>
    </div>
    ${ui.imalatCalcNot && ui.imalatCalcNot.trim() ? `
    <div style="margin-top:20px;padding:12px 14px;background:#F4FBFA;border:1px solid #1C6E8C55;border-radius:8px;font-size:10px;color:#345264;white-space:pre-wrap;">
      <b style="color:#0B2436;">Not:</b> ${esc(ui.imalatCalcNot)}
    </div>` : ''}
    <div style="margin-top:36px;font-size:9px;color:#8096A3;">DNZ Metraj &amp; Teklif Yönetimi ile oluşturulmuştur.</div>
  `;
  try{
    await renderNodeToPdf(html, `teklif-analizi-${sistem.ad.replace(/[^a-z0-9ığüşöç]+/gi,'_')}.pdf`);
    showToast('PDF indirildi.');
  }catch(e){
    console.error(e);
    showToast('PDF oluşturulurken bir sorun oluştu.');
  }
}

/* ======================= PWA / OFFLINE ======================= */
// İnternetsiz çalışabilmesi için service worker'ı kaydet. Bu, uygulama en az bir kez
// internetli açıldıktan sonra tüm dosyaları (ve dış kütüphaneleri) önbelleğe alır;
// sonraki açılışlarda internet olmasa da uygulama çalışmaya devam eder.
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch((e)=>{
      console.error('Service worker kaydı başarısız', e);
    });
  });
}

/* ======================= INIT ======================= */
// Not: Bu fonksiyon artık sayfa yüklenir yüklenmez değil, kullanıcı Firebase ile
// giriş yaptıktan SONRA (bkz. yukarıdaki Firebase auth module script'i) çalıştırılır.
window.__dnzInitApp = async function init(){
  await loadState();
  await refreshAutoBackupInfo();
  // Eski kayıtlarda (bu modüller eklenmeden önce oluşturulmuş projelerde) eksik
  // alanları tamamla, böylece kod hiçbir yerde undefined'a takılmasın.
  Object.values(state.projects).forEach(p=>{
    if(!p.personel) p.personel = [];
    p.personel.forEach(emp=>{
      if(!emp.puantaj) emp.puantaj = {};
      if(!emp.mesai) emp.mesai = {};
    });
    if(!p.avanslar) p.avanslar = [];
    if(!p.zimmetler) p.zimmetler = [];
    if(!p.tahsilatlar) p.tahsilatlar = [];
    if(!p.masraflar) p.masraflar = [];
    if(!p.yemekler) p.yemekler = [];
    if(!p.yemekFiyat) p.yemekFiyat = { sabah:MEAL_PRICES.sabah, ogle:MEAL_PRICES.ogle, aksam:MEAL_PRICES.aksam };
    (p.yemekler||[]).forEach(r=>{
      if(r.tarih) r.tarih = fixLegacyDateStr(r.tarih);
      if(r.sabahFiyat==null) r.sabahFiyat = parseFloat(p.yemekFiyat.sabah)||0;
      if(r.ogleFiyat==null) r.ogleFiyat = parseFloat(p.yemekFiyat.ogle)||0;
      if(r.aksamFiyat==null) r.aksamFiyat = parseFloat(p.yemekFiyat.aksam)||0;
    });
    (p.avanslar||[]).forEach(a=>{ if(a.odemeTarihi) a.odemeTarihi = fixLegacyDateStr(a.odemeTarihi); });
  });
  if(state.company.logo && state.company.logo.length > 400000){
    try{
      state.company.logo = await resizeImageDataUrl(state.company.logo, 320, 0.8);
      await saveState();
    }catch(e){ /* yoksay */ }
  }
  if(!state.activeProjectId && Object.keys(state.projects).length>0){
    state.activeProjectId = Object.keys(state.projects)[0];
  }
  renderAll();
};
</script>
<script>
  // Sayfa module script'ten önce açılmış olabileceği ihtimaline karşı: eğer bu satır
  // çalıştığında kullanıcı zaten oturum açmış durumdaysa (onAuthStateChanged bu script'ten
  // önce tetiklenmiş olabilir), uygulamayı burada başlat.
  if(window.__dnzUserAlreadySignedIn && !window.__dnzInitStarted){
    window.__dnzInitStarted = true;
    window.__dnzInitApp();
  }
</script>
