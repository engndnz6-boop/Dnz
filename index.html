<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>DNZ — Metraj &amp; Teklif</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F3B4C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DNZ Metraj">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --abyss:#08202E;
  --lagoon:#0F3B4C;
  --tide:#1C6E8C;
  --foam:#EAF6F5;
  --aqua:#2FD3C7;
  --aqua-dim:#22A99F;
  --ink:#0B2436;
  --ink-soft:#345264;
  --coral:#E8776B;
  --glass-bg:rgba(234,246,245,0.62);
  --glass-bg-strong:rgba(234,246,245,0.82);
  --glass-border:rgba(255,255,255,0.55);
  --shadow-color:rgba(4,20,28,0.35);
  --radius:18px;
  --font-display:'Outfit',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;}
html,body{
  margin:0;padding:0;width:100%;min-height:100%;
  overflow-x:hidden;
  font-family:var(--font-body);
  color:var(--ink);
  -webkit-tap-highlight-color:transparent;
}
body{
  min-height:100vh;
  min-height:100dvh;
  background:
    radial-gradient(ellipse 80% 60% at 20% -10%, rgba(47,211,199,0.28), transparent 60%),
    radial-gradient(ellipse 70% 50% at 90% 10%, rgba(28,110,140,0.16), transparent 60%),
    linear-gradient(160deg, #F5FBFA 0%, #E6F4F2 45%, #D7EDEC 100%);
  background-attachment:fixed;
  background-size:200% 200%, 200% 200%, 100% 100%;
  animation: driftBg 26s ease-in-out infinite alternate;
  display:flex;flex-direction:column;
}
@keyframes driftBg{
  0%{background-position:0% 0%, 100% 0%, 0 0;}
  100%{background-position:20% 30%, 70% 40%, 0 0;}
}
@media (prefers-reduced-motion:reduce){
  body{animation:none;}
  *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
}

/* wave divider */
.wave-divider{width:100%;height:22px;display:block;line-height:0;margin-top:-1px;}
.wave-divider svg{width:100%;height:100%;display:block;}

/* glass primitives */
.glass{
  background:var(--glass-bg);
  backdrop-filter:blur(18px) saturate(140%);
  -webkit-backdrop-filter:blur(18px) saturate(140%);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  box-shadow:0 8px 32px var(--shadow-color), inset 0 1px 0 rgba(255,255,255,0.5);
  position:relative;
  overflow:hidden;
}
.glass-strong{background:var(--glass-bg-strong);}

/* ripple (dnz) effect */
.ripple-wrap{position:relative;overflow:hidden;}
.ripple-el{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle, rgba(47,211,199,0.55) 0%, rgba(47,211,199,0.25) 40%, rgba(255,255,255,0) 70%);
  transform:scale(0);
  animation:rippleAnim 700ms ease-out forwards;
  pointer-events:none;
  z-index:5;
}
@keyframes rippleAnim{
  to{transform:scale(1);opacity:0;}
}

/* header */
#app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;width:100%;}
header.topbar{
  position:sticky;top:0;z-index:40;
  margin:10px 10px 0 10px;
  padding:12px 16px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:10px;min-width:0;flex-shrink:0;}
.brand-mark{
  width:38px;height:38px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,var(--aqua),var(--tide));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(47,211,199,0.45);
}
.brand-mark svg{width:22px;height:22px;}
.brand-text{display:flex;flex-direction:column;line-height:1.05;min-width:0;}
.brand-text b{font-family:var(--font-display);font-weight:800;font-size:1.15rem;letter-spacing:0.5px;color:var(--ink);}
.brand-text span{font-size:0.68rem;color:var(--ink-soft);font-weight:500;letter-spacing:0.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.project-picker{
  margin-left:auto;display:flex;align-items:center;gap:8px;min-width:0;
  flex:1 1 260px;max-width:420px;
}
select.proj-select{
  flex:1;min-width:0;
  appearance:none;-webkit-appearance:none;
  background:rgba(255,255,255,0.55);
  border:1px solid var(--glass-border);
  border-radius:12px;padding:9px 30px 9px 12px;
  font-family:var(--font-body);font-weight:600;font-size:0.85rem;color:var(--ink);
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230B2436' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");
  background-repeat:no-repeat;background-position:right 8px center;background-size:16px;
  text-overflow:ellipsis;white-space:nowrap;overflow:hidden;
}

/* soldan açılan modül paneli (drawer) */
.nav-backdrop{
  position:fixed;inset:0;background:rgba(8,32,46,0.45);z-index:90;
  opacity:0;pointer-events:none;transition:opacity 220ms ease;
}
.nav-backdrop.open{opacity:1;pointer-events:auto;}
nav.tabs{
  position:fixed;top:0;left:0;z-index:100;
  height:100vh;height:100dvh;width:300px;max-width:85vw;
  display:flex;flex-direction:column;gap:5px;
  padding:16px 12px 20px 12px;margin:0;
  overflow-y:auto;overflow-x:hidden;
  border-radius:0 22px 22px 0;
  transform:translateX(-104%);
  transition:transform 240ms cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 50px rgba(4,20,28,0.35);
}
nav.tabs.open{transform:translateX(0);}
nav.tabs::-webkit-scrollbar{width:5px;}
nav.tabs::-webkit-scrollbar-thumb{background:rgba(11,36,54,0.2);border-radius:10px;}
.nav-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:2px 6px 12px 6px;margin-bottom:6px;
  border-bottom:1px solid rgba(11,36,54,0.12);
}
.nav-header b{font-family:var(--font-display);font-weight:800;font-size:1rem;color:var(--ink);}
.tab-btn{
  flex:0 0 auto;width:100%;
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;border-radius:12px;border:none;cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:0.85rem;
  background:transparent;color:var(--ink-soft);
  transition:background 160ms ease, color 160ms ease, transform 160ms ease;
  white-space:nowrap;text-align:left;
}
.tab-btn svg{width:16px;height:16px;flex-shrink:0;}
.tab-btn.active{
  background:linear-gradient(135deg,var(--aqua),var(--aqua-dim));
  color:#04201C;box-shadow:0 4px 14px rgba(47,211,199,0.4);
}
.tab-btn:not(.active):hover{background:rgba(255,255,255,0.5);color:var(--ink);}

main{flex:1;min-width:0;width:100%;padding:0 10px 40px 10px;display:flex;flex-direction:column;gap:14px;max-width:1180px;margin:0 auto;width:100%;}

.card{padding:18px;display:flex;flex-direction:column;gap:14px;min-width:0;}
.card h2{margin:0;font-family:var(--font-display);font-size:1.05rem;font-weight:700;display:flex;align-items:center;gap:8px;}
.card h2 svg{width:18px;height:18px;color:var(--aqua-dim);}
.card p.hint{margin:0;font-size:0.8rem;color:var(--ink-soft);line-height:1.4;}

.field-grid{
  display:grid;gap:10px;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
}
.field{display:flex;flex-direction:column;gap:4px;min-width:0;}
.field label{font-size:0.7rem;font-weight:600;color:var(--ink-soft);letter-spacing:0.2px;}
.field input,.field select{
  width:100%;padding:9px 10px;border-radius:10px;
  border:1px solid rgba(11,36,54,0.15);
  background:rgba(255,255,255,0.6);
  font-family:var(--font-body);font-size:0.85rem;color:var(--ink);
  min-width:0;
}
.field input:focus,.field select:focus{outline:2px solid var(--aqua-dim);outline-offset:1px;}
.field input.mono,.field.mono input{font-family:var(--font-mono);}

.btn{
  border:none;border-radius:12px;padding:10px 18px;cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:0.85rem;
  display:inline-flex;align-items:center;gap:6px;justify-content:center;
  transition:transform 120ms ease, box-shadow 120ms ease;
  white-space:nowrap;
}
.btn svg{width:15px;height:15px;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:linear-gradient(135deg,var(--aqua),var(--aqua-dim));color:#04201C;box-shadow:0 4px 14px rgba(47,211,199,0.4);}
.btn-ghost{background:rgba(255,255,255,0.45);color:var(--ink);border:1px solid rgba(11,36,54,0.12);}
.btn-danger{background:rgba(232,119,107,0.18);color:#7A2B22;border:1px solid rgba(232,119,107,0.4);}
.btn-danger:hover{background:rgba(232,119,107,0.3);}
.btn-block{width:100%;}
.btn-sm{padding:6px 10px;font-size:0.75rem;border-radius:8px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}

.icon-btn{
  width:32px;height:32px;border-radius:9px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  background:rgba(255,255,255,0.5);color:var(--ink-soft);
  transition:background 120ms ease, color 120ms ease;
}
.icon-btn svg{width:15px;height:15px;}
.icon-btn:hover{background:rgba(255,255,255,0.8);color:var(--ink);}
.icon-btn.danger:hover{background:rgba(232,119,107,0.25);color:#7A2B22;}

.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px;}
table{border-collapse:collapse;width:100%;min-width:760px;font-size:0.78rem;}
thead th{
  text-align:left;padding:9px 10px;background:rgba(11,36,54,0.08);
  font-family:var(--font-display);font-weight:700;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.4px;
  color:var(--ink-soft);position:sticky;top:0;white-space:nowrap;
}
tbody td{padding:8px 10px;border-top:1px solid rgba(11,36,54,0.08);white-space:nowrap;}
tbody tr:hover{background:rgba(255,255,255,0.35);}
td.num,th.num{font-family:var(--font-mono);text-align:right;}
.row-actions{display:flex;gap:4px;}

.filter-bar{display:grid;gap:8px;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));}
.filter-bar select{width:100%;padding:8px 9px;border-radius:9px;border:1px solid rgba(11,36,54,0.15);background:rgba(255,255,255,0.55);font-size:0.78rem;font-family:var(--font-body);color:var(--ink);}

.totals-strip{display:flex;flex-wrap:wrap;gap:10px;}
.total-chip{
  padding:8px 14px;border-radius:12px;background:rgba(255,255,255,0.55);
  border:1px solid rgba(255,255,255,0.6);
  display:flex;flex-direction:column;gap:2px;min-width:88px;
}
.total-chip span.lbl{font-size:0.62rem;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.4px;}
.total-chip span.val{font-family:var(--font-mono);font-weight:700;font-size:1rem;color:var(--ink);}

.empty-state{padding:30px 14px;text-align:center;color:var(--ink-soft);font-size:0.85rem;}
.empty-state svg{width:36px;height:36px;margin-bottom:8px;opacity:0.5;}

/* project list */
.project-list{display:flex;flex-direction:column;gap:8px;}
.project-item{
  display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:14px;
  background:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.5);cursor:pointer;
}
.project-item.active{background:rgba(47,211,199,0.25);border-color:var(--aqua-dim);}
.project-item .pinfo{flex:1;min-width:0;}
.project-item .pinfo b{display:block;font-family:var(--font-display);font-size:0.92rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.project-item .pinfo span{font-size:0.72rem;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;}

/* modal */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(4,16,22,0.55);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;
}
.modal{max-width:420px;width:100%;padding:20px;max-height:86vh;overflow-y:auto;}
.modal h3{margin:0 0 4px 0;font-family:var(--font-display);font-size:1rem;}
.modal .field-grid{margin-top:6px;}

.badge{
  display:inline-flex;padding:3px 9px;border-radius:20px;font-size:0.68rem;font-weight:700;
  background:rgba(47,211,199,0.22);color:#0A5850;
}

footer.appfoot{text-align:center;padding:14px;color:rgba(11,36,54,0.45);font-size:0.68rem;}

.logo-preview{width:56px;height:56px;border-radius:10px;object-fit:contain;background:rgba(255,255,255,0.7);border:1px solid rgba(11,36,54,0.1);padding:4px;}

.toast{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  padding:12px 20px;border-radius:12px;z-index:200;
  font-family:var(--font-body);font-weight:600;font-size:0.85rem;
  background:var(--glass-bg-strong);backdrop-filter:blur(14px);
  border:1px solid var(--glass-border);box-shadow:0 8px 24px var(--shadow-color);
  color:var(--ink);opacity:0;pointer-events:none;transition:opacity 200ms ease, transform 200ms ease;
  max-width:90vw;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

/* pick list for metrajdan ekle */
.pick-list{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto;}
.pick-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;background:rgba(255,255,255,0.4);font-size:0.78rem;}
.pick-item label{flex:1;min-width:0;overflow-wrap:anywhere;}

.checkline{display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--ink-soft);}

/* PDF hidden render area */
#pdf-render-root{position:fixed;left:-99999px;top:0;width:794px;background:#ffffff;}

.backup-banner{
  display:flex;align-items:center;gap:10px;
  margin:8px 12px 0;padding:10px 14px;border-radius:12px;
  background:rgba(255,183,77,0.18);border:1px solid rgba(255,152,0,0.55);
  color:#7a4a00;font-size:0.8rem;font-weight:600;flex-wrap:wrap;
}
.backup-banner svg{flex-shrink:0;width:20px;height:20px;color:#c77700;}
.backup-banner span{flex:1;min-width:200px;}
.backup-banner .btn{white-space:nowrap;}

/* personel durum rozeti */
.status-badge{display:inline-flex;padding:3px 9px;border-radius:20px;font-size:0.66rem;font-weight:700;white-space:nowrap;}
.status-badge.aktif{background:rgba(47,211,199,0.22);color:#0A5850;}
.status-badge.ayrilmis{background:rgba(232,119,107,0.2);color:#7A2B22;}

/* puantaj / mesai tablosu */
.att-table{border-collapse:collapse;font-size:0.72rem;min-width:max-content;}
.att-table th,.att-table td{border:1px solid rgba(11,36,54,0.1);padding:0;text-align:center;}
.att-table thead th{background:rgba(11,36,54,0.08);font-family:var(--font-display);font-weight:700;font-size:0.62rem;color:var(--ink-soft);padding:6px 4px;white-space:nowrap;position:sticky;top:0;}
.att-table th.wknd,.att-table td.wknd{background:rgba(232,119,107,0.12);}
.att-table thead th.wknd{background:rgba(232,119,107,0.22);}
.att-table td.name-cell,.att-table th.name-cell{
  text-align:left;padding:7px 10px;white-space:nowrap;position:sticky;left:0;z-index:2;
  background:rgba(234,246,245,0.95);font-weight:600;min-width:130px;
}
.att-table thead th.name-cell{z-index:3;background:rgba(11,36,54,0.1);}
.att-cell{
  width:30px;height:30px;border:none;background:transparent;cursor:pointer;
  font-family:var(--font-mono);font-weight:700;font-size:0.75rem;color:var(--ink-soft);
  display:block;margin:0 auto;
}
.att-cell:hover:not(:disabled){background:rgba(255,255,255,0.5);}
.att-cell[data-val="X"]{color:#0A5850;background:rgba(47,211,199,0.28);}
.att-cell[data-val="Y"]{color:#8a5a00;background:rgba(255,183,77,0.32);}
.att-cell[data-val="O"]{color:#7A2B22;background:rgba(232,119,107,0.22);}
.att-cell:disabled{opacity:0.25;cursor:not-allowed;}
.att-table td.total-cell{font-family:var(--font-mono);font-weight:700;background:rgba(28,110,140,0.08);}
.att-table tfoot td,.att-table tfoot th{font-family:var(--font-mono);font-weight:700;background:rgba(11,36,54,0.08);padding:6px 4px;}
.mesai-input{
  width:44px;padding:5px 2px;border:none;background:transparent;text-align:center;
  font-family:var(--font-mono);font-size:0.75rem;color:var(--ink);
}
.mesai-input:disabled{opacity:0.25;}
.mesai-input:focus{outline:2px solid var(--aqua-dim);outline-offset:-2px;}
.att-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:0.72rem;color:var(--ink-soft);align-items:center;}
.att-legend b{font-family:var(--font-mono);padding:1px 7px;border-radius:5px;margin-right:3px;}
.month-picker{padding:9px 10px;border-radius:10px;border:1px solid rgba(11,36,54,0.15);background:rgba(255,255,255,0.6);font-family:var(--font-body);font-size:0.85rem;color:var(--ink);}

@media (max-width:640px){
  header.topbar{gap:8px;padding:10px 12px;}
  .brand-text span{display:none;}
  .project-picker{flex:1 1 100%;max-width:none;order:3;}
  table{font-size:0.72rem;}
  .card{padding:14px;}
}
</style>
</head>
<body>
<div id="app">

  <header class="topbar glass">
    <button class="icon-btn ripple-el-host" id="btnMenuToggle" title="Modülleri Aç">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#04201C" stroke-width="2.2" stroke-linecap="round"><path d="M2 15c1.5-2 3.5-2 5 0s3.5 2 5 0 3.5-2 5 0 3.5 2 5 0"/><path d="M2 20c1.5-2 3.5-2 5 0s3.5 2 5 0 3.5-2 5 0 3.5 2 5 0"/><path d="M12 3v9"/><path d="M9 6l3-3 3 3"/></svg>
      </div>
      <div class="brand-text">
        <b>DNZ</b>
        <span>Metraj &amp; Teklif Yönetimi</span>
      </div>
    </div>
    <div class="project-picker">
      <select id="projectSelect" class="proj-select ripple-el-host"></select>
      <button class="icon-btn ripple-el-host" id="btnQuickNewProject" title="Yeni proje">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
  </header>

  <div id="backupBanner" class="backup-banner" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
    <span>Kaydedilmemiş yedeğiniz var. Verilerinizi kaybetmemek için Ayarlar &gt; "Yedeği İndir" ile yedek alın.</span>
    <button class="btn btn-sm btn-primary" id="bannerBackupBtn">Şimdi Yedekle</button>
  </div>

  <div class="nav-backdrop" id="navBackdrop"></div>
  <nav class="tabs glass" id="tabNav">
    <div class="nav-header">
      <b>Modüller</b>
      <button class="icon-btn" id="btnCloseNav" title="Kapat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <button class="tab-btn active ripple-el-host" data-tab="projeler">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 7h5l2 2h11v9a2 2 0 01-2 2H3z"/></svg>
      Projeler

const STORAGE_KEY = 'dnzMetrajData_v1';
const LS_STORAGE_KEY = 'dnzMetrajData_localCache_v1';
const UNITS = ['m2','mt','kg','adet','m3','ton'];
const UNIT_LABEL = {m2:'m²', mt:'mt', kg:'kg', adet:'adet', m3:'m³', ton:'ton'};

/* ======================= PERSISTENCE ======================= */
// Otomatik yedekleme dosyası: kullanıcının kendi seçtiği bir konumda (Drive/Dropbox
// klasörü, harici disk, telefonda bir klasör vs.) duran tek bir JSON dosyası. Bir kez
// seçildikten sonra HER veri değişikliğinde bu dosyaya otomatik yazılır ve uygulama HER
// açılışında öncelikle bu dosyadan okunur. Böylece "kendim yükledim" derdi ortadan kalkar.
let autoBackupHandleCache = null;
let autoBackupInfo = { name:null, active:false };
async function getAutoBackupHandle(){
  if(autoBackupHandleCache !== null) return autoBackupHandleCache;
  autoBackupHandleCache = await fsIdbGet(FS_AUTO_BACKUP_HANDLE_KEY);
  return autoBackupHandleCache;
}
async function refreshAutoBackupInfo(){
  try{
    const handle = await getAutoBackupHandle();
    if(handle){
      const perm = await handle.queryPermission({mode:'readwrite'});
      autoBackupInfo = { name: handle.name, active: perm==='granted' };
    } else {
      autoBackupInfo = { name:null, active:false };
    }
  }catch(e){
    autoBackupInfo = { name:null, active:false };
  }
}
async function writeAutoBackup(text){
  try{
    const handle = await getAutoBackupHandle();
    if(!handle) return false;
    const perm = await handle.queryPermission({mode:'readwrite'});
    if(perm!=='granted') return false;
    const writable = await handle.createWritable();
    await writable.write(text);
    await writable.close();
    return true;
  }catch(e){
    console.error('Otomatik yedekleme yazma hatası', e);
    return false;
  }
}
// Ham kayıt: state'i olduğu gibi depolar, "yedeklendi" bayrağına dokunmaz.
async function persistStateRaw(){
  const json = JSON.stringify(state);
  // 1) Tarayıcı önbelleği (localStorage): her cihaz/tarayıcıda çalışan, en güvenilir katman.
  //    Mobil dahil hemen hemen her tarayıcıda desteklenir; bu yüzden ana güvence budur.
  try{
    localStorage.setItem(LS_STORAGE_KEY, json);
  }catch(e){
    console.error('Tarayıcı önbelleğine kaydetme hatası', e);
  }
  // 2) Claude ortamı içindeyse (window.storage mevcutsa) onu da güncelle.
  if(typeof window.storage !== 'undefined'){
    try{
      await window.storage.set(STORAGE_KEY, json, false);
    }catch(e){
      console.error('Kaydetme hatası', e);
    }
  }
  // 3) Otomatik yedekleme konumu ayarlanmışsa (ve izin hâlâ geçerliyse) her kayıtta
  //    o dosyayı da güncelle. Bu isteğe bağlı bir ek güvencedir (özellikle masaüstünde);
  //    desteklenmiyorsa veya izin yoksa sessizce atlanır, hata göstermez.
  await writeAutoBackup(json);
}
// Normal veri değişikliklerinde çağrılır: veri değiştiği için "yedeklenmemiş değişiklik var" işaretlenir.
async function saveState(){
  state.dirtySinceBackup = true;
  await persistStateRaw();
  updateBackupBanner();
}
async function loadState(){
  // 1) Önce, kullanıcının seçtiği otomatik yedekleme dosyası var mı ve izin hâlâ
  //    geçerli mi diye bak. Varsa bu dosya ARTIK ana kaynaktır; doğrudan oradan yükle.
  try{
    const handle = await getAutoBackupHandle();
    if(handle){
      const perm = await handle.queryPermission({mode:'readwrite'});
      if(perm==='granted'){
        const text = await readBackupFromHandle(handle);
        if(text && text.trim()){
          const parsed = JSON.parse(text);
          state = Object.assign(defaultState(), parsed);
          if(!state.projects) state.projects = {};
          state.dirtySinceBackup = false;
          return;
        }
      }
    }
  }catch(e){ /* otomatik yedek dosyasından okunamazsa aşağıdaki normal akışa düş */ }

  // 2) Otomatik yedekleme konumu ayarlanmamışsa (veya okunamadıysa) tarayıcı önbelleğini
  //    (localStorage) dene — bu, hemen hemen her cihaz/tarayıcıda (mobil dahil) çalışır.
  let loadedFromCache = false;
  try{
    const raw = localStorage.getItem(LS_STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      state = Object.assign(defaultState(), parsed);
      if(!state.projects) state.projects = {};
      loadedFromCache = true;
    }
  }catch(e){ /* localStorage yoksa/okunamazsa aşağıdaki akışa düş */ }

  // 3) Tarayıcı önbelleğinde veri yoksa, Claude ortamındaysak window.storage'ı dene.
  if(!loadedFromCache){
    try{
      if(typeof window.storage !== 'undefined'){
        const r = await window.storage.get(STORAGE_KEY, false);
        if(r && r.value){
          const parsed = JSON.parse(r.value);
          state = Object.assign(defaultState(), parsed);
          if(!state.projects) state.projects = {};
        } else {
          state = defaultState();
        }
      } else {
        state = defaultState();
      }
    }catch(e){
      state = defaultState();
    }
  }
  // 4) Eski davranış: "Yedekten Geri Yükle" ile daha önce açılmış salt-okunur bir
  //    dosya hafızası varsa ve normal depo boşsa, izin istemeden otomatik dene.
  if(!state.activeProjectId && Object.keys(state.projects).length===0){
    try{
      const handle = await fsIdbGet(FS_BACKUP_HANDLE_KEY);
      if(handle){
        const perm = await handle.queryPermission({mode:'read'});
        if(perm==='granted'){
          const text = await readBackupFromHandle(handle);
          const parsed = JSON.parse(text);
          if(parsed && parsed.projects && Object.keys(parsed.projects).length>0){
            state = Object.assign(defaultState(), parsed);
            if(!state.projects) state.projects = {};
            state.dirtySinceBackup = false;
          }
        }
      }
    }catch(e){ /* otomatik geri yükleme başarısız olursa sessizce geç, normal state kalır */ }
  }
}
function hasAnyData(){
  return Object.values(state.projects||{}).some(p=> (p.metrajRows&&p.metrajRows.length) || (p.teklifRows&&p.teklifRows.length));
}
function needsBackupWarning(){
  return hasAnyData() && state.dirtySinceBackup===true;
}
function fmtBackupDate(ts){
  if(!ts) return 'Henüz yedekleme yapılmadı';
  const d = new Date(ts);
  const pad = n=>String(n).padStart(2,'0');
  return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function updateBackupBanner(){
  const el = document.getElementById('backupBanner');
  if(!el) return;

    el.style.display = 'flex';

/* ======================= HELPERS ======================= */
function activeProject(){

}
function fmtNum(n){
  if(n===null||n===undefined||isNaN(n)) n=0;
  return Number(n).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtMoney(n){
  if(n===null||n===undefined||isNaN(n)) n=0;
  return Number(n).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+' TL';
}
function todayStr(){
  const d = new Date();
  return d.toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function esc(s){
  return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function showToast(msg, ms=2400){

  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove('show'), ms);
}
function addMemory(project, field, value){
  if(!value) return;
  value = value.trim();
  if(!value) return;
  if(!project.memory[field]) project.memory[field]=[];
  if(!project.memory[field].some(v=>v.toLowerCase()===value.toLowerCase())){
    project.memory[field].push(value);
  }
}
// Baştaki/sondaki boşluk ve büyük/küçük harf farkını yok sayarak karşılaştırma anahtarı üretir.
// (Örn. "Duvar", " Duvar" ve "duvar" aynı kabul edilir.) Filtreleme ve İcmal gruplamasında
// aynı kaydın yanlışlıkla farklı gruplara/ filtre seçeneklerine düşmesini engeller.
function normKey(v){ return (v==null?'':String(v)).trim().toLocaleLowerCase('tr'); }
function distinctFromRows(rows, field){
  const map = new Map(); // normalize edilmiş anahtar -> gösterilecek (trimlenmiş) değer
  rows.forEach(r=>{
    const raw = r[field];
    if(raw==null) return;
    const trimmed = String(raw).trim();
    if(!trimmed) return;
    const key = normKey(trimmed);
    if(!map.has(key)) map.set(key, trimmed);
  });
  return Array.from(map.values()).sort((a,b)=>a.localeCompare(b,'tr'));
}
function resizeImageDataUrl(dataUrl, maxDim=320, quality=0.82){
  return new Promise((resolve)=>{
    try{
      const img = new Image();
      img.onload = ()=>{
        let width = img.width, height = img.height;
        if(width>maxDim || height>maxDim){
          if(width>=height){ height = Math.round(height*maxDim/width); width = maxDim; }
          else { width = Math.round(width*maxDim/height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0,0,width,height);
        ctx.drawImage(img,0,0,width,height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = ()=>resolve(dataUrl);
      img.src = dataUrl;
    }catch(e){ resolve(dataUrl); }
  });
}

/* ======================= RIPPLE ======================= */
document.addEventListener('pointerdown', (e)=>{
  const target = e.target.closest('.glass, .btn, .icon-btn, .tab-btn, .project-item, select, .card');
  if(!target) return;
  const rect = target.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height) * 1.6;
  const span = document.createElement('span');
  span.className = 'ripple-el';
  span.style.width = size+'px';
  span.style.height = size+'px';
  span.style.left = (e.clientX - rect.left - size/2)+'px';
  span.style.top = (e.clientY - rect.top - size/2)+'px';
  const prevPos = getComputedStyle(target).position;
  if(prevPos==='static') target.style.position='relative';
  if(getComputedStyle(target).overflow==='visible') target.style.overflow='hidden';
  target.appendChild(span);
  setTimeout(()=>span.remove(), 720);
}, {passive:true});

/* ======================= CALC ======================= */
function computeRow(row){
  const adet = parseFloat(row.adet)||1;
  const uzunluk = parseFloat(row.uzunluk)||1;
  const yukseklik = row.yukseklik!==''&&row.yukseklik!==null&&row.yukseklik!==undefined ? (parseFloat(row.yukseklik)||1) : 1;
  const kisaKenar = row.kisaKenar!==''&&row.kisaKenar!==null&&row.kisaKenar!==undefined ? (parseFloat(row.kisaKenar)||1) : 1;
  const minha = parseFloat(row.minha)||0;
  const toplam = adet*uzunluk*yukseklik*kisaKenar;
  const altToplam = toplam - minha;
  return { toplam: Math.round(toplam*100)/100, altToplam: Math.round(altToplam*100)/100 };
}

let allowExitOnce = false;
function armExitTrap(){
  try{ history.pushState({dnzExitTrap:true}, '', location.href); }catch(e){/* yoksay */}
}
armExitTrap();

  if(allowExitOnce){ allowExitOnce = false; return; }
  if(needsBackupWarning()){
    armExitTrap(); // geri tuşunu tekrar "tuzağa" al
    showExitBackupWarning();

});

  if(ui.tab==='metraj') return renderMetrajTab(main, proj);
  if(ui.tab==='icmal') return renderIcmalTab(main, proj);
  if(ui.tab==='teklif') return renderTeklifTab(main, proj);
  if(ui.tab==='personel') return renderPersonelTab(main, proj);
  if(ui.tab==='puantaj') return renderPuantajTab(main, proj);
  if(ui.tab==='avanszimmet') return renderAvansZimmetTab(main, proj);
  if(ui.tab==='topluicmal') return renderTopluIcmalTab(main, proj);
  if(ui.tab==='tahsilat') return renderTahsilatTab(main, proj);
  if(ui.tab==='masraf') return renderMasrafTab(main, proj);
}

  document.getElementById('mSave').onclick = ()=>{

function saveMetrajRow(proj){
  // Blok/Kat/Daire/Mekân/Uygulama Yeri/İmalat Cinsi serbest metin alanlarındaki baştaki/
  // sondaki boşlukları temizliyoruz. Aksi halde "Duvar" ve "Duvar " (sonda boşluk) İcmal'de
  // farklı kayıtlar gibi ayrı ayrı toplanıyordu.
  ['blok','kat','daire','mekan','eleman','imalat'].forEach(f=>{
    if(typeof metrajForm[f]==='string') metrajForm[f] = metrajForm[f].trim();
  });
  const c = computeRow(metrajForm);
  const row = Object.assign({}, metrajForm, {toplam:c.toplam, altToplam:c.altToplam});
  if(!row.mekan && !row.imalat && !row.blok){
    showToast('Lütfen en azından Blok, Mekân veya İmalat Cinsi girin.');
    return;
  }
  if(row.id){
    const idx = proj.metrajRows.findIndex(r=>r.id===row.id);
    if(idx>-1) proj.metrajRows[idx] = row;
  } else {
    row.id = uid();
    row.createdAt = Date.now();
    proj.metrajRows.push(row);
  }
  ['blok','kat','daire','mekan','eleman','imalat'].forEach(f=>addMemory(proj, f, row[f]));
  saveState();
  metrajForm = emptyMetrajForm();
  renderMain();
  showToast('Metraj satırı kaydedildi.');
}

function renderFilterBar(proj){
  const bar = document.getElementById('filterBar');
  const fields = [['blok','Blok'],['kat','Kat'],['daire','Daire'],['mekan','Mekân'],['eleman','Uygulama Yeri'],['imalat','İmalat Cinsi'],['minha','Minha']];
  bar.innerHTML = fields.map(([f,label])=>{
    const opts = distinctFromRows(proj.metrajRows, f);
    return `<select id="filt-${f}">
      <option value="">${label}: Tümü</option>
      ${opts.map(o=>`<option value="${esc(o)}" ${ui.filters[f]===o?'selected':''}>${esc(o)}</option>`).join('')}
    </select>`;
  }).join('') + `<button class="btn btn-ghost btn-sm" id="btnClearFilters" style="align-self:end;">Filtreleri Temizle</button>`;
  fields.forEach(([f])=>{
    document.getElementById('filt-'+f).addEventListener('change',(e)=>{
      ui.filters[f] = e.target.value;
      renderMetrajTable(proj);
      renderMetrajTotals(proj);
    });
  });
  document.getElementById('btnClearFilters').onclick = ()=>{
    ui.filters = {blok:'',kat:'',daire:'',mekan:'',eleman:'',imalat:'',minha:''};
    renderMain();
  };
}

function filteredRows(proj){
  return proj.metrajRows.filter(r=>{
    return ['blok','kat','daire','mekan','eleman','imalat','minha'].every(f=> !ui.filters[f] || normKey(r[f])===normKey(ui.filters[f]));

}

function icmalFilteredRows(proj){
  return proj.metrajRows.filter(r=>{
    return ['blok','kat','daire','mekan'].every(f=> !ui.icmalFilters[f] || normKey(r[f])===normKey(ui.icmalFilters[f]));
  });
}
function groupIcmalRows(rows){
  const map = new Map();
  rows.forEach(r=>{
    // Uygulama Yeri / İmalat Cinsi serbest metin olduğu için baştaki/sondaki boşluk ve
    // büyük/küçük harf farkları (ör. "Duvar" / "duvar ") normalize edilerek aynı grupta toplanır.
    const eleman = (r.eleman||'').toString().trim() || '(Belirtilmemiş)';
    const imalat = (r.imalat||'').toString().trim() || '(Belirtilmemiş)';
    const birim = r.birim || 'm2';
    const key = [normKey(eleman), normKey(imalat), birim].join('|');
    if(!map.has(key)) map.set(key, {eleman, imalat, birim, toplam:0, altToplam:0, adet:0});
    const g = map.get(key);
    g.toplam += (parseFloat(r.toplam)||0);
    g.altToplam += (parseFloat(r.altToplam)||0);
    g.adet += 1;
  });
  return Array.from(map.values()).sort((a,b)=>{
    return a.eleman.localeCompare(b.eleman,'tr') || a.imalat.localeCompare(b.imalat,'tr');
  });
}

function saveTeklifRow(proj){
  const miktar = parseFloat(teklifForm.miktar)||0;

    id: teklifForm.id || uid(),
    aciklama: teklifForm.aciklama.trim(),
    miktar, birim: teklifForm.birim, birimFiyat,
    tutar: Math.round(miktar*birimFiyat*100)/100
  };
  if(teklifForm.id){
    const idx = proj.teklifRows.findIndex(r=>r.id===row.id);
    if(idx>-1) proj.teklifRows[idx]=row;
  } else {
    proj.teklifRows.push(row);

  saveState();
  teklifForm = emptyTeklifForm();
  renderMain();
  showToast('Teklif kalemi kaydedildi.');

  };
  if(personelForm.id){
    const idx = proj.personel.findIndex(p=>p.id===row.id);
    if(idx>-1) proj.personel[idx]=row;
  } else {
    proj.personel.push(row);
  }
  saveState();
  personelForm = emptyPersonelForm();
  renderMain();
  showToast('Personel kartı kaydedildi.');
}

function personelStatus(p){
  if(!p.cikisTarihi) return {text:'Aktif', cls:'aktif'};
  const today = new Date(); today.setHours(0,0,0,0);
  const cikis = new Date(p.cikisTarihi);
  return cikis < today ? {text:'Ayrılmış', cls:'ayrilmis'} : {text:'Aktif', cls:'aktif'};
}
function fmtDateStr(iso){
  if(!iso) return '—';
  const [y,m,d] = iso.split('-');
  return `${d}.${m}.${y}`;
}

/* ======================= PUANTAJ / MESAİ TAB ======================= */
const ATT_SEQ = ['','X','Y','O'];
const ATT_VALUE = {X:1, Y:0.5, O:0};
const GUN_KISA = ['Pz','Pt','Sa','Ça','Pe','Cu','Ct'];

function ymParts(ym){ const [y,m] = ym.split('-').map(Number); return {y,m}; }
function daysInMonth(ym){ const {y,m} = ymParts(ym); return new Date(y, m, 0).getDate(); }
function dateKeyFor(ym, day){ const {m,y} = ymParts(ym); return `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`; }
function isWeekendDay(ym, day){ const {y,m} = ymParts(ym); return [0,6].includes(new Date(y, m-1, day).getDay()); }
function dowLabel(ym, day){ const {y,m} = ymParts(ym); return GUN_KISA[new Date(y, m-1, day).getDay()]; }

// Seçilen ay içinde "işte olan" personel: giriş tarihi ay sonuna kadar gelmiş,
// çıkış tarihi (varsa) ay başından önce olmayan kişiler.
function activePersonelForMonth(proj, ym){
  const {y,m} = ymParts(ym);
  const firstDay = new Date(y, m-1, 1);
  const lastDay = new Date(y, m, 0);
  return (proj.personel||[]).filter(p=>{
    if(!p.girisTarihi) return false;
    const giris = new Date(p.girisTarihi);
    if(giris > lastDay) return false;
    if(p.cikisTarihi){
      const cikis = new Date(p.cikisTarihi);
      if(cikis < firstDay) return false;
    }
    return true;
  }).sort((a,b)=>a.adSoyad.localeCompare(b.adSoyad,'tr'));
}
// Bir güne ait hücrenin düzenlenebilir olup olmadığı: giriş tarihinden önce
// ve çıkış tarihinden sonraki günlerde işlem yapılamaz (çıkış verilmiş personel için).
function dayEditable(p, ym, day){
  const key = dateKeyFor(ym, day);
  if(p.girisTarihi && key < p.girisTarihi) return false;
  if(p.cikisTarihi && key > p.cikisTarihi) return false;
  return true;
}
function personelPuantajToplam(p, ym){
  const n = daysInMonth(ym);
  let total = 0;
  for(let d=1; d<=n; d++){
    const key = dateKeyFor(ym, d);
    const val = p.puantaj && p.puantaj[key];
    if(val) total += ATT_VALUE[val] || 0;
  }
  return total;
}
function personelMesaiToplam(p, ym){
  const n = daysInMonth(ym);
  let total = 0;
  for(let d=1; d<=n; d++){
    const key = dateKeyFor(ym, d);
    const val = parseFloat(p.mesai && p.mesai[key]);
    if(val) total += val;
  }
  return total;
}

function renderPuantajTable(proj, opts){
  opts = opts || {};
  const wrapId = opts.wrapId || 'puantajTableWrap';
  const ym = opts.ym || ui.puantajAy;
  const wrap = document.getElementById(wrapId);
  const list = opts.list || activePersonelForMonth(proj, ym);
  if(list.length===0){
    wrap.innerHTML = `<div class="empty-state">Bu ay için işte olan (giriş yapılmış ve çıkışı verilmemiş) personel bulunamadı.</div>`;
    return;
  }
  const n = daysInMonth(ym);
  const days = Array.from({length:n}, (_,i)=>i+1);

  const dayTotals = days.map(d=>{
    const key = dateKeyFor(ym, d);
    return list.reduce((s,p)=>{
      const val = p.puantaj && p.puantaj[key];
      return s + (val ? (ATT_VALUE[val]||0) : 0);
    }, 0);
  });
  const grandTotal = dayTotals.reduce((s,v)=>s+v,0);
  const grandTutar = list.reduce((s,p)=> s + personelPuantajToplam(p, ym) * (parseFloat(p.yevmiye)||0), 0);

  wrap.innerHTML = `
    <table class="att-table">
      <thead>
        <tr>
          <th class="name-cell">Adı Soyadı</th>
          ${days.map(d=>`<th class="${isWeekendDay(ym,d)?'wknd':''}">${d}<br>${dowLabel(ym,d)}</th>`).join('')}
          <th>Toplam</th>
          <th>Tutar</th>
        </tr>
      </thead>
      <tbody>
        ${list.map(p=>{
          const gunToplam = personelPuantajToplam(p, ym);
          const tutar = gunToplam * (parseFloat(p.yevmiye)||0);
          return `
          <tr data-emp="${p.id}">
            <td class="name-cell">${esc(p.adSoyad)}</td>
            ${days.map(d=>{
              const editable = dayEditable(p, ym, d);
              const key = dateKeyFor(ym, d);
              const val = (p.puantaj && p.puantaj[key]) || '';
              return `<td class="${isWeekendDay(ym,d)?'wknd':''}"><button class="att-cell" data-day="${d}" data-val="${val}" ${editable?'':'disabled'}>${val}</button></td>`;
            }).join('')}
            <td class="total-cell" data-puantaj-total="${p.id}">${fmtNum(gunToplam)}</td>
            <td class="total-cell" data-puantaj-tutar="${p.id}">${fmtMoney(tutar)}</td>
          </tr>`;
        }).join('')}
      </tbody>
      <tfoot>
        <tr>
          <td class="name-cell">Toplam</td>
          ${dayTotals.map((t,i)=>`<td class="${isWeekendDay(ym,i+1)?'wknd':''}">${t?fmtNum(t):''}</td>`).join('')}
          <td data-puantaj-grand>${fmtNum(grandTotal)}</td>
          <td>${fmtMoney(grandTutar)}</td>
        </tr>
      </tfoot>
    </table>
  `;
  wrap.querySelectorAll('button.att-cell').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const tr = btn.closest('tr[data-emp]');
      const p = proj.personel.find(x=>x.id===tr.dataset.emp);
      if(!p) return;
      const day = parseInt(btn.dataset.day, 10);
      const key = dateKeyFor(ym, day);
      const cur = p.puantaj[key] || '';
      const next = ATT_SEQ[(ATT_SEQ.indexOf(cur)+1) % ATT_SEQ.length];
      if(next===''){ delete p.puantaj[key]; } else { p.puantaj[key] = next; }
      saveState();
      renderPuantajTable(proj, opts);
    });
  });
  const chipWrap = document.createElement('div');
  chipWrap.className = 'totals-strip';
  chipWrap.style.marginTop = '10px';
  chipWrap.innerHTML = `
    <div class="total-chip"><span class="lbl">Alt Toplam (Adam/Gün)</span><span class="val">${fmtNum(grandTotal)}</span></div>
    <div class="total-chip"><span class="lbl">Alt Toplam Tutar</span><span class="val">${fmtMoney(grandTutar)}</span></div>
  `;
  wrap.appendChild(chipWrap);
}

function renderMesaiTable(proj, opts){

    const dayTotals = days.map(d=>{
      const key = dateKeyFor(ym, d);
      return list.reduce((s,p)=> s + (parseFloat(p.mesai && p.mesai[key]) || 0), 0);
    });
    const grandHrs = dayTotals.reduce((s,v)=>s+v,0);

      <div class="total-chip"><span class="lbl">Alt Toplam Saat</span><span class="val">${fmtNum(grandHrs)}</span></div>
      <div class="total-chip"><span class="lbl">Alt Toplam Tutar</span><span class="val">${fmtMoney(grandTutar)}</span></div>
    `;

      <td style="${cellStyle}font-weight:700;">${fmtMoney(toplamSaat*saatlik)}</td>
    </tr>`;
  }).join('');
  const mesaiDayTotals = days.map(d=>{
    const key = dateKeyFor(ym,d);
    return list.reduce((s,p)=> s + (parseFloat(p.mesai && p.mesai[key]) || 0), 0);
  });
  const mesaiGrandHrs = mesaiDayTotals.reduce((s,v)=>s+v,0);
  const mesaiGrandTutar = list.reduce((s,p)=> s + personelMesaiToplam(p, ym) * ((parseFloat(p.yevmiye)||0)/8), 0);
  const mesaiFoot = `
    <tr style="background:#EAF6F5;font-weight:700;">
      <td style="${nameStyle}">Toplam</td>
      ${mesaiDayTotals.map((t,i)=>`<td style="${cellStyle}${isWeekendDay(ym,i+1)?wkndStyle:''}">${t?fmtNum(t):''}</td>`).join('')}
      <td style="${cellStyle}">${fmtNum(mesaiGrandHrs)}</td>
      <td style="${cellStyle}">${fmtMoney(mesaiGrandTutar)}</td>
    </tr>`;

  const html = `
    ${pdfHeaderHtml(proj, 'Puantaj ve Mesai Cetveli — ' + ayAdi)}
    <div style="font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;margin-bottom:6px;color:#1C6E8C;">Puantaj Cetveli</div>
    <table style="width:100%;border-collapse:collapse;font-size:8px;table-layout:auto;margin-bottom:8px;">
      <thead>${puantajHead}</thead>
      <tbody>${puantajRows}</tbody>
      <tfoot>${puantajFoot}</tfoot>
    </table>
    <div style="font-size:9px;color:#345264;margin-bottom:18px;">Alt Toplam (Adam/Gün): <b>${fmtNum(puantajGrand)}</b> &nbsp;|&nbsp; Alt Toplam Tutar: <b>${fmtMoney(puantajGrandTutar)}</b> &nbsp;|&nbsp; X=Tam Gün(1), Y=Yarım Gün(0,5), O=Yok/İzinli(0)</div>

    <div style="font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;margin-bottom:6px;color:#1C6E8C;">Mesai Cetveli</div>
    <table style="width:100%;border-collapse:collapse;font-size:8px;table-layout:auto;">
      <thead>${mesaiHead}</thead>
      <tbody>${mesaiRows}</tbody>
      <tfoot>${mesaiFoot}</tfoot>
    </table>
    <div style="font-size:9px;color:#345264;margin-top:8px;">Alt Toplam Saat: <b>${fmtNum(mesaiGrandHrs)}</b> &nbsp;|&nbsp; Alt Toplam Tutar: <b>${fmtMoney(mesaiGrandTutar)}</b> &nbsp;|&nbsp; Saatlik ücret = Yevmiye / 8</div>

    <div style="margin-top:36px;font-size:9px;color:#8096A3;">DNZ Metraj &amp; Teklif Yönetimi ile oluşturulmuştur.</div>
  `;
  try{
    await renderNodeToPdf(html, `puantaj-mesai-${ym}-${proj.name.replace(/[^a-z0-9ığüşöç]+/gi,'_')}.pdf`, 'l');
    showToast('Puantaj & Mesai PDF indirildi.');
  }catch(e){
    console.error(e);
    showToast('PDF oluşturulurken bir sorun oluştu.');
  }
}

function saveAvansRow(proj){
  if(!avansForm.personelId){ showToast('Lütfen personel seçin.'); return; }
  if(!avansForm.odemeTarihi){ showToast('Lütfen ödeme tarihini girin.'); return; }
  const tutar = parseFloat(avansForm.tutar)||0;
  if(tutar<=0){ showToast('Lütfen geçerli bir tutar girin.'); return; }
  const p = proj.personel.find(x=>x.id===avansForm.personelId);
  const row = {
    id: avansForm.id || uid(),
    personelId: avansForm.personelId,
    adSoyad: p ? p.adSoyad : '(silinmiş personel)',
    odemeTarihi: avansForm.odemeTarihi,
    odemeSekli: avansForm.odemeSekli,
    aciklama: avansForm.aciklama.trim(),
    tutar
  };
  if(avansForm.id){
    const idx = proj.avanslar.findIndex(r=>r.id===row.id);
    if(idx>-1) proj.avanslar[idx]=row;
  } else {
    proj.avanslar.push(row);
  }
  saveState();
  avansForm = emptyAvansForm();
  renderMain();
  showToast('Avans kaydedildi.');
}

function filteredAvans(proj){
  return (proj.avanslar||[]).filter(a=> !ui.avansFilterId || a.personelId===ui.avansFilterId)
    .slice().sort((a,b)=> (b.odemeTarihi||'').localeCompare(a.odemeTarihi||''));
}

function renderAvansTable(proj){
  const wrap = document.getElementById('avansTableWrap');

  const totalsEl = document.getElementById('avansTotals');
  if(rows.length===0){
    wrap.innerHTML = `<div class="empty-state">Kayıtlı avans bulunamadı.</div>`;
    totalsEl.innerHTML = '';
    return;
  }
  wrap.innerHTML = `
    <table>
      <thead><tr><th>Adı Soyadı</th><th>Tarih</th><th>Ödeme Şekli</th><th>Açıklama</th><th class="num">Tutar</th><th></th></tr></thead>
      <tbody>
        ${rows.map(r=>`
          <tr data-id="${r.id}">
            <td>${esc(r.adSoyad)}</td>
            <td>${fmtDateStr(r.odemeTarihi)}</td>
            <td>${esc(r.odemeSekli)}</td>
            <td>${esc(r.aciklama)||'—'}</td>

              </div>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>
  `;
  const total = rows.reduce((s,r)=>s+(parseFloat(r.tutar)||0),0);
  totalsEl.innerHTML = `<div class="total-chip"><span class="lbl">Alt Toplam</span><span class="val">${fmtMoney(total)}</span></div>`;
  wrap.querySelectorAll('tr[data-id]').forEach(tr=>{
    tr.addEventListener('click',(e)=>{
      const act = e.target.closest('[data-act]')?.dataset.act;
      if(!act) return;
      const r = proj.avanslar.find(x=>x.id===tr.dataset.id);
      if(!r) return;
      if(act==='edit'){
        avansForm = {id:r.id, personelId:r.personelId, odemeTarihi:r.odemeTarihi, odemeSekli:r.odemeSekli, aciklama:r.aciklama, tutar:String(r.tutar)};
        renderMain(); window.scrollTo({top:0, behavior:'smooth'});
      } else if(act==='delete'){
        confirmModal('Bu avans kaydını silmek istediğinize emin misiniz?', ()=>{
          proj.avanslar = proj.avanslar.filter(x=>x.id!==r.id);
          saveState(); renderMain();
          showToast('Avans kaydı silindi.');
        });
      }
    });
  });
}

function saveZimmetRow(proj){
  if(!zimmetForm.personelId){ showToast('Lütfen personel seçin.'); return; }
  if(!zimmetForm.zimmetTarihi){ showToast('Lütfen zimmet tarihini girin.'); return; }
  if(!zimmetForm.markaModel.trim()){ showToast('Lütfen marka/model girin.'); return; }
  if(zimmetForm.teslimTarihi && zimmetForm.teslimTarihi < zimmetForm.zimmetTarihi){
    showToast('Teslim tarihi, zimmet tarihinden önce olamaz.'); return;
  }
  const p = proj.personel.find(x=>x.id===zimmetForm.personelId);
  const row = {
    id: zimmetForm.id || uid(),
    personelId: zimmetForm.personelId,
    adSoyad: p ? p.adSoyad : '(silinmiş personel)',
    zimmetTarihi: zimmetForm.zimmetTarihi,
    markaModel: zimmetForm.markaModel.trim(),
    aciklama: zimmetForm.aciklama.trim(),
    teslimTarihi: zimmetForm.teslimTarihi
  };
  if(zimmetForm.id){
    const idx = proj.zimmetler.findIndex(r=>r.id===row.id);
    if(idx>-1) proj.zimmetler[idx]=row;
  } else {
    proj.zimmetler.push(row);
  }
  saveState();
  zimmetForm = emptyZimmetForm();
  renderMain();
  showToast('Zimmet kaydedildi.');
}

function filteredZimmet(proj){

function personelToplamGunTumZaman(p){
  if(!p.puantaj) return 0;
  return Object.values(p.puantaj).reduce((s,v)=> s + (ATT_VALUE[v]||0), 0);
}
function personelToplamMesaiTumZaman(p){
  if(!p.mesai) return 0;
  return Object.values(p.mesai).reduce((s,v)=> s + (parseFloat(v)||0), 0);
}
function personelToplamAvans(proj, personelId){
  return (proj.avanslar||[]).filter(a=>a.personelId===personelId).reduce((s,a)=>s+(parseFloat(a.tutar)||0),0);
}
function projeCalisanaOdenecekToplam(proj){
  return (proj.personel||[]).reduce((s,p)=>{
    const yevmiye = parseFloat(p.yevmiye)||0;
    const gun = personelToplamGunTumZaman(p);
    const saat = personelToplamMesaiTumZaman(p);
    return s + gun*yevmiye + saat*(yevmiye/8);
  }, 0);
}
function projeCalisanaOdenenToplam(proj){
  return (proj.avanslar||[]).reduce((s,a)=>s+(parseFloat(a.tutar)||0),0);
}

async function exportTopluIcmalPdf(proj, p){
  showToast('PDF hazırlanıyor…');
  const ym = ui.topluIcmalAy;
  const toplamGun = personelToplamGunTumZaman(p);
  const toplamMesaiSaat = personelToplamMesaiTumZaman(p);
  const yevmiye = parseFloat(p.yevmiye)||0;
  const saatlik = yevmiye/8;
  const hakGun = toplamGun*yevmiye;
  const hakMesai = toplamMesaiSaat*saatlik;
  const hakedis = hakGun+hakMesai;
  const toplamAvans = personelToplamAvans(proj, p.id);
  const kalanOdeme = hakedis - toplamAvans;
  const zimmetList = (proj.zimmetler||[]).filter(z=>z.personelId===p.id);

  const cellStyle = 'border:1px solid #E4EFEF;padding:3px 2px;text-align:center;';

  const n = daysInMonth(ym);
  const days = Array.from({length:n}, (_,i)=>i+1);

  const mesaiToplamAy = personelMesaiToplam(p, ym);

  const puantajRow = `
    <tr>
      <td style="${nameStyle}">${esc(p.adSoyad)}</td>
      ${days.map(d=>{
        const key = dateKeyFor(ym,d);
        const val = (p.puantaj && p.puantaj[key]) || '';
        return `<td style="${cellStyle}${isWeekendDay(ym,d)?wkndStyle:''}">${val}</td>`;
      }).join('')}
      <td style="${cellStyle}font-weight:700;">${fmtNum(gunToplamAy)}</td>
      <td style="${cellStyle}font-weight:700;">${fmtMoney(gunToplamAy*yevmiye)}</td>
    </tr>`;
  const mesaiRow = `
    <tr>
      <td style="${nameStyle}">${esc(p.adSoyad)}</td>
      ${days.map(d=>{
        const key = dateKeyFor(ym,d);
        const val = (p.mesai && p.mesai[key]) || '';
        return `<td style="${cellStyle}${isWeekendDay(ym,d)?wkndStyle:''}">${val||''}</td>`;
      }).join('')}
      <td style="${cellStyle}font-weight:700;">${fmtNum(mesaiToplamAy)}</td>
      <td style="${cellStyle}font-weight:700;">${fmtMoney(mesaiToplamAy*saatlik)}</td>
    </tr>`;

  const rowStyle = 'padding:7px 4px;border-bottom:1px solid #E4EFEF;';
  const infoRow = (label,val)=>`<tr><td style="${rowStyle}font-weight:700;color:#345264;width:40%;">${esc(label)}</td><td style="${rowStyle}">${esc(val)}</td></tr>`;

  const html = `
    ${pdfHeaderHtml(proj, 'Çalışan Toplu İcmal')}
    <div style="font-family:'Outfit',sans-serif;font-weight:700;font-size:15px;margin-bottom:10px;color:#1C6E8C;">${esc(p.adSoyad)}</div>
    <table style="width:100%;border-collapse:collapse;font-size:11px;max-width:560px;margin-bottom:16px;">
      ${infoRow('Pozisyonu', p.pozisyon||'—')}
      ${infoRow('İşe Giriş / Çıkış', `${fmtDateStr(p.girisTarihi)} — ${fmtDateStr(p.cikisTarihi)}`)}
      ${infoRow('Yevmiye', fmtMoney(yevmiye))}
      ${infoRow('Toplam Çalışılan Gün', fmtNum(toplamGun))}
      ${infoRow('Toplam Mesai Saati', fmtNum(toplamMesaiSaat))}
      ${infoRow('Puantaj Hakedişi', fmtMoney(hakGun))}
      ${infoRow('Mesai Hakedişi', fmtMoney(hakMesai))}
      ${infoRow('Toplam Hakediş', fmtMoney(hakedis))}
      ${infoRow('Aldığı Avans', fmtMoney(toplamAvans))}
      ${infoRow('Kalan Ödeme', fmtMoney(kalanOdeme))}
      ${infoRow('Aldığı Zimmet Sayısı', String(zimmetList.length))}
    </table>

    <div style="font-family:'Outfit',sans-serif;font-weight:700;font-size:12px;margin-bottom:5px;color:#1C6E8C;">Puantaj Cetveli — ${ym}</div>
    <table style="width:100%;border-collapse:collapse;font-size:8px;margin-bottom:12px;">
      <thead><tr style="background:#EAF6F5;">
        <th style="${nameStyle}">Adı Soyadı</th>
        ${days.map(d=>`<th style="${cellStyle}${isWeekendDay(ym,d)?wkndStyle:''}">${d}</th>`).join('')}
        <th style="${cellStyle}">Toplam</th><th style="${cellStyle}">Tutar</th>
      </tr></thead>
      <tbody>${puantajRow}</tbody>
    </table>

    <div style="font-family:'Outfit',sans-serif;font-weight:700;font-size:12px;margin-bottom:5px;color:#1C6E8C;">Mesai Cetveli — ${ym}</div>
    <table style="width:100%;border-collapse:collapse;font-size:8px;">
      <thead><tr style="background:#EAF6F5;">
        <th style="${nameStyle}">Adı Soyadı</th>
        ${days.map(d=>`<th style="${cellStyle}${isWeekendDay(ym,d)?wkndStyle:''}">${d}</th>`).join('')}
        <th style="${cellStyle}">Saat</th><th style="${cellStyle}">Tutar</th>
      </tr></thead>

    </table>
    <div style="margin-top:36px;font-size:9px;color:#8096A3;">DNZ Metraj &amp; Teklif Yönetimi ile oluşturulmuştur.</div>
  `;
  try{
    await renderNodeToPdf(html, `toplu-icmal-${p.adSoyad.replace(/[^a-z0-9ığüşöç]+/gi,'_')}-${ym}.pdf`, 'l');
    showToast('Toplu icmal PDF indirildi.');
  }catch(e){ console.error(e); showToast('PDF oluşturulurken bir sorun oluştu.'); }
}

function saveTahsilatRow(proj){
  if(!tahsilatForm.odemeTarihi){ showToast('Lütfen ödeme tarihini girin.'); return; }
  const tutar = parseFloat(tahsilatForm.tutar)||0;
  if(tutar<=0){ showToast('Lütfen geçerli bir tutar girin.'); return; }
  const row = {
    id: tahsilatForm.id || uid(),
    odemeTarihi: tahsilatForm.odemeTarihi,
    odemeYapan: tahsilatForm.odemeYapan.trim(),
    odemeAlan: tahsilatForm.odemeAlan.trim(),
    odemeSekli: tahsilatForm.odemeSekli,
    aciklama: tahsilatForm.aciklama.trim(),
    tutar
  };
  if(tahsilatForm.id){
    const idx = proj.tahsilatlar.findIndex(r=>r.id===row.id);
    if(idx>-1) proj.tahsilatlar[idx]=row;
  } else {
    proj.tahsilatlar.push(row);
  }
  saveState();
  tahsilatForm = emptyTahsilatForm();
  renderMain();
  showToast('Ödeme kaydı kaydedildi.');
}

  const wrap = document.getElementById('tahsilatTableWrap');
  const rows = (proj.tahsilatlar||[]).slice().sort((a,b)=>(b.odemeTarihi||'').localeCompare(a.odemeTarihi||''));
  if(rows.length===0){
    wrap.innerHTML = `<div class="empty-state">Henüz ödeme kaydı eklenmedi.</div>`;
    return;
  }
  wrap.innerHTML = `
    <table>
      <thead><tr><th>Tarih</th><th>Ödeme Yapan</th><th>Ödeme Alan</th><th>Ödeme Şekli</th><th>Açıklama</th><th class="num">Tutar</th><th></th></tr></thead>

                <button class="icon-btn danger" data-act="delete" title="Sil"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0l-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6h16z"/></svg></button>
              </div>

        renderMain(); window.scrollTo({top:0, behavior:'smooth'});

          proj.tahsilatlar = proj.tahsilatlar.filter(x=>x.id!==r.id);
          saveState(); renderMain();
          showToast('Ödeme kaydı silindi.');
        });
      }
    });
  });
}

function saveMasrafRow(proj){
  if(!masrafForm.masrafKalemi.trim()){ showToast('Lütfen masraf kalemini girin.'); return; }
  if(!masrafForm.odemeTarihi){ showToast('Lütfen ödeme tarihini girin.'); return; }
  const tutar = parseFloat(masrafForm.tutar)||0;
  if(tutar<=0){ showToast('Lütfen geçerli bir tutar girin.'); return; }
  const row = {
    id: masrafForm.id || uid(),
    masrafKalemi: masrafForm.masrafKalemi.trim(),
    odemeTarihi: masrafForm.odemeTarihi,
    odemeSekli: masrafForm.odemeSekli,
    aciklama: masrafForm.aciklama.trim(),
    tutar
  };
  if(masrafForm.id){
    const idx = proj.masraflar.findIndex(r=>r.id===row.id);
    if(idx>-1) proj.masraflar[idx]=row;
  } else {
    proj.masraflar.push(row);
  }
  saveState();
  masrafForm = emptyMasrafForm();
  renderMain();
  showToast('Masraf kaydedildi.');
}

function filteredMasraf(proj){
  return (proj.masraflar||[]).filter(m=> !ui.masrafFilterKalemi || normKey(m.masrafKalemi)===normKey(ui.masrafFilterKalemi))
    .slice().sort((a,b)=> (b.odemeTarihi||'').localeCompare(a.odemeTarihi||''));
}
function projeMasrafToplam(proj){
  return (proj.masraflar||[]).reduce((s,r)=>s+(parseFloat(r.tutar)||0),0);
}

function renderMasrafTable(proj){
  const wrap = document.getElementById('masrafTableWrap');
  const rows = filteredMasraf(proj);
  const totalsEl = document.getElementById('masrafTotals');
  if(rows.length===0){
    wrap.innerHTML = `<div class="empty-state">Kayıtlı masraf bulunamadı.</div>`;
    totalsEl.innerHTML = '';
    return;
  }
  wrap.innerHTML = `
    <table>
      <thead><tr><th>Masraf Kalemi</th><th>Tarih</th><th>Ödeme Şekli</th><th>Açıklama</th><th class="num">Tutar</th><th></th></tr></thead>

              </div>
            </td>

  wrap.querySelectorAll('tr[data-id]').forEach(tr=>{

      const act = e.target.closest('[data-act]')?.dataset.act;

      if(!r) return;
      if(act==='edit'){
        masrafForm = {id:r.id, masrafKalemi:r.masrafKalemi, odemeTarihi:r.odemeTarihi, odemeSekli:r.odemeSekli, aciklama:r.aciklama, tutar:String(r.tutar)};

function groupMetrajForPicker(proj){
  const map = new Map();
  proj.metrajRows.forEach(r=>{
    // Boşluk/büyük-küçük harf farkları normalize edilerek aynı konum + imalat cinsi
    // birleştirilir (İcmal'deki gruplama ile tutarlı davranış için).
    const key = ['blok','kat','daire','mekan','eleman','imalat'].map(f=>normKey(r[f])).concat(r.birim).join('|');
    if(!map.has(key)) map.set(key, {blok:r.blok,kat:r.kat,daire:r.daire,mekan:r.mekan,eleman:r.eleman,imalat:r.imalat,birim:r.birim,miktar:0});
    map.get(key).miktar += (parseFloat(r.altToplam)||0);
  });
  return Array.from(map.values());
}

function openMetrajPickModal(proj){
  const groups = groupMetrajForPicker(proj);
  const modalRoot = document.getElementById('modalRoot');
  if(groups.length===0){
    showToast('Bu projede henüz metraj kaydı yok.');
    return;
  }
  modalRoot.innerHTML = `
    <div class="modal-backdrop" id="modalBackdrop">
      <div class="modal glass-strong glass">
        <h3>Metrajdan Teklife Ekle</h3>
        <p class="hint">Aynı konum ve imalat cinsine ait satırlar birleştirilerek gösterilir. Eklemek istediklerinizi seçin.</p>
        <div class="pick-list" id="pickList">
          ${groups.map((g,i)=>{
            const desc = [g.blok,g.kat,g.daire,g.mekan,g.eleman,g.imalat].filter(Boolean).join(', ');
            return `<div class="pick-item">
              <input type="checkbox" id="pk-${i}" data-idx="${i}">
              <label for="pk-${i}">${esc(desc)} — <b>${fmtNum(g.miktar)} ${UNIT_LABEL[g.birim]}</b></label>
            </div>`;
          }).join('')}
        </div>
        <div class="btn-row" style="margin-top:10px;justify-content:flex-end;">
          <button class="btn btn-ghost" id="pkCancel">Vazgeç</button>
          <button class="btn btn-primary" id="pkAdd">Seçilenleri Ekle</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('pkCancel').onclick = closeModal;
  document.getElementById('modalBackdrop').addEventListener('click',(e)=>{ if(e.target.id==='modalBackdrop') closeModal(); });
  document.getElementById('pkAdd').onclick = ()=>{
    const checked = Array.from(document.querySelectorAll('#pickList input:checked'));
    if(checked.length===0){ showToast('Lütfen en az bir kalem seçin.'); return; }
    checked.forEach(chk=>{
      const g = groups[parseInt(chk.dataset.idx)];
      const desc = [g.blok,g.kat,g.daire,g.mekan,g.eleman,g.imalat].filter(Boolean).join(', ');
      proj.teklifRows.push({
        id:uid(), aciklama:desc, miktar:Math.round(g.miktar*100)/100, birim:g.birim, birimFiyat:0, tutar:0
      });
    });
    saveState(); closeModal(); renderMain();
    showToast(`${checked.length} kalem teklife eklendi.`);
  };
}

  const chooseBtn = document.getElementById('btnChooseBackupFile');
  if(chooseBtn) chooseBtn.onclick = chooseNewBackupFile;
  const chooseAutoBtn = document.getElementById('btnChooseAutoBackup');
  if(chooseAutoBtn) chooseAutoBtn.onclick = chooseAutoBackupLocation;
  const clearAutoBtn = document.getElementById('btnClearAutoBackup');
  if(clearAutoBtn) clearAutoBtn.onclick = clearAutoBackupLocation;
  document.getElementById('btnResetAll').onclick = ()=>{
    confirmModal('TÜM projeler, metraj ve teklif verileri silinecek. Devam edilsin mi?', ()=>{
      state = defaultState();
      saveState(); renderAll();
      showToast('Tüm veriler sıfırlandı.');
    });
  };
}

/* ---- Yedek dosyası konumu hafızası (IndexedDB - File System Access handle'ları saklamak için) ---- */
const FS_IDB_NAME = 'dnzMetrajFileHandles';
const FS_IDB_STORE = 'handles';
const FS_BACKUP_HANDLE_KEY = 'lastBackupFileHandle';
const FS_AUTO_BACKUP_HANDLE_KEY = 'autoBackupFileHandle';
function fsIdbOpen(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(FS_IDB_NAME, 1);
    req.onupgradeneeded = ()=>{ req.result.createObjectStore(FS_IDB_STORE); };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
}
async function fsIdbSet(key, val){
  try{
    const db = await fsIdbOpen();
    return new Promise((resolve,reject)=>{
      const tx = db.transaction(FS_IDB_STORE,'readwrite');
      tx.objectStore(FS_IDB_STORE).put(val, key);
      tx.oncomplete = ()=>resolve();
      tx.onerror = ()=>reject(tx.error);
    });
  }catch(e){ /* IndexedDB yoksa sessizce geç */ }
}
async function fsIdbGet(key){
  try{
    const db = await fsIdbOpen();
    return new Promise((resolve,reject)=>{
      const tx = db.transaction(FS_IDB_STORE,'readonly');
      const req = tx.objectStore(FS_IDB_STORE).get(key);
      req.onsuccess = ()=>resolve(req.result || null);
      req.onerror = ()=>reject(req.error);
    });
  }catch(e){ return null; }
}

function backupFileName(){
  const d = new Date();
  return `dnz-metraj-yedek-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
}

async function markBackupDone(){
  state.lastBackupAt = Date.now();
  state.dirtySinceBackup = false;
  await persistStateRaw();
  updateBackupBanner();
  renderMain();
}

// NOT: Daha önce burada, tarayıcı destekliyorsa önce "showSaveFilePicker" (ör. Google Drive
// gibi bulut konumlarına doğrudan yazma) deneniyor, bu başarısız olursa klasik indirmeye
// düşülüyordu. Bulut sağlayıcılarına (özellikle Google Drive) doğrudan yazma bazı
// cihazlarda dosyayı BOŞ oluşturup sonra yazma hatası verebiliyor; kod da hatayı yakalayıp
// sessizce ikinci bir indirme (telefona) daha başlatıyordu. Sonuç: Drive'da boş bir dosya +
// telefonda ayrı bir indirme, yani "2 defa indiriyor, biri boş" şikayeti.
// Çözüm: Export işlemi için TEK ve güvenilir yöntem olan klasik indirmeyi kullanıyoruz.
// Dosya cihazın "İndirilenler" klasörüne iner; isterseniz oradan Drive'a elle
// kopyalayabilir/yükleyebilirsiniz. Bu şekilde çift indirme ve boş dosya riski ortadan kalkar.
async function exportBackupFile(){
  const dataStr = JSON.stringify(state,null,2);
  const fname = backupFileName();
  try{
    const blob = new Blob([dataStr], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    await markBackupDone();
    showToast('Yedek dosyası indirildi. (Telefonunuzun "İndirilenler" klasörüne kaydedildi.)');
  }catch(e){
    console.error(e);
    showToast('Yedek dosyası indirilirken bir sorun oluştu.');
  }
}

function processBackupText(text){
  try{
    const parsed = JSON.parse(text);
    confirmModal('Yedek dosyasından geri yükleme mevcut tüm verilerin üzerine yazacaktır. Devam edilsin mi?', async ()=>{
      state = Object.assign(defaultState(), parsed);
      if(!state.projects) state.projects={};
      // Az önce bir yedek dosyasından yüklendiği için veriler o dosyayla aynı; "yedeklenmemiş
      // değişiklik" uyarısının hemen tekrar çıkmaması için dirty bayrağını temizliyoruz.
      state.dirtySinceBackup = false;
      await persistStateRaw();
      renderAll();
      showToast('Yedekten geri yükleme tamamlandı.');
    });
  }catch(e){
    showToast('Dosya okunamadı. Lütfen geçerli bir yedek dosyası seçin.');
  }
}

function importBackupFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=> processBackupText(reader.result);
  reader.readAsText(file);
}

async function readBackupFromHandle(handle){
  const file = await handle.getFile();
  return await file.text();
}

async function handleImportBackupClick(){
  if(!window.showOpenFilePicker){
    document.getElementById('s-importFile').click();
    return;
  }
  try{
    let handle = await fsIdbGet(FS_BACKUP_HANDLE_KEY);
    if(handle){
      let perm = await handle.queryPermission({mode:'read'});
      if(perm!=='granted') perm = await handle.requestPermission({mode:'read'});
      if(perm!=='granted') handle = null;
    }
    if(!handle){
      [handle] = await window.showOpenFilePicker({
        types: [{ description:'JSON Yedek Dosyası', accept:{'application/json':['.json']} }]
      });
      await fsIdbSet(FS_BACKUP_HANDLE_KEY, handle);
    }
    const text = await readBackupFromHandle(handle);
    processBackupText(text);
  }catch(e){
    if(e && e.name==='AbortError') return;
    console.error(e);
    showToast('Dosya okunamadı. Lütfen geçerli bir yedek dosyası seçin.');
  }
}

// Kullanıcının istediği bir konumda (Drive/Dropbox klasörü, harici disk, telefonda bir
// klasör vs.) yeni bir dosya oluşturur ya da var olan bir dosyayı seçer ve bunu, uygulama
// her açıldığında otomatik olarak okunacak / her değişiklikte otomatik yazılacak "ana"
// yedekleme dosyası olarak işaretler.
async function chooseAutoBackupLocation(){
  if(!window.showSaveFilePicker){
    showToast('Bu özellik bu cihazda/tarayıcıda desteklenmiyor. Merak etmeyin, verileriniz otomatik olarak tarayıcı önbelleğine kaydediliyor.');
    return;
  }
  let handle;
  try{
    handle = await window.showSaveFilePicker({
      suggestedName: backupFileName(),
      types: [{ description:'JSON Yedek Dosyası', accept:{'application/json':['.json']} }]
    });
  }catch(e){
    if(e && e.name==='AbortError') return;
    console.error(e);
    showToast('Dosya seçilirken bir sorun oluştu.');
    return;
  }
  // İzni kontrol et; zaten verilmişse (çoğu zaman dosya yeni seçildiğinde otomatik verilir)
  // tekrar istemeye gerek yok. Bazı mobil tarayıcılar/işletim sistemleri kalıcı yazma izni
  // modelini desteklemez ve bu adım "denied"/"prompt" döner — bu durumda hata göstermek yerine
  // sessizce bu özelliği atlayıp kullanıcıyı tarayıcı önbelleğinin zaten devrede olduğu
  // konusunda bilgilendiriyoruz (veri kaybı riski yok, sadece bu ek dosya senkronu çalışmıyor).
  let perm = 'denied';
  try{
    perm = await handle.queryPermission({mode:'readwrite'});
    if(perm !== 'granted'){
      perm = await handle.requestPermission({mode:'readwrite'});
    }
  }catch(e){
    console.error('İzin isteme hatası', e);
    perm = 'denied';
  }
  if(perm !== 'granted'){
    showToast('Bu cihaz dosyaya otomatik yazma iznini desteklemiyor. Sorun değil: verileriniz zaten tarayıcı önbelleğine otomatik kaydediliyor. Ek güvence için "Yedeği İndir" ile elle de yedek alabilirsiniz.');
    return;
  }
  try{
    await fsIdbSet(FS_AUTO_BACKUP_HANDLE_KEY, handle);
    autoBackupHandleCache = handle;
    // Dosya boş kalmasın diye mevcut veriyi hemen o dosyaya yazıyoruz.
    const writable = await handle.createWritable();
    await writable.write(JSON.stringify(state, null, 2));
    await writable.close();
    state.lastBackupAt = Date.now();
    state.dirtySinceBackup = false;
    await refreshAutoBackupInfo();
    renderMain();
    updateBackupBanner();
    showToast(`Otomatik yedekleme konumu ayarlandı: ${handle.name}`);
  }catch(e){
    console.error(e);
    showToast('Yedekleme konumu kaydedilirken bir sorun oluştu.');
  }
}
async function clearAutoBackupLocation(){
  await fsIdbSet(FS_AUTO_BACKUP_HANDLE_KEY, null);
  autoBackupHandleCache = null;
  await refreshAutoBackupInfo();
  renderMain();
  showToast('Otomatik yedekleme konumu kaldırıldı.');
}

async function chooseNewBackupFile(){
  if(!window.showOpenFilePicker){
    document.getElementById('s-importFile').click();
    return;
  }
  try{
    const [handle] = await window.showOpenFilePicker({
      types: [{ description:'JSON Yedek Dosyası', accept:{'application/json':['.json']} }]
    });
    await fsIdbSet(FS_BACKUP_HANDLE_KEY, handle);
    const text = await readBackupFromHandle(handle);
    processBackupText(text);
  }catch(e){
    if(e && e.name==='AbortError') return;
    console.error(e);
    showToast('Dosya okunamadı. Lütfen geçerli bir yedek dosyası seçin.');
  }
}

function pdfBaseStyles(width){
  return `font-family:'Inter',Arial,sans-serif;color:#0B2436;padding:24px;width:${width}px;background:#ffffff;`;
}
async function renderNodeToPdf(html, filename, orientation){
  orientation = orientation || 'p';
  const width = orientation==='l' ? 1122 : 794;
  const root = document.getElementById('pdf-render-root');
  root.style.width = width+'px';
  root.innerHTML = `<div id="pdf-inner" style="${pdfBaseStyles(width)}">${html}</div>`;
  await new Promise(r=>setTimeout(r,60));
  const node = document.getElementById('pdf-inner');
  const canvas = await html2canvas(node, {scale:2, useCORS:true, backgroundColor:'#ffffff'});
  const imgData = canvas.toDataURL('image/png');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF(orientation,'mm','a4');
  const pageWidth = orientation==='l' ? 297 : 210;
  const pageHeight = orientation==='l' ? 210 : 297;
  const imgWidth = pageWidth;
  const imgHeight = canvas.height * imgWidth / canvas.width;
  let heightLeft = imgHeight;
  let position = 0;
  pdf.addImage(imgData,'PNG',0,position,imgWidth,imgHeight);
  heightLeft -= pageHeight;
  while(heightLeft > 0){
    position = heightLeft - imgHeight;
    pdf.addPage();
    pdf.addImage(imgData,'PNG',0,position,imgWidth,imgHeight);
    heightLeft -= pageHeight;
  }
  pdf.save(filename);
  root.innerHTML = '';
  root.style.width = '';
}
