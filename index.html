<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>DNZ — Metraj &amp; Teklif</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F3B4C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DNZ Metraj">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --abyss:#08202E;
  --lagoon:#0F3B4C;
  --tide:#1C6E8C;
  --foam:#EAF6F5;
  --aqua:#2FD3C7;
  --aqua-dim:#22A99F;
  --ink:#0B2436;
  --ink-soft:#345264;
  --coral:#E8776B;
  --glass-bg:rgba(234,246,245,0.62);
  --glass-bg-strong:rgba(234,246,245,0.82);
  --glass-border:rgba(255,255,255,0.55);
  --shadow-color:rgba(4,20,28,0.35);
  --radius:18px;
  --font-display:'Outfit',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;}
html,body{
  margin:0;padding:0;width:100%;min-height:100%;
  overflow-x:hidden;
  font-family:var(--font-body);
  color:var(--ink);
  -webkit-tap-highlight-color:transparent;
}
body{
  min-height:100vh;
  min-height:100dvh;
  background:
    radial-gradient(ellipse 80% 60% at 20% -10%, rgba(47,211,199,0.28), transparent 60%),
    radial-gradient(ellipse 70% 50% at 90% 10%, rgba(28,110,140,0.16), transparent 60%),
    linear-gradient(160deg, #F5FBFA 0%, #E6F4F2 45%, #D7EDEC 100%);
  background-attachment:fixed;
  background-size:200% 200%, 200% 200%, 100% 100%;
  animation: driftBg 26s ease-in-out infinite alternate;
  display:flex;flex-direction:column;
}
@keyframes driftBg{
  0%{background-position:0% 0%, 100% 0%, 0 0;}
  100%{background-position:20% 30%, 70% 40%, 0 0;}
}
@media (prefers-reduced-motion:reduce){
  body{animation:none;}
  *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
}

/* wave divider */
.wave-divider{width:100%;height:22px;display:block;line-height:0;margin-top:-1px;}
.wave-divider svg{width:100%;height:100%;display:block;}

/* glass primitives */
.glass{
  background:var(--glass-bg);
  backdrop-filter:blur(18px) saturate(140%);
  -webkit-backdrop-filter:blur(18px) saturate(140%);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  box-shadow:0 8px 32px var(--shadow-color), inset 0 1px 0 rgba(255,255,255,0.5);
  position:relative;
  overflow:hidden;
}
.glass-strong{background:var(--glass-bg-strong);}

/* ripple (dnz) effect */
.ripple-wrap{position:relative;overflow:hidden;}
.ripple-el{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle, rgba(47,211,199,0.55) 0%, rgba(47,211,199,0.25) 40%, rgba(255,255,255,0) 70%);
  transform:scale(0);
  animation:rippleAnim 700ms ease-out forwards;
  pointer-events:none;
  z-index:5;
}
@keyframes rippleAnim{
  to{transform:scale(1);opacity:0;}
}

/* header */
#app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;width:100%;}
header.topbar{
  position:sticky;top:0;z-index:40;
  margin:10px 10px 0 10px;
  padding:12px 16px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:10px;min-width:0;flex-shrink:0;}
.brand-mark{
  width:38px;height:38px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,var(--aqua),var(--tide));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(47,211,199,0.45);
}
.brand-mark svg{width:22px;height:22px;}
.brand-text{display:flex;flex-direction:column;line-height:1.05;min-width:0;}
.brand-text b{font-family:var(--font-display);font-weight:800;font-size:1.15rem;letter-spacing:0.5px;color:var(--ink);}
.brand-text span{font-size:0.68rem;color:var(--ink-soft);font-weight:500;letter-spacing:0.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.project-picker{
  margin-left:auto;display:flex;align-items:center;gap:8px;min-width:0;
  flex:1 1 260px;max-width:420px;
}
select.proj-select{
  flex:1;min-width:0;
  appearance:none;-webkit-appearance:none;
  background:rgba(255,255,255,0.55);
  border:1px solid var(--glass-border);
  border-radius:12px;padding:9px 30px 9px 12px;
  font-family:var(--font-body);font-weight:600;font-size:0.85rem;color:var(--ink);
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230B2436' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");
  background-repeat:no-repeat;background-position:right 8px center;background-size:16px;
  text-overflow:ellipsis;white-space:nowrap;overflow:hidden;
}

/* tabs */
nav.tabs{
  margin:10px;
  display:flex;gap:6px;padding:6px;overflow-x:auto;
  scrollbar-width:none;
}
nav.tabs::-webkit-scrollbar{display:none;}
.tab-btn{
  flex:0 0 auto;
  display:flex;align-items:center;gap:6px;
  padding:9px 16px;border-radius:12px;border:none;cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:0.85rem;
  background:transparent;color:var(--ink-soft);
  transition:background 160ms ease, color 160ms ease, transform 160ms ease;
  white-space:nowrap;
}
.tab-btn svg{width:16px;height:16px;flex-shrink:0;}
.tab-btn.active{
  background:linear-gradient(135deg,var(--aqua),var(--aqua-dim));
  color:#04201C;box-shadow:0 4px 14px rgba(47,211,199,0.4);
}
.tab-btn:not(.active):hover{background:rgba(255,255,255,0.35);color:var(--ink);}

main{flex:1;min-width:0;width:100%;padding:0 10px 40px 10px;display:flex;flex-direction:column;gap:14px;max-width:1180px;margin:0 auto;width:100%;}

.card{padding:18px;display:flex;flex-direction:column;gap:14px;min-width:0;}
.card h2{margin:0;font-family:var(--font-display);font-size:1.05rem;font-weight:700;display:flex;align-items:center;gap:8px;}
.card h2 svg{width:18px;height:18px;color:var(--aqua-dim);}
.card p.hint{margin:0;font-size:0.8rem;color:var(--ink-soft);line-height:1.4;}

.field-grid{
  display:grid;gap:10px;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
}
.field{display:flex;flex-direction:column;gap:4px;min-width:0;}
.field label{font-size:0.7rem;font-weight:600;color:var(--ink-soft);letter-spacing:0.2px;}
.field input,.field select{
  width:100%;padding:9px 10px;border-radius:10px;
  border:1px solid rgba(11,36,54,0.15);
  background:rgba(255,255,255,0.6);
  font-family:var(--font-body);font-size:0.85rem;color:var(--ink);
  min-width:0;
}
.field input:focus,.field select:focus{outline:2px solid var(--aqua-dim);outline-offset:1px;}
.field input.mono,.field.mono input{font-family:var(--font-mono);}

.btn{
  border:none;border-radius:12px;padding:10px 18px;cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:0.85rem;
  display:inline-flex;align-items:center;gap:6px;justify-content:center;
  transition:transform 120ms ease, box-shadow 120ms ease;
  white-space:nowrap;
}
.btn svg{width:15px;height:15px;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:linear-gradient(135deg,var(--aqua),var(--aqua-dim));color:#04201C;box-shadow:0 4px 14px rgba(47,211,199,0.4);}
.btn-ghost{background:rgba(255,255,255,0.45);color:var(--ink);border:1px solid rgba(11,36,54,0.12);}
.btn-danger{background:rgba(232,119,107,0.18);color:#7A2B22;border:1px solid rgba(232,119,107,0.4);}
.btn-danger:hover{background:rgba(232,119,107,0.3);}
.btn-block{width:100%;}
.btn-sm{padding:6px 10px;font-size:0.75rem;border-radius:8px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}

.icon-btn{
  width:32px;height:32px;border-radius:9px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  background:rgba(255,255,255,0.5);color:var(--ink-soft);
  transition:background 120ms ease, color 120ms ease;
}
.icon-btn svg{width:15px;height:15px;}
.icon-btn:hover{background:rgba(255,255,255,0.8);color:var(--ink);}
.icon-btn.danger:hover{background:rgba(232,119,107,0.25);color:#7A2B22;}

.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px;}
table{border-collapse:collapse;width:100%;min-width:760px;font-size:0.78rem;}
thead th{
  text-align:left;padding:9px 10px;background:rgba(11,36,54,0.08);
  font-family:var(--font-display);font-weight:700;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.4px;
  color:var(--ink-soft);position:sticky;top:0;white-space:nowrap;
}
tbody td{padding:8px 10px;border-top:1px solid rgba(11,36,54,0.08);white-space:nowrap;}
tbody tr:hover{background:rgba(255,255,255,0.35);}
td.num,th.num{font-family:var(--font-mono);text-align:right;}
.row-actions{display:flex;gap:4px;}

.filter-bar{display:grid;gap:8px;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));}
.filter-bar select{width:100%;padding:8px 9px;border-radius:9px;border:1px solid rgba(11,36,54,0.15);background:rgba(255,255,255,0.55);font-size:0.78rem;font-family:var(--font-body);color:var(--ink);}

.totals-strip{display:flex;flex-wrap:wrap;gap:10px;}
.total-chip{
  padding:8px 14px;border-radius:12px;background:rgba(255,255,255,0.55);
  border:1px solid rgba(255,255,255,0.6);
  display:flex;flex-direction:column;gap:2px;min-width:88px;
}
.total-chip span.lbl{font-size:0.62rem;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.4px;}
.total-chip span.val{font-family:var(--font-mono);font-weight:700;font-size:1rem;color:var(--ink);}

.empty-state{padding:30px 14px;text-align:center;color:var(--ink-soft);font-size:0.85rem;}
.empty-state svg{width:36px;height:36px;margin-bottom:8px;opacity:0.5;}

/* project list */
.project-list{display:flex;flex-direction:column;gap:8px;}
.project-item{
  display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:14px;
  background:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.5);cursor:pointer;
}
.project-item.active{background:rgba(47,211,199,0.25);border-color:var(--aqua-dim);}
.project-item .pinfo{flex:1;min-width:0;}
.project-item .pinfo b{display:block;font-family:var(--font-display);font-size:0.92rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.project-item .pinfo span{font-size:0.72rem;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;}

/* modal */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(4,16,22,0.55);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;
}
.modal{max-width:420px;width:100%;padding:20px;max-height:86vh;overflow-y:auto;}
.modal h3{margin:0 0 4px 0;font-family:var(--font-display);font-size:1rem;}
.modal .field-grid{margin-top:6px;}

.badge{
  display:inline-flex;padding:3px 9px;border-radius:20px;font-size:0.68rem;font-weight:700;
  background:rgba(47,211,199,0.22);color:#0A5850;
}

footer.appfoot{text-align:center;padding:14px;color:rgba(11,36,54,0.45);font-size:0.68rem;}

.logo-preview{width:56px;height:56px;border-radius:10px;object-fit:contain;background:rgba(255,255,255,0.7);border:1px solid rgba(11,36,54,0.1);padding:4px;}

.toast{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  padding:12px 20px;border-radius:12px;z-index:200;
  font-family:var(--font-body);font-weight:600;font-size:0.85rem;
  background:var(--glass-bg-strong);backdrop-filter:blur(14px);
  border:1px solid var(--glass-border);box-shadow:0 8px 24px var(--shadow-color);
  color:var(--ink);opacity:0;pointer-events:none;transition:opacity 200ms ease, transform 200ms ease;
  max-width:90vw;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

/* pick list for metrajdan ekle */
.pick-list{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto;}
.pick-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;background:rgba(255,255,255,0.4);font-size:0.78rem;}
.pick-item label{flex:1;min-width:0;overflow-wrap:anywhere;}

.checkline{display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--ink-soft);}

/* PDF hidden render area */
#pdf-render-root{position:fixed;left:-99999px;top:0;width:794px;background:#ffffff;}

.backup-banner{
  display:flex;align-items:center;gap:10px;
  margin:8px 12px 0;padding:10px 14px;border-radius:12px;
  background:rgba(255,183,77,0.18);border:1px solid rgba(255,152,0,0.55);
  color:#7a4a00;font-size:0.8rem;font-weight:600;flex-wrap:wrap;
}
.backup-banner svg{flex-shrink:0;width:20px;height:20px;color:#c77700;}
.backup-banner span{flex:1;min-width:200px;}
.backup-banner .btn{white-space:nowrap;}

@media (max-width:640px){
  header.topbar{gap:8px;padding:10px 12px;}
  .brand-text span{display:none;}
  .project-picker{flex:1 1 100%;max-width:none;order:3;}
  table{font-size:0.72rem;}
  .card{padding:14px;}
}
</style>
</head>
<body>
<div id="app">

  <header class="topbar glass">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#04201C" stroke-width="2.2" stroke-linecap="round"><path d="M2 15c1.5-2 3.5-2 5 0s3.5 2 5 0 3.5-2 5 0 3.5 2 5 0"/><path d="M2 20c1.5-2 3.5-2 5 0s3.5 2 5 0 3.5-2 5 0 3.5 2 5 0"/><path d="M12 3v9"/><path d="M9 6l3-3 3 3"/></svg>
      </div>
      <div class="brand-text">
        <b>DNZ</b>
        <span>Metraj &amp; Teklif Yönetimi</span>
      </div>
    </div>
    <div class="project-picker">
      <select id="projectSelect" class="proj-select ripple-el-host"></select>
      <button class="icon-btn ripple-el-host" id="btnQuickNewProject" title="Yeni proje">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
  </header>

  <div id="backupBanner" class="backup-banner" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
    <span>Kaydedilmemiş yedeğiniz var. Verilerinizi kaybetmemek için Ayarlar &gt; "Yedeği İndir" ile yedek alın.</span>
    <button class="btn btn-sm btn-primary" id="bannerBackupBtn">Şimdi Yedekle</button>
  </div>

  <nav class="tabs glass" id="tabNav">
    <button class="tab-btn active ripple-el-host" data-tab="projeler">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 7h5l2 2h11v9a2 2 0 01-2 2H3z"/></svg>
      Projeler
    </button>
    <button class="tab-btn ripple-el-host" data-tab="metraj">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 3h18v18H3z"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>
      Metraj
    </button>
    <button class="tab-btn ripple-el-host" data-tab="icmal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 19V9M10 19V5M16 19v-7M22 19H2"/></svg>
      İcmal
    </button>
    <button class="tab-btn ripple-el-host" data-tab="teklif">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      Teklif
    </button>
    <button class="tab-btn ripple-el-host" data-tab="ayarlar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Ayarlar
    </button>
  </nav>

  <div class="wave-divider" aria-hidden="true">
    <svg viewBox="0 0 1200 22" preserveAspectRatio="none">
      <path d="M0,12 C100,22 200,2 300,10 C400,18 500,2 600,10 C700,18 800,2 900,10 C1000,18 1100,2 1200,10 L1200,22 L0,22 Z" fill="var(--tide)" opacity="0.25"/>
      <path d="M0,16 C120,24 260,6 400,14 C540,22 680,4 820,12 C960,20 1080,6 1200,14 L1200,22 L0,22 Z" fill="var(--aqua-dim)" opacity="0.35"/>
    </svg>
  </div>

  <main id="mainContent"></main>

  <footer class="appfoot">DNZ — cihazınızda ve hesabınızda güvenle saklanır</footer>
</div>

<div id="modalRoot"></div>
<div id="toastRoot" class="toast"></div>
<div id="pdf-render-root"></div>

<script>
/* ======================= STATE ======================= */
const STORAGE_KEY = 'dnzMetrajData_v1';
const LS_STORAGE_KEY = 'dnzMetrajData_localCache_v1';
const UNITS = ['m2','mt','kg','adet','m3','ton'];
const UNIT_LABEL = {m2:'m²', mt:'mt', kg:'kg', adet:'adet', m3:'m³', ton:'ton'};

function defaultState(){
  return {
    company:{ name:'', logo:'' },
    activeProjectId:null,
    projects:{},
    lastBackupAt:null,
    dirtySinceBackup:false
  };
}
function newProject(name, employer){
  const id = uid();
  return {
    id, name: name||'Yeni Proje', employer: employer||'',
    createdAt: Date.now(),
    metrajRows:[],
    teklifRows:[],
    teklifNote:'',
    memory:{ blok:[], kat:[], daire:[], mekan:[], eleman:[], imalat:[] }
  };
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }

let state = defaultState();
let ui = {
  tab:'projeler',
  metrajEditId:null,
  teklifEditId:null,
  filters:{blok:'',kat:'',daire:'',mekan:'',eleman:'',imalat:'',minha:''},
  icmalFilters:{blok:'',kat:'',daire:'',mekan:''}
};

/* ======================= PERSISTENCE ======================= */
// Otomatik yedekleme dosyası: kullanıcının kendi seçtiği bir konumda (Drive/Dropbox
// klasörü, harici disk, telefonda bir klasör vs.) duran tek bir JSON dosyası. Bir kez
// seçildikten sonra HER veri değişikliğinde bu dosyaya otomatik yazılır ve uygulama HER
// açılışında öncelikle bu dosyadan okunur. Böylece "kendim yükledim" derdi ortadan kalkar.
let autoBackupHandleCache = null;
let autoBackupInfo = { name:null, active:false };
async function getAutoBackupHandle(){
  if(autoBackupHandleCache !== null) return autoBackupHandleCache;
  autoBackupHandleCache = await fsIdbGet(FS_AUTO_BACKUP_HANDLE_KEY);
  return autoBackupHandleCache;
}
async function refreshAutoBackupInfo(){
  try{
    const handle = await getAutoBackupHandle();
    if(handle){
      const perm = await handle.queryPermission({mode:'readwrite'});
      autoBackupInfo = { name: handle.name, active: perm==='granted' };
    } else {
      autoBackupInfo = { name:null, active:false };
    }
  }catch(e){
    autoBackupInfo = { name:null, active:false };
  }
}
async function writeAutoBackup(text){
  try{
    const handle = await getAutoBackupHandle();
    if(!handle) return false;
    const perm = await handle.queryPermission({mode:'readwrite'});
    if(perm!=='granted') return false;
    const writable = await handle.createWritable();
    await writable.write(text);
    await writable.close();
    return true;
  }catch(e){
    console.error('Otomatik yedekleme yazma hatası', e);
    return false;
  }
}
// Ham kayıt: state'i olduğu gibi depolar, "yedeklendi" bayrağına dokunmaz.
async function persistStateRaw(){
  const json = JSON.stringify(state);
  // 1) Tarayıcı önbelleği (localStorage): her cihaz/tarayıcıda çalışan, en güvenilir katman.
  //    Mobil dahil hemen hemen her tarayıcıda desteklenir; bu yüzden ana güvence budur.
  try{
    localStorage.setItem(LS_STORAGE_KEY, json);
  }catch(e){
    console.error('Tarayıcı önbelleğine kaydetme hatası', e);
  }
  // 2) Claude ortamı içindeyse (window.storage mevcutsa) onu da güncelle.
  if(typeof window.storage !== 'undefined'){
    try{
      await window.storage.set(STORAGE_KEY, json, false);
    }catch(e){
      console.error('Kaydetme hatası', e);
    }
  }
  // 3) Otomatik yedekleme konumu ayarlanmışsa (ve izin hâlâ geçerliyse) her kayıtta
  //    o dosyayı da güncelle. Bu isteğe bağlı bir ek güvencedir (özellikle masaüstünde);
  //    desteklenmiyorsa veya izin yoksa sessizce atlanır, hata göstermez.
  await writeAutoBackup(json);
}
// Normal veri değişikliklerinde çağrılır: veri değiştiği için "yedeklenmemiş değişiklik var" işaretlenir.
async function saveState(){
  state.dirtySinceBackup = true;
  await persistStateRaw();
  updateBackupBanner();
}
async function loadState(){
  // 1) Önce, kullanıcının seçtiği otomatik yedekleme dosyası var mı ve izin hâlâ
  //    geçerli mi diye bak. Varsa bu dosya ARTIK ana kaynaktır; doğrudan oradan yükle.
  try{
    const handle = await getAutoBackupHandle();
    if(handle){
      const perm = await handle.queryPermission({mode:'readwrite'});
      if(perm==='granted'){
        const text = await readBackupFromHandle(handle);
        if(text && text.trim()){
          const parsed = JSON.parse(text);
          state = Object.assign(defaultState(), parsed);
          if(!state.projects) state.projects = {};
          state.dirtySinceBackup = false;
          return;
        }
      }
    }
  }catch(e){ /* otomatik yedek dosyasından okunamazsa aşağıdaki normal akışa düş */ }

  // 2) Otomatik yedekleme konumu ayarlanmamışsa (veya okunamadıysa) tarayıcı önbelleğini
  //    (localStorage) dene — bu, hemen hemen her cihaz/tarayıcıda (mobil dahil) çalışır.
  let loadedFromCache = false;
  try{
    const raw = localStorage.getItem(LS_STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      state = Object.assign(defaultState(), parsed);
      if(!state.projects) state.projects = {};
      loadedFromCache = true;
    }
  }catch(e){ /* localStorage yoksa/okunamazsa aşağıdaki akışa düş */ }

  // 3) Tarayıcı önbelleğinde veri yoksa, Claude ortamındaysak window.storage'ı dene.
  if(!loadedFromCache){
    try{
      if(typeof window.storage !== 'undefined'){
        const r = await window.storage.get(STORAGE_KEY, false);
        if(r && r.value){
          const parsed = JSON.parse(r.value);
          state = Object.assign(defaultState(), parsed);
          if(!state.projects) state.projects = {};
        } else {
          state = defaultState();
        }
      } else {
        state = defaultState();
      }
    }catch(e){
      state = defaultState();
    }
  }
  // 4) Eski davranış: "Yedekten Geri Yükle" ile daha önce açılmış salt-okunur bir
  //    dosya hafızası varsa ve normal depo boşsa, izin istemeden otomatik dene.
  if(!state.activeProjectId && Object.keys(state.projects).length===0){
    try{
      const handle = await fsIdbGet(FS_BACKUP_HANDLE_KEY);
      if(handle){
        const perm = await handle.queryPermission({mode:'read'});
        if(perm==='granted'){
          const text = await readBackupFromHandle(handle);
          const parsed = JSON.parse(text);
          if(parsed && parsed.projects && Object.keys(parsed.projects).length>0){
            state = Object.assign(defaultState(), parsed);
            if(!state.projects) state.projects = {};
            state.dirtySinceBackup = false;
          }
        }
      }
    }catch(e){ /* otomatik geri yükleme başarısız olursa sessizce geç, normal state kalır */ }
  }
}
function hasAnyData(){
  return Object.values(state.projects||{}).some(p=> (p.metrajRows&&p.metrajRows.length) || (p.teklifRows&&p.teklifRows.length));
}
function needsBackupWarning(){
  return hasAnyData() && state.dirtySinceBackup===true;
}
function fmtBackupDate(ts){
  if(!ts) return 'Henüz yedekleme yapılmadı';
  const d = new Date(ts);
  const pad = n=>String(n).padStart(2,'0');
  return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function addMemory(project, field, value){
  if(!value) return;
  value = value.trim();
  if(!value) return;
  if(!project.memory[field]) project.memory[field]=[];
  if(!project.memory[field].some(v=>v.toLowerCase()===value.toLowerCase())){
    project.memory[field].push(value);
  }
}
// Baştaki/sondaki boşluk ve büyük/küçük harf farkını yok sayarak karşılaştırma anahtarı üretir.
// (Örn. "Duvar", " Duvar" ve "duvar" aynı kabul edilir.) Filtreleme ve İcmal gruplamasında
// aynı kaydın yanlışlıkla farklı gruplara/ filtre seçeneklerine düşmesini engeller.
function normKey(v){ return (v==null?'':String(v)).trim().toLocaleLowerCase('tr'); }
function distinctFromRows(rows, field){
  const map = new Map(); // normalize edilmiş anahtar -> gösterilecek (trimlenmiş) değer
  rows.forEach(r=>{
    const raw = r[field];
    if(raw==null) return;
    const trimmed = String(raw).trim();
    if(!trimmed) return;
    const key = normKey(trimmed);
    if(!map.has(key)) map.set(key, trimmed);
  });
  return Array.from(map.values()).sort((a,b)=>a.localeCompare(b,'tr'));
}
function resizeImageDataUrl(dataUrl, maxDim=320, quality=0.82){
  return new Promise((resolve)=>{
    try{
      const img = new Image();
      img.onload = ()=>{
        let width = img.width, height = img.height;
        if(width>maxDim || height>maxDim){
          if(width>=height){ height = Math.round(height*maxDim/width); width = maxDim; }
          else { width = Math.round(width*maxDim/height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0,0,width,height);
        ctx.drawImage(img,0,0,width,height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = ()=>resolve(dataUrl);
      img.src = dataUrl;
    }catch(e){ resolve(dataUrl); }
  });
}

/* ======================= RIPPLE ======================= */
document.addEventListener('pointerdown', (e)=>{
  const target = e.target.closest('.glass, .btn, .icon-btn, .tab-btn, .project-item, select, .card');
  if(!target) return;
  const rect = target.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height) * 1.6;
  const span = document.createElement('span');
  span.className = 'ripple-el';
  span.style.width = size+'px';
  span.style.height = size+'px';
  span.style.left = (e.clientX - rect.left - size/2)+'px';
  span.style.top = (e.clientY - rect.top - size/2)+'px';
  const prevPos = getComputedStyle(target).position;
  if(prevPos==='static') target.style.position='relative';
  if(getComputedStyle(target).overflow==='visible') target.style.overflow='hidden';
  target.appendChild(span);
  setTimeout(()=>span.remove(), 720);
}, {passive:true});

/* ======================= CALC ======================= */
function computeRow(row){
  const adet = parseFloat(row.adet)||1;
  const uzunluk = parseFloat(row.uzunluk)||1;
  const yukseklik = row.yukseklik!==''&&row.yukseklik!==null&&row.yukseklik!==undefined ? (parseFloat(row.yukseklik)||1) : 1;
  const kisaKenar = row.kisaKenar!==''&&row.kisaKenar!==null&&row.kisaKenar!==undefined ? (parseFloat(row.kisaKenar)||1) : 1;
  const minha = parseFloat(row.minha)||0;
  const toplam = adet*uzunluk*yukseklik*kisaKenar;
  const altToplam = toplam - minha;
  return { toplam: Math.round(toplam*100)/100, altToplam: Math.round(altToplam*100)/100 };
}

function saveMetrajRow(proj){
  // Blok/Kat/Daire/Mekân/Uygulama Yeri/İmalat Cinsi serbest metin alanlarındaki baştaki/
  // sondaki boşlukları temizliyoruz. Aksi halde "Duvar" ve "Duvar " (sonda boşluk) İcmal'de
  // farklı kayıtlar gibi ayrı ayrı toplanıyordu.
  ['blok','kat','daire','mekan','eleman','imalat'].forEach(f=>{
    if(typeof metrajForm[f]==='string') metrajForm[f] = metrajForm[f].trim();
  });
  const c = computeRow(metrajForm);
  const row = Object.assign({}, metrajForm, {toplam:c.toplam, altToplam:c.altToplam});
  if(!row.mekan && !row.imalat && !row.blok){
    showToast('Lütfen en azından Blok, Mekân veya İmalat Cinsi girin.');
    return;
  }
  if(row.id){
    const idx = proj.metrajRows.findIndex(r=>r.id===row.id);
    if(idx>-1) proj.metrajRows[idx] = row;
  } else {
    row.id = uid();
    row.createdAt = Date.now();
    proj.metrajRows.push(row);
  }
  ['blok','kat','daire','mekan','eleman','imalat'].forEach(f=>addMemory(proj, f, row[f]));
  saveState();
  metrajForm = emptyMetrajForm();
  renderMain();
  showToast('Metraj satırı kaydedildi.');
}

function icmalFilteredRows(proj){
  return proj.metrajRows.filter(r=>{
    return ['blok','kat','daire','mekan'].every(f=> !ui.icmalFilters[f] || normKey(r[f])===normKey(ui.icmalFilters[f]));
  });
}
function groupIcmalRows(rows){
  const map = new Map();
  rows.forEach(r=>{
    // Uygulama Yeri / İmalat Cinsi serbest metin olduğu için baştaki/sondaki boşluk ve
    // büyük/küçük harf farkları (ör. "Duvar" / "duvar ") normalize edilerek aynı grupta toplanır.
    const eleman = (r.eleman||'').toString().trim() || '(Belirtilmemiş)';
    const imalat = (r.imalat||'').toString().trim() || '(Belirtilmemiş)';
    const birim = r.birim || 'm2';
    const key = [normKey(eleman), normKey(imalat), birim].join('|');
    if(!map.has(key)) map.set(key, {eleman, imalat, birim, toplam:0, altToplam:0, adet:0});
    const g = map.get(key);
    g.toplam += (parseFloat(r.toplam)||0);
    g.altToplam += (parseFloat(r.altToplam)||0);
    g.adet += 1;
  });
  return Array.from(map.values()).sort((a,b)=>{
    return a.eleman.localeCompare(b.eleman,'tr') || a.imalat.localeCompare(b.imalat,'tr');
  });
}

    </div>

  const html = `
    ${pdfHeaderHtml(proj, 'İcmal Raporu')}
    <table style="width:100%;border-collapse:collapse;font-size:10px;table-layout:auto;">
      <thead>
        <tr style="background:#EAF6F5;">

  `;
  try{
    await renderNodeToPdf(html, `icmal-${proj.name.replace(/[^a-z0-9ığüşöç]+/gi,'_')}.pdf`, 'l');
    showToast('İcmal PDF indirildi.');
  }catch(e){

    showToast('PDF oluşturulurken bir sorun oluştu.');
  }
}

function saveTeklifRow(proj){
  const miktar = parseFloat(teklifForm.miktar)||0;
  const birimFiyat = parseFloat(teklifForm.birimFiyat)||0;
  if(!teklifForm.aciklama.trim()){ showToast('Lütfen açıklama girin.'); return; }
  const row = {
    id: teklifForm.id || uid(),
    aciklama: teklifForm.aciklama.trim(),
    miktar, birim: teklifForm.birim, birimFiyat,
    tutar: Math.round(miktar*birimFiyat*100)/100
  };
  if(teklifForm.id){
    const idx = proj.teklifRows.findIndex(r=>r.id===row.id);
    if(idx>-1) proj.teklifRows[idx]=row;
  } else {
    proj.teklifRows.push(row);
  }
  saveState();
  teklifForm = emptyTeklifForm();
  renderMain();
  showToast('Teklif kalemi kaydedildi.');
}

function groupMetrajForPicker(proj){
  const map = new Map();
  proj.metrajRows.forEach(r=>{
    // Boşluk/büyük-küçük harf farkları normalize edilerek aynı konum + imalat cinsi
    // birleştirilir (İcmal'deki gruplama ile tutarlı davranış için).
    const key = ['blok','kat','daire','mekan','eleman','imalat'].map(f=>normKey(r[f])).concat(r.birim).join('|');
    if(!map.has(key)) map.set(key, {blok:r.blok,kat:r.kat,daire:r.daire,mekan:r.mekan,eleman:r.eleman,imalat:r.imalat,birim:r.birim,miktar:0});
    map.get(key).miktar += (parseFloat(r.altToplam)||0);
  });
  return Array.from(map.values());
}

/* ---- Yedek dosyası konumu hafızası (IndexedDB - File System Access handle'ları saklamak için) ---- */
const FS_IDB_NAME = 'dnzMetrajFileHandles';
const FS_IDB_STORE = 'handles';
const FS_BACKUP_HANDLE_KEY = 'lastBackupFileHandle';
const FS_AUTO_BACKUP_HANDLE_KEY = 'autoBackupFileHandle';
function fsIdbOpen(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(FS_IDB_NAME, 1);
    req.onupgradeneeded = ()=>{ req.result.createObjectStore(FS_IDB_STORE); };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
}
async function fsIdbSet(key, val){
  try{
    const db = await fsIdbOpen();
    return new Promise((resolve,reject)=>{
      const tx = db.transaction(FS_IDB_STORE,'readwrite');
      tx.objectStore(FS_IDB_STORE).put(val, key);
      tx.oncomplete = ()=>resolve();
      tx.onerror = ()=>reject(tx.error);
    });
  }catch(e){ /* IndexedDB yoksa sessizce geç */ }
}
async function fsIdbGet(key){
  try{
    const db = await fsIdbOpen();
    return new Promise((resolve,reject)=>{
      const tx = db.transaction(FS_IDB_STORE,'readonly');
      const req = tx.objectStore(FS_IDB_STORE).get(key);
      req.onsuccess = ()=>resolve(req.result || null);
      req.onerror = ()=>reject(req.error);
    });
  }catch(e){ return null; }
}

function backupFileName(){
  const d = new Date();
  return `dnz-metraj-yedek-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
}

// NOT: Daha önce burada, tarayıcı destekliyorsa önce "showSaveFilePicker" (ör. Google Drive
// gibi bulut konumlarına doğrudan yazma) deneniyor, bu başarısız olursa klasik indirmeye
// düşülüyordu. Bulut sağlayıcılarına (özellikle Google Drive) doğrudan yazma bazı
// cihazlarda dosyayı BOŞ oluşturup sonra yazma hatası verebiliyor; kod da hatayı yakalayıp
// sessizce ikinci bir indirme (telefona) daha başlatıyordu. Sonuç: Drive'da boş bir dosya +
// telefonda ayrı bir indirme, yani "2 defa indiriyor, biri boş" şikayeti.
// Çözüm: Export işlemi için TEK ve güvenilir yöntem olan klasik indirmeyi kullanıyoruz.
// Dosya cihazın "İndirilenler" klasörüne iner; isterseniz oradan Drive'a elle
// kopyalayabilir/yükleyebilirsiniz. Bu şekilde çift indirme ve boş dosya riski ortadan kalkar.
async function exportBackupFile(){
  const dataStr = JSON.stringify(state,null,2);
  const fname = backupFileName();
  try{
    const blob = new Blob([dataStr], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    await markBackupDone();
    showToast('Yedek dosyası indirildi. (Telefonunuzun "İndirilenler" klasörüne kaydedildi.)');
  }catch(e){
    console.error(e);
    showToast('Yedek dosyası indirilirken bir sorun oluştu.');
  }
}

function processBackupText(text){
  try{
    const parsed = JSON.parse(text);
    confirmModal('Yedek dosyasından geri yükleme mevcut tüm verilerin üzerine yazacaktır. Devam edilsin mi?', async ()=>{
      state = Object.assign(defaultState(), parsed);
      if(!state.projects) state.projects={};
      // Az önce bir yedek dosyasından yüklendiği için veriler o dosyayla aynı; "yedeklenmemiş
      // değişiklik" uyarısının hemen tekrar çıkmaması için dirty bayrağını temizliyoruz.
      state.dirtySinceBackup = false;
      await persistStateRaw();
      renderAll();
      showToast('Yedekten geri yükleme tamamlandı.');
    });
  }catch(e){
    showToast('Dosya okunamadı. Lütfen geçerli bir yedek dosyası seçin.');
  }
}

function importBackupFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=> processBackupText(reader.result);
  reader.readAsText(file);
}

async function readBackupFromHandle(handle){
  const file = await handle.getFile();
  return await file.text();
}

async function handleImportBackupClick(){
  if(!window.showOpenFilePicker){
    document.getElementById('s-importFile').click();
    return;
  }
  try{
    let handle = await fsIdbGet(FS_BACKUP_HANDLE_KEY);
    if(handle){
      let perm = await handle.queryPermission({mode:'read'});
      if(perm!=='granted') perm = await handle.requestPermission({mode:'read'});
      if(perm!=='granted') handle = null;
    }
    if(!handle){
      [handle] = await window.showOpenFilePicker({
        types: [{ description:'JSON Yedek Dosyası', accept:{'application/json':['.json']} }]
      });
      await fsIdbSet(FS_BACKUP_HANDLE_KEY, handle);
    }
    const text = await readBackupFromHandle(handle);
    processBackupText(text);
  }catch(e){
    if(e && e.name==='AbortError') return;
    console.error(e);
    showToast('Dosya okunamadı. Lütfen geçerli bir yedek dosyası seçin.');
  }
}

// Kullanıcının istediği bir konumda (Drive/Dropbox klasörü, harici disk, telefonda bir
// klasör vs.) yeni bir dosya oluşturur ya da var olan bir dosyayı seçer ve bunu, uygulama
// her açıldığında otomatik olarak okunacak / her değişiklikte otomatik yazılacak "ana"
// yedekleme dosyası olarak işaretler.
async function chooseAutoBackupLocation(){
  if(!window.showSaveFilePicker){
    showToast('Bu özellik bu cihazda/tarayıcıda desteklenmiyor. Merak etmeyin, verileriniz otomatik olarak tarayıcı önbelleğine kaydediliyor.');
    return;
  }
  let handle;
  try{
    handle = await window.showSaveFilePicker({
      suggestedName: backupFileName(),
      types: [{ description:'JSON Yedek Dosyası', accept:{'application/json':['.json']} }]
    });
  }catch(e){
    if(e && e.name==='AbortError') return;
    console.error(e);
    showToast('Dosya seçilirken bir sorun oluştu.');
    return;
  }
  // İzni kontrol et; zaten verilmişse (çoğu zaman dosya yeni seçildiğinde otomatik verilir)
  // tekrar istemeye gerek yok. Bazı mobil tarayıcılar/işletim sistemleri kalıcı yazma izni
  // modelini desteklemez ve bu adım "denied"/"prompt" döner — bu durumda hata göstermek yerine
  // sessizce bu özelliği atlayıp kullanıcıyı tarayıcı önbelleğinin zaten devrede olduğu
  // konusunda bilgilendiriyoruz (veri kaybı riski yok, sadece bu ek dosya senkronu çalışmıyor).
  let perm = 'denied';
  try{
    perm = await handle.queryPermission({mode:'readwrite'});
    if(perm !== 'granted'){
      perm = await handle.requestPermission({mode:'readwrite'});
    }
  }catch(e){
    console.error('İzin isteme hatası', e);
    perm = 'denied';
  }
  if(perm !== 'granted'){
    showToast('Bu cihaz dosyaya otomatik yazma iznini desteklemiyor. Sorun değil: verileriniz zaten tarayıcı önbelleğine otomatik kaydediliyor. Ek güvence için "Yedeği İndir" ile elle de yedek alabilirsiniz.');
    return;
  }
  try{
    await fsIdbSet(FS_AUTO_BACKUP_HANDLE_KEY, handle);
    autoBackupHandleCache = handle;
    // Dosya boş kalmasın diye mevcut veriyi hemen o dosyaya yazıyoruz.
    const writable = await handle.createWritable();
    await writable.write(JSON.stringify(state, null, 2));
    await writable.close();
    state.lastBackupAt = Date.now();
    state.dirtySinceBackup = false;
    await refreshAutoBackupInfo();
    renderMain();
    updateBackupBanner();
    showToast(`Otomatik yedekleme konumu ayarlandı: ${handle.name}`);
  }catch(e){
    console.error(e);
    showToast('Yedekleme konumu kaydedilirken bir sorun oluştu.');
  }
}
async function clearAutoBackupLocation(){
  await fsIdbSet(FS_AUTO_BACKUP_HANDLE_KEY, null);
  autoBackupHandleCache = null;
  await refreshAutoBackupInfo();
  renderMain();
  showToast('Otomatik yedekleme konumu kaldırıldı.');
}

function pdfHeaderHtml(proj, subtitle){
  const logo = state.company.logo ? `<img src="${state.company.logo}" style="max-height:56px;max-width:180px;object-fit:contain;">` : '';
  const nameLine = state.company.name ? `<div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:18px;color:#0B2436;">${esc(state.company.name)}</div>` : '';
  const subLine = subtitle ? `<div style="font-size:11px;color:#345264;">${esc(subtitle)}</div>` : '';
  return `

  </div>`;
}
function pdfBaseStyles(width){
  return `font-family:'Inter',Arial,sans-serif;color:#0B2436;padding:24px;width:${width}px;background:#ffffff;`;
}
async function renderNodeToPdf(html, filename, orientation){
  orientation = orientation || 'p';
  const width = orientation==='l' ? 1122 : 794;
  const root = document.getElementById('pdf-render-root');
  root.style.width = width+'px';
  root.innerHTML = `<div id="pdf-inner" style="${pdfBaseStyles(width)}">${html}</div>`;
  await new Promise(r=>setTimeout(r,60));
  const node = document.getElementById('pdf-inner');
  const canvas = await html2canvas(node, {scale:2, useCORS:true, backgroundColor:'#ffffff'});
  const imgData = canvas.toDataURL('image/png');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF(orientation,'mm','a4');
  const pageWidth = orientation==='l' ? 297 : 210;
  const pageHeight = orientation==='l' ? 210 : 297;
  const imgWidth = pageWidth;
  const imgHeight = canvas.height * imgWidth / canvas.width;
  let heightLeft = imgHeight;
  let position = 0;
  pdf.addImage(imgData,'PNG',0,position,imgWidth,imgHeight);
  heightLeft -= pageHeight;
  while(heightLeft > 0){
    position = heightLeft - imgHeight;
    pdf.addPage();
    pdf.addImage(imgData,'PNG',0,position,imgWidth,imgHeight);
    heightLeft -= pageHeight;
  }
  pdf.save(filename);
  root.innerHTML = '';
  root.style.width = '';
}
